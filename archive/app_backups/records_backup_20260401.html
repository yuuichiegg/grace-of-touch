<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:"Noto Sans JP",sans-serif;color:#fff}
canvas{display:block}
#app{position:relative;width:100vw;height:100vh}
#three-canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* Header */
#header{position:absolute;top:0;left:0;right:0;z-index:10;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(10,10,26,.95) 0%,rgba(10,10,26,0) 100%);pointer-events:none}
#header>*{pointer-events:auto}
.logo{font-family:"Orbitron",sans-serif;font-weight:900;font-size:1.3rem;background:linear-gradient(135deg,#d4af37,#f5e6a3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:.6rem;color:#b8960c;font-family:"Orbitron",sans-serif;letter-spacing:3px}

/* Floor buttons */
#floor-list{position:absolute;left:20px;top:50%;transform:translateY(-50%);z-index:10;display:flex;flex-direction:column;gap:6px}
.floor-btn{padding:8px 14px;border-radius:10px;cursor:pointer;font-size:.7rem;font-family:"Orbitron",sans-serif;font-weight:700;background:rgba(10,10,20,.7);border:1px solid rgba(212,175,55,.25);color:#aaa;transition:all .3s;backdrop-filter:blur(8px);white-space:nowrap}
.floor-btn:hover,.floor-btn.active{background:rgba(212,175,55,.15);border-color:#d4af37;color:#f5e6a3;box-shadow:0 0 15px rgba(212,175,55,.3)}

/* Floor panel (right) */
#floor-panel{position:absolute;right:20px;top:50%;transform:translateY(-50%);z-index:10;width:300px;max-height:85vh;overflow-y:auto;background:rgba(10,10,20,.92);border:1px solid rgba(212,175,55,.3);border-radius:16px;padding:16px;backdrop-filter:blur(16px);display:none;transition:all .3s}
#floor-panel.active{display:block}
#floor-panel::-webkit-scrollbar{width:4px}
#floor-panel::-webkit-scrollbar-thumb{background:rgba(212,175,55,.3);border-radius:2px}

/* Record Shop UI */
.shop-header{font-family:"Orbitron",sans-serif;font-size:.9rem;color:#d4af37;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.shop-header .vinyl-icon{width:20px;height:20px;border-radius:50%;border:2px solid #d4af37;position:relative;display:inline-flex;align-items:center;justify-content:center}
.shop-header .vinyl-icon::after{content:"";width:4px;height:4px;border-radius:50%;background:#d4af37}

/* Record cards */
.record-card{display:flex;gap:12px;padding:10px;border-radius:12px;background:rgba(212,175,55,.05);border:1px solid rgba(212,175,55,.12);margin-bottom:8px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.record-card:hover{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.35);transform:translateX(-3px)}
.record-card.playing{border-color:#d4af37;box-shadow:0 0 20px rgba(212,175,55,.2)}
.record-cover{width:56px;height:56px;border-radius:8px;background:linear-gradient(135deg,#1a1a2a,#2a2040);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
.record-cover .vinyl{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#1a1a1a 20%,#2a2a3a 21%,#1a1a2a 45%,#2a2a3a 46%,#1a1a2a 70%,#333 71%,#111 100%);transition:transform 2s linear}
.record-card.playing .vinyl{animation:spin-vinyl 2s linear infinite}
.record-cover .vinyl::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#d4af37}
@keyframes spin-vinyl{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.record-info{flex:1;min-width:0}
.record-title{font-size:.8rem;font-weight:700;color:#f5e6a3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-artist{font-size:.65rem;color:#888;margin-top:2px}
.record-cat{font-size:.55rem;color:#d4af37;font-family:"Orbitron",sans-serif;margin-top:4px;letter-spacing:1px}
.record-duration{font-size:.6rem;color:#666;font-family:"Orbitron",sans-serif}

/* Player bar */
#player-bar{position:absolute;bottom:0;left:0;right:0;z-index:20;height:72px;background:rgba(10,10,20,.95);border-top:1px solid rgba(212,175,55,.3);backdrop-filter:blur(16px);display:flex;align-items:center;padding:0 20px;gap:16px;transform:translateY(100%);transition:transform .4s ease}
#player-bar.active{transform:translateY(0)}
#player-vinyl{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,#1a1a1a 22%,#2a2a3a 23%,#1a1a2a 47%,#2a2a3a 48%,#1a1a2a 72%,#333 73%,#111 100%);flex-shrink:0;position:relative}
#player-vinyl::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#d4af37}
#player-vinyl.spinning{animation:spin-vinyl 2s linear infinite}
#player-info{flex:1;min-width:0}
#player-title{font-size:.8rem;font-weight:700;color:#f5e6a3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#player-artist{font-size:.6rem;color:#888}
#player-controls{display:flex;align-items:center;gap:12px}
.ctrl-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(212,175,55,.3);background:rgba(212,175,55,.08);color:#d4af37;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:14px}
.ctrl-btn:hover{background:rgba(212,175,55,.2);border-color:#d4af37}
.ctrl-btn.play-btn{width:42px;height:42px;border-color:#d4af37}
#progress-wrap{position:absolute;top:-3px;left:0;right:0;height:6px;cursor:pointer}
#progress-bg{width:100%;height:2px;background:rgba(212,175,55,.15);margin-top:2px}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#d4af37,#f5e6a3);border-radius:1px;transition:width .1s linear}
#player-time{font-size:.6rem;color:#888;font-family:"Orbitron",sans-serif;min-width:90px;text-align:right}

/* Catalog view */
.catalog-table{width:100%;font-size:.7rem}
.catalog-table th{text-align:left;color:#d4af37;font-family:"Orbitron",sans-serif;font-size:.6rem;padding:6px 4px;border-bottom:1px solid rgba(212,175,55,.2);letter-spacing:1px}
.catalog-table td{padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.05);color:#ccc}
.catalog-table tr:hover td{color:#f5e6a3}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.55rem;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.2);color:#d4af37;margin-right:3px}

/* Floor description */
.floor-desc{font-size:.7rem;color:#888;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(212,175,55,.1);line-height:1.5}

/* Back btn */
#back-btn{position:absolute;bottom:84px;right:20px;z-index:10;padding:10px 20px;border-radius:12px;cursor:pointer;font-family:"Orbitron",sans-serif;font-size:.7rem;font-weight:700;background:rgba(10,10,20,.8);border:1px solid rgba(212,175,55,.3);color:#d4af37;transition:all .3s;backdrop-filter:blur(8px)}
#back-btn:hover{background:rgba(212,175,55,.15);border-color:#d4af37}

#tooltip{position:absolute;z-index:20;padding:8px 14px;border-radius:8px;background:rgba(10,10,20,.9);border:1px solid rgba(212,175,55,.4);font-size:.7rem;pointer-events:none;display:none;font-family:"Orbitron",sans-serif;color:#d4af37;backdrop-filter:blur(8px)}

/* Password Gate */
#pw-gate{position:absolute;top:0;left:0;right:0;bottom:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1a}
#pw-gate.hidden{display:none}
#pw-gate .pw-vinyl{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,#1a1a1a 22%,#2a2a3a 23%,#1a1a2a 47%,#2a2a3a 48%,#1a1a2a 72%,#333 73%,#111 100%);margin-bottom:24px;position:relative;animation:spin-vinyl 4s linear infinite}
#pw-gate .pw-vinyl::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#d4af37}
#pw-box{display:flex;gap:8px;margin-top:16px}
#pw-input{background:rgba(212,175,55,.06);border:1px solid rgba(212,175,55,.3);border-radius:8px;padding:10px 16px;color:#f5e6a3;font-family:"Orbitron",sans-serif;font-size:.75rem;letter-spacing:2px;outline:none;width:200px;text-align:center}
#pw-input:focus{border-color:#d4af37;box-shadow:0 0 15px rgba(212,175,55,.2)}
#pw-input::placeholder{color:rgba(212,175,55,.3)}
#pw-submit{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.4);border-radius:8px;padding:10px 20px;color:#d4af37;font-family:"Orbitron",sans-serif;font-size:.7rem;cursor:pointer;transition:all .2s}
#pw-submit:hover{background:rgba(212,175,55,.2);border-color:#d4af37}
#pw-error{color:#ff4444;font-size:.65rem;margin-top:8px;opacity:0;transition:opacity .3s;font-family:"Orbitron",sans-serif}
#pw-error.show{opacity:1}

/* Loading */
#loading{position:absolute;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1a;transition:opacity .8s}
#loading.fade{opacity:0;pointer-events:none}
.load-bar{width:200px;height:3px;background:rgba(212,175,55,.15);border-radius:2px;overflow:hidden;margin-top:20px}
.load-fill{height:100%;width:0%;background:linear-gradient(90deg,#d4af37,#f5e6a3);border-radius:2px;transition:width .3s}

/* Responsive */
@media(max-width:768px){
  .logo{font-size:1rem}
  #floor-panel{width:240px;right:10px;padding:12px}
  #floor-list{left:10px}
  .floor-btn{padding:6px 10px;font-size:.6rem}
  #back-btn{bottom:80px;right:10px;padding:8px 14px;font-size:.6rem}
  #player-bar{padding:0 12px;gap:10px}
  #player-time{display:none}
}
@media(max-width:480px){
  #floor-list{display:none}
  #floor-panel{width:calc(100vw - 40px);right:20px}
}
</style>

</div>

<div id="floor-list"></div>
<div id="floor-panel"></div>

<div id="back-btn" onclick="location.href='tower.html'">&#8592; Back to Tower</div>

<!-- Audio Player Bar -->

  <div id="progress-wrap"><div id="progress-bg"><div id="progress-fill"></div></div></div>
  <div id="player-vinyl"></div>

    <div id="player-title">No Track Selected</div>
    <div id="player-artist">Grace of Touch Records</div>
  </div>
  <div id="player-controls">
    <div class="ctrl-btn" id="btn-prev">&#9664;&#9664;</div>
    <div class="ctrl-btn play-btn" id="btn-play">&#9654;</div>
    <div class="ctrl-btn" id="btn-next">&#9654;&#9654;</div>
  </div>
  <div id="player-time">0:00 / 0:00</div>
</div>

<!-- Password Gate (hidden by default, shown via unlock button) -->
<div id="pw-gate" class="hidden">
  <div class="pw-vinyl"></div>
  <div class="logo" style="font-size:1.8rem">FULL CATALOG ACCESS</div>
  <div class="logo-sub" style="margin-top:6px">ENTER PASSWORD TO UNLOCK</div>

    <input type="password" id="pw-input" placeholder="PASSWORD" autocomplete="off">
    <button id="pw-submit">UNLOCK</button>
  </div>
  <div id="pw-error">INVALID PASSWORD</div>
  <div style="margin-top:16px;font-size:.6rem;color:#666;cursor:pointer" onclick="document.getElementById('pw-gate').classList.add('hidden')">&#8592; Back</div>
</div>

<div id="loading" style="display:none">
  <div class="logo" style="font-size:2rem">GRACE OF TOUCH</div>
  <div class="logo-sub" style="margin-top:8px">RECORDS LOADING...</div>

<!-- Disable dev tools / right-click -->
<script>
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&e.key==="I")||(e.ctrlKey&&e.key==="u"))e.preventDefault()});
console.log("%c\u00a9 Grace of Touch Records - All Rights Reserved","color:#d4af37;font-size:14px;font-weight:bold");

/* Password Gate Logic */
(function(){
  /* SHA-256 hash of password */
  const PW_HASH = "44e7257a69dbb9f919b292714a0e51493447264dcb841bf39ba32d6a25d54676";
  const SESSION_KEY = "got_records_auth";

  async function sha256(msg) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  /* Public mode: anyone can browse public tracks (original + AI)
     Full mode: password unlocks band/held tracks + full catalog */
  const isFullAuth = sessionStorage.getItem(SESSION_KEY) === "1";

  /* Always allow entry — no gate for public content */
  document.getElementById("pw-gate").classList.add("hidden");
  document.getElementById("loading").style.display = "";

  /* But expose a lock/unlock button for full access */
  window._recordsFullAccess = isFullAuth;
  window._recordsUnlock = async function(val) {
    const hash = await sha256(val);
    if (hash === PW_HASH) {
      sessionStorage.setItem(SESSION_KEY, "1");
      window._recordsFullAccess = true;
      return true;
    }
    return false;
  };

  /* Wire up unlock UI */
  const pwInput = document.getElementById("pw-input");
  const pwSubmit = document.getElementById("pw-submit");
  const pwError = document.getElementById("pw-error");

  async function tryUnlock() {
    const val = pwInput.value.trim();
    if (!val) return;
    const ok = await window._recordsUnlock(val);
    if (ok) {
      document.getElementById("pw-gate").classList.add("hidden");
      document.getElementById("lock-btn").innerHTML = "&#128275; FULL ACCESS";
      document.getElementById("lock-btn").style.color = "#4ade80";
      document.getElementById("lock-btn").style.borderColor = "rgba(74,222,128,.4)";
    } else {
      pwError.classList.add("show");
      pwInput.value = "";
      pwInput.focus();
      setTimeout(() => pwError.classList.remove("show"), 2000);
    }
  }
  pwSubmit.addEventListener("click", tryUnlock);
  pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

  if (isFullAuth) {
    document.getElementById("lock-btn").innerHTML = "&#128275; FULL ACCESS";
    document.getElementById("lock-btn").style.color = "#4ade80";
    document.getElementById("lock-btn").style.borderColor = "rgba(74,222,128,.4)";
  }

  window.toggleLockUI = function() {
    if (window._recordsFullAccess) return;
    document.getElementById("pw-gate").classList.remove("hidden");
    pwInput.value = "";
    pwInput.focus();
  };
})();
</script>

   ============================================ */
const audio = new Audio();
audio.crossOrigin = "anonymous";
let currentTrackIdx = -1;
let isPlaying = false;

const playerBar = document.getElementById("player-bar");
const playerVinyl = document.getElementById("player-vinyl");
const playerTitle = document.getElementById("player-title");
const playerArtist = document.getElementById("player-artist");
const playerTime = document.getElementById("player-time");
const progressFill = document.getElementById("progress-fill");
const btnPlay = document.getElementById("btn-play");
const btnPrev = document.getElementById("btn-prev");
const btnNext = document.getElementById("btn-next");
const progressWrap = document.getElementById("progress-wrap");

function formatTime(s) {
  if (isNaN(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function playTrack(idx) {
  if (idx < 0 || idx >= CATALOG.length) return;
  const track = CATALOG[idx];
  if (!track.file) { /* No audio file yet */ return; }
  currentTrackIdx = idx;
  audio.src = "music/" + track.file;
  audio.play().then(() => {
    isPlaying = true;
    updatePlayerUI();
  }).catch(() => {
    isPlaying = false;
    updatePlayerUI();
  });
  playerBar.classList.add("active");
  updatePlayerUI();
  updateCardStates();
}

function togglePlay() {
  if (currentTrackIdx < 0) { playTrack(0); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play().then(() => { isPlaying = true; updatePlayerUI(); }); }
  updatePlayerUI();
}

function updatePlayerUI() {
  const track = CATALOG[currentTrackIdx];
  if (track) {
    playerTitle.textContent = track.title;
    playerArtist.textContent = track.artist + " \u2014 " + track.cat;
  }
  btnPlay.innerHTML = isPlaying ? "&#9646;&#9646;" : "&#9654;";
  playerVinyl.classList.toggle("spinning", isPlaying);
}

function updateCardStates() {
  document.querySelectorAll(".record-card").forEach((card, i) => {
    card.classList.toggle("playing", i === currentTrackIdx);
  });
}

audio.addEventListener("timeupdate", () => {
  if (audio.duration) {
    progressFill.style.width = (audio.currentTime / audio.duration * 100) + "%";
    playerTime.textContent = formatTime(audio.currentTime) + " / " + formatTime(audio.duration);
  }
});

audio.addEventListener("ended", () => {
  const next = (currentTrackIdx + 1) % CATALOG.length;
  playTrack(next);
});

btnPlay.addEventListener("click", togglePlay);
btnPrev.addEventListener("click", () => {
  const prev = (currentTrackIdx - 1 + CATALOG.length) % CATALOG.length;
  playTrack(prev);
});
btnNext.addEventListener("click", () => {
  const next = (currentTrackIdx + 1) % CATALOG.length;
  playTrack(next);
});
progressWrap.addEventListener("click", e => {
  if (!audio.duration) return;
  const rect = progressWrap.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
});

  });

  const visibleCatalog = window._recordsFullAccess ? CATALOG : CATALOG.filter(t => t.status === "public");
  const filtered = visibleCatalog.filter(t => {
    if (shopFilter === "all") return true;
    if (["original","ai","collab","band","shugyo"].includes(shopFilter)) return t.origin === shopFilter;
    if (shopFilter.startsWith("genre:")) return t.genre === shopFilter.slice(6);
    return true;
  });

  filtered.forEach(t => {
    const i = CATALOG.indexOf(t);
    const playing = i === currentTrackIdx;
    const oColor = ORIGIN_COLORS[t.origin] || "#d4af37";
    const oLabel = ORIGIN_LABELS[t.origin] || "?";
    const noFile = !t.file;
    html += `<div class="record-card ${playing ? 'playing' : ''}" data-idx="${i}" style="${noFile?'opacity:0.6;':''}">

          <span class="tag">${t.genre}</span>
        </div>
      </div>
    </div>`;
  });

  if (filtered.length === 0) {
    html += '<div style="text-align:center;color:#666;padding:20px;font-size:.75rem">No tracks in this category</div>';
  }
  return html;
}

    const roleText = t.origin === "ai" ? "Prod." : t.origin === "band" ? "Band" : t.origin === "shugyo" ? "Shugyo" : "Artist";
    html += `<tr class="record-row" data-idx="${i}" style="cursor:pointer">
      <td style="color:#d4af37">${String(i+1).padStart(2,'0')}</td>
      <td>${t.title}<div style="font-size:.5rem;color:#666">${t.artist} (${roleText})</div></td>
      <td><span class="tag" style="color:${oColor};border-color:${oColor}40">${oLabel}</span></td>
      <td><span class="tag" style="color:${sc};border-color:${sc}40">${sl}</span></td>
      <td style="font-size:.6rem;color:#888">${t.year}</td>
      <td style="color:#d4af37;font-size:.55rem">${t.cat}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function renderVault() {
  const originals = CATALOG.filter(t => t.origin === "original");
  const aiTracks = CATALOG.filter(t => t.origin === "ai");
  const bandTracks = CATALOG.filter(t => t.origin === "band" || t.origin === "shugyo");
  let html = '<div class="shop-header"><div class="vinyl-icon"></div> VAULT</div>';
  html += '<div class="floor-desc">マスター音源の金庫室。全 ' + CATALOG.length + ' トラック管理中。</div>';
  /* Stats */
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
  [{label:"ORIGINAL",count:originals.length,color:"#d4af37"},{label:"AI PROD.",count:aiTracks.length,color:"#22d3ee"},{label:"BAND/EGG",count:bandTracks.length,color:"#ff6b35"},{label:"TOTAL",count:CATALOG.length,color:"#fff"}].forEach(s => {
    html += `<div style="text-align:center;padding:12px 0;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid ${s.color}20">
      <div style="font-family:Orbitron;font-size:1.5rem;color:${s.color}">${s.count}</div>
      <div style="font-size:.5rem;color:#888;font-family:Orbitron;letter-spacing:1px;margin-top:2px">${s.label}</div>
    </div>`;
  });
  html += '</div>';
  /* Vinyl grid */
  html += '<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center">';
  CATALOG.forEach(t => {
    const oc = ORIGIN_COLORS[t.origin] || "#d4af37";
    html += `<div style="width:44px;height:44px;border-radius:50%;background:radial-gradient(circle,#1a1a1a 22%,#2a2a3a 23%,#1a1a2a 47%,#2a2a3a 48%,#111 100%);display:flex;align-items:center;justify-content:center;border:1px solid ${oc}40;position:relative;cursor:default" title="${t.title} (${t.origin})">
      <div style="width:8px;height:8px;border-radius:50%;background:${oc}"></div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderMastering() {
  let html = '<div class="shop-header"><div class="vinyl-icon"></div> MASTERING SUITE</div>';
  html += '<div class="floor-desc">バージョン履歴＆タイムライン。制作日・リミックス日を記録。</div>';
  CATALOG.forEach(t => {
    const sc = STATUS_COLORS[t.status] || "#888";
    const sl = STATUS_LABELS[t.status] || "?";
    const oc = ORIGIN_COLORS[t.origin] || "#d4af37";
    html += `<div style="padding:10px 8px;border-bottom:1px solid rgba(212,175,55,.08)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="font-family:Orbitron;font-size:.55rem;color:#d4af37;min-width:55px">${t.cat}</span>
        <span style="flex:1;font-size:.75rem;font-weight:700;color:#f5e6a3">${t.title}</span>
        <span style="font-size:.5rem;padding:2px 6px;border-radius:4px;background:${sc}15;color:${sc};border:1px solid ${sc}30">${sl}</span>
      </div>
      <div style="display:flex;gap:4px;align-items:center;margin-bottom:4px">
        <span style="font-size:.55rem;color:#888">${t.artist} · ${t.year}</span>
        <span class="tag" style="color:${oc};border-color:${oc}40">${ORIGIN_LABELS[t.origin]}</span>
      </div>`;
    /* Timeline */
    if (t.versions && t.versions.length > 0) {
      html += '<div style="margin-top:6px;padding-left:12px;border-left:2px solid rgba(212,175,55,.2)">';
      t.versions.forEach(v => {
        const typeColors = {original:"#d4af37",demo:"#888",eq:"#22d3ee",remix:"#a78bfa",karaoke:"#4ade80",recording:"#ff6b35",band:"#ff6b35",lyrics:"#888"};
        const tc = typeColors[v.type] || "#888";
        html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;position:relative">
          <div style="position:absolute;left:-16px;width:6px;height:6px;border-radius:50%;background:${tc}"></div>
          <span style="font-family:Orbitron;font-size:.5rem;color:${tc};min-width:70px">${v.date}</span>
          <span style="font-size:.6rem;color:#ccc">${v.note}</span>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

function renderAR() {
  let html = '<div class="shop-header"><div class="vinyl-icon"></div> A&amp;R OFFICE</div>';
  html += '<div class="floor-desc">アーティスト＆レパートリー。リリース計画と配信管理。</div>';
  html += '<div style="padding:16px 0;text-align:center">';
  html += '<div style="font-family:Orbitron;font-size:.7rem;color:#d4af37;letter-spacing:2px;margin-bottom:12px">RELEASE PIPELINE</div>';
  const genres = {};
  CATALOG.forEach(t => { genres[t.genre] = (genres[t.genre] || 0) + 1; });
  Object.entries(genres).forEach(([g, c]) => {
    const pct = Math.round(c / CATALOG.length * 100);
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:70px;text-align:right;font-size:.6rem;color:#888">${g}</div>
      <div style="flex:1;height:8px;background:rgba(212,175,55,.1);border-radius:4px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,#d4af37,#f5e6a3);border-radius:4px"></div>
      </div>
      <div style="font-family:Orbitron;font-size:.6rem;color:#d4af37;width:30px">${c}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderRooftop() {
  let html = '<div class="shop-header"><div class="vinyl-icon"></div> ROOFTOP LOUNGE</div>';
  html += '<div class="floor-desc">夜景を眺めながら全曲シャッフル再生。</div>';
  html += '<div style="text-align:center;padding:24px 0">';
  html += '<div class="ctrl-btn play-btn" id="shuffle-all" style="width:64px;height:64px;font-size:24px;margin:0 auto;border-color:#d4af37">&#9654;</div>';
  html += '<div style="font-family:Orbitron;font-size:.6rem;color:#888;margin-top:12px;letter-spacing:2px">SHUFFLE ALL</div>';
  html += '</div>';
  html += '<div style="font-size:.7rem;color:#666;text-align:center;margin-top:8px">ALL ' + CATALOG.length + ' TRACKS</div>';
  return html;
}

const floorRenderers = {
  b1: renderVault,
  f1: renderShop,
  f2: renderCatalog,
  f3: renderMastering,
  f4: renderAR,
  rf: renderRooftop
};

/* ============================================
   FLOOR SELECTION
   ============================================ */
let selectedFloor = null;
const floorListEl = document.getElementById("floor-list");

FLOORS.slice().reverse().forEach(fd => {
  const btn = document.createElement("div");
  btn.className = "floor-btn";
  btn.textContent = fd.floor;
  btn.dataset.floorId = fd.id;
  btn.addEventListener("click", () => selectFloor(fd));
  floorListEl.appendChild(btn);
});

function selectFloor(fd) {
  selectedFloor = fd;
  document.querySelectorAll(".floor-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.floorId === fd.id)
  );

  const render = floorRenderers[fd.id];
  floorPanel.innerHTML = render ? render() : "";
  floorPanel.classList.add("active");

  /* Attach click handlers */
  floorPanel.querySelectorAll(".record-card").forEach(card => {
    card.addEventListener("click", () => playTrack(parseInt(card.dataset.idx)));
  });
  floorPanel.querySelectorAll(".record-row").forEach(row => {
    row.addEventListener("click", () => playTrack(parseInt(row.dataset.idx)));
  });
  /* Filter tabs */
  floorPanel.querySelectorAll("[data-filter]").forEach(tab => {
    tab.addEventListener("click", e => {
      e.stopPropagation();
      shopFilter = tab.dataset.filter;
      selectFloor(fd); /* re-render */
    });
  });
  const shuffleBtn = floorPanel.querySelector("#shuffle-all");
  if (shuffleBtn) {
    shuffleBtn.addEventListener("click", () => {
      const idx = Math.floor(Math.random() * CATALOG.length);
      playTrack(idx);
    });
  }

  animCam(fd.y + 2);
  controls.autoRotate = false;
}

function animCam(ty) {
  const sy = controls.target.y, st = performance.now();
  function tick(now) {
    const t = Math.min((now - st) / 800, 1);
    const e = 1 - Math.pow(1 - t, 3);
    controls.target.y = sy + (ty - sy) * e;
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ============================================
   RAYCASTING
   ============================================ */
const rc = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById("tooltip");

canvas.addEventListener("pointermove", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  rc.setFromCamera(mouse, camera);
  const hits = rc.intersectObjects(floorMeshes.map(f => f.mesh));
  if (hits.length > 0) {
    const fd = hits[0].object.userData.floorData;
    tooltip.style.display = "block";
    tooltip.textContent = fd.floor + " \u2014 " + fd.label;
    tooltip.style.left = (e.clientX + 15) + "px";
    tooltip.style.top = (e.clientY - 10) + "px";
    canvas.style.cursor = "pointer";
  } else {
    tooltip.style.display = "none";
    canvas.style.cursor = "grab";
  }
});

canvas.addEventListener("click", e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  rc.setFromCamera(mouse, camera);
  const hits = rc.intersectObjects(floorMeshes.map(f => f.mesh));
  if (hits.length > 0) selectFloor(hits[0].object.userData.floorData);
});

canvas.addEventListener("touchend", e => {
  const t = e.changedTouches && e.changedTouches[0];
  if (!t) return;
  mouse.x = (t.clientX / innerWidth) * 2 - 1;
  mouse.y = -(t.clientY / innerHeight) * 2 + 1;
  rc.setFromCamera(mouse, camera);
  const hits = rc.intersectObjects(floorMeshes.map(f => f.mesh));
  if (hits.length > 0) selectFloor(hits[0].object.userData.floorData);
});

/* Close panel when clicking empty space */
canvas.addEventListener("pointerdown", e => {
  setTimeout(() => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    rc.setFromCamera(mouse, camera);
    const hits = rc.intersectObjects(floorMeshes.map(f => f.mesh));
    if (hits.length === 0 && !e.target.closest("#floor-panel") && !e.target.closest("#floor-list")) {
      floorPanel.classList.remove("active");
      document.querySelectorAll(".floor-btn").forEach(b => b.classList.remove("active"));
      selectedFloor = null;
    }
  }, 50);
});

/* ============================================
   HIGHLIGHT RINGS
   ============================================ */
const hlMeshes = [];
FLOORS.forEach(fd => {
  const rm = new THREE.MeshBasicMaterial({ color: GOLD, transparent: true, opacity: 0, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(new THREE.RingGeometry(4, 4.5, 32), rm);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = fd.y + 0.2;
  BG.add(ring);
  hlMeshes.push({ ring, floorData: fd, mat: rm });
});

/* ============================================
   ANIMATION LOOP
   ============================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();

  /* Vinyl rotation on roof */
  vinylGroup.rotation.y = t * 0.3;

  /* Gold particles float */
  floatPart.rotation.y = t * 0.015;
  const pp = floatPart.geometry.attributes.position;
  for (let i = 0; i < pp.count; i++) {
    pp.array[i*3 + 1] += Math.sin(t + i) * 0.002;
  }
  pp.needsUpdate = true;

  /* Highlight rings */
  hlMeshes.forEach(h => {
    const tgt = (selectedFloor && selectedFloor.id === h.floorData.id) ? 0.35 : 0;
    h.mat.opacity += (tgt - h.mat.opacity) * 0.05;
    if (selectedFloor && selectedFloor.id === h.floorData.id) {
      h.ring.scale.set(1 + 0.04 * Math.sin(t * 3), 1, 1 + 0.04 * Math.sin(t * 3));
    }
  });

  /* Window emissive pulse */
  BG.traverse(ch => {
    if (ch.material && ch.material.emissiveIntensity !== undefined && ch.material.emissive) {
      ch.material.emissiveIntensity = 0.2 + 0.1 * Math.sin(t * 0.5 + ch.position.y * 0.1);
    }
  });

  /* Base ring pulse */
  baseRingMat.opacity = 0.2 + 0.1 * Math.sin(t * 1.5);

  /* Top glow pulse */
  topGlow.intensity = 0.6 + 0.3 * Math.sin(t * 1.2);

  renderer.render(scene, camera);
}

/* ============================================
   RESIZE
   ============================================ */
window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ============================================
   LOADING
   ============================================ */
const lf = document.getElementById("load-fill");
let lp = 0;
function fakeLoad() {
  lp += (100 - lp) * 0.08;
  lf.style.width = lp + "%";
  if (lp < 98) requestAnimationFrame(fakeLoad);
  else {
    lf.style.width = "100%";
    setTimeout(() => {
      document.getElementById("loading").classList.add("fade");
      setTimeout(() => { document.getElementById("loading").style.display = "none"; }, 800);
    }, 300);
  }
}
fakeLoad();
animate();

</script>
