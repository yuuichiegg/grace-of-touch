// --- Sound Engine (Web Audio API) ---
const useSoundSystem = () => {
  const [isMuted, setIsMuted] = useState(false);
  const audioCtxRef = useRef(null);
  const bgmGainNodeRef = useRef(null);
  const nextNoteTimeRef = useRef(0);
  const schedulerTimerRef = useRef(null);
  const isAudioStartedRef = useRef(false);

  const initAudio = useCallback(() => {
    if (isAudioStartedRef.current) return;
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtxRef.current = new AudioContext();
      const masterGain = audioCtxRef.current.createGain();
      masterGain.gain.value = 0.15; 
      masterGain.connect(audioCtxRef.current.destination);
      bgmGainNodeRef.current = audioCtxRef.current.createGain();
      bgmGainNodeRef.current.gain.value = isMuted ? 0 : 0.4;
      bgmGainNodeRef.current.connect(masterGain);
      playPinkNoise(audioCtxRef.current, bgmGainNodeRef.current);
      schedulerTimerRef.current = setInterval(scheduleMusic, 1000);
      isAudioStartedRef.current = true;
      if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
    } catch (e) { console.error("Audio init failed", e); }
  }, [isMuted]);

  const playPinkNoise = (ctx, dest) => {
    const bufferSize = 2 * ctx.sampleRate;
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      output[i] = (lastOut + (0.02 * white)) / 1.02;
      lastOut = output[i];
      output[i] *= 3.5; 
    }
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 300;
    noise.connect(filter);
    filter.connect(dest);
    noise.start(0);
  };

  const playNote = (freq, duration) => {
    if (isMuted || !audioCtxRef.current) return;
    const ctx = audioCtxRef.current;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.05, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(bgmGainNodeRef.current);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  };

  const scheduleMusic = () => {
    if (!audioCtxRef.current || isMuted) return;
    const now = audioCtxRef.current.currentTime;
    if (nextNoteTimeRef.current < now + 0.1) {
       const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; 
       if (Math.random() < 0.2) {
          const note = notes[Math.floor(Math.random() * notes.length)];
          playNote(note, 3.0);
       }
       nextNoteTimeRef.current += 2.0;
    }
  };

  useEffect(() => {
    if (bgmGainNodeRef.current && audioCtxRef.current) {
      bgmGainNodeRef.current.gain.setTargetAtTime(isMuted ? 0 : 0.4, audioCtxRef.current.currentTime, 1.0);
    }
  }, [isMuted]);

  const playSE = useCallback((type) => {
    if (isMuted || !audioCtxRef.current) return;
    const ctx = audioCtxRef.current;
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;
    switch (type) {
        case 'eat': 
            osc.type = 'triangle'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(50, now + 0.2);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2); break;
        case 'voice_happy':
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(500, now + 0.3);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.1, now + 0.1); gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4); break;
        case 'voice_excited':
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2); break;
        case 'walk':
            osc.type = 'triangle'; osc.frequency.setValueAtTime(60, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1); break;
        case 'click':
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now); osc.stop(now + 0.05); break;
    }
  }, [isMuted]);

  return { isMuted, setIsMuted, initAudio, playSE };
};

// --- Helper: Safe Weather Hook ---
const useEnvironment = () => {
  const [weather, setWeather] = useState('clear');
  const [timeOfDay, setTimeOfDay] = useState('day');
  const [temperature, setTemperature] = useState(20);
  useEffect(() => {
    const updateEnv = async () => {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 8) setTimeOfDay('sunrise');
      else if (hour >= 8 && hour < 16) setTimeOfDay('day');
      else if (hour >= 16 && hour < 19) setTimeOfDay('sunset');
      else setTimeOfDay('night');
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true');
        if (res.ok) {
          const data = await res.json();
          if (data && data.current_weather) {
            const code = data.current_weather.weathercode;
            setTemperature(data.current_weather.temperature);
            if (code <= 3) setWeather('clear');
            else if (code <= 60) setWeather('cloud');
            else setWeather('rain');
          }
        }
      } catch (e) {}
    };
    updateEnv();
  }, []);
  return { weather, timeOfDay, temperature };
};

// --- Info Modal ---
const InfoModal = ({ isOpen, onClose }) => {
  const [activeTab, setActiveTab] = useState('guide');
  const [adminPass, setAdminPass] = useState('');
  const [isAdmin, setIsAdmin] = useState(false);
  const [isExporting, setIsExporting] = useState(false);
  const [isImporting, setIsImporting] = useState(false);
  const [importFile, setImportFile] = useState(null);

  if (!isOpen) return null;

  const handleExportData = async () => {
    if (!db) return alert("DB未接続");
    setIsExporting(true);
    try {
      const statsDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'general'));
      const msgsSnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'messages'));
      const exportData = {
        appName: "AI-ZOO", exportedAt: new Date().toISOString(), appId: appId,
        data: {
          stats: statsDoc.exists() ? statsDoc.data() : { visitors: 0, lovePoints: 0 },
          messages: msgsSnapshot.docs.map(d => ({ ...d.data(), id: d.id, createdAt: d.data().createdAt?.toDate?.()?.toISOString() || new Date().toISOString() }))
        }
      };
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `ai-zoo-backup.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    } catch (e) { alert("Error: " + e.message); } finally { setIsExporting(false); }
  };

  const handleImportData = async () => {
    if (!db || !importFile) return alert("ファイルを選択してください");
    if (!window.confirm("上書きしますか？")) return;
    setIsImporting(true);
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const json = JSON.parse(e.target.result);
        if (!json.data) throw new Error("Invalid file");
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'general'), json.data.stats, { merge: true });
        if (json.data.messages) {
          await Promise.all(json.data.messages.map(m => {
             if(!m.id) return;
             return setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'messages', m.id), { ...m, createdAt: m.createdAt ? new Date(m.createdAt) : serverTimestamp() }, { merge: true });
          }));
        }
        alert("完了しました。リロードしてください。");
      } catch (err) { alert("Error: " + err.message); } finally { setIsImporting(false); }
    };
    reader.readAsText(importFile);
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-xl w-full max-w-sm flex flex-col shadow-xl overflow-hidden max-h-[80vh]">
        <div className="bg-emerald-600 p-3 text-white flex justify-between items-center">
          <span className="font-bold flex items-center gap-2"><Info size={18}/> インフォメーション</span>
          <button onClick={onClose}><X size={20}/></button>
        </div>
        <div className="flex bg-stone-50 border-b">
          {['guide', 'terms', 'admin'].map(tab => (
            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 p-3 text-xs font-bold ${activeTab === tab ? 'bg-white text-emerald-600 border-b-2 border-emerald-500' : 'text-stone-400'}`}>
              {tab === 'guide' ? '遊び方' : tab === 'terms' ? '規約' : '管理者'}
            </button>
          ))}
        </div>
        <div className="p-4 overflow-y-auto flex-1 text-sm text-stone-600">
          {activeTab === 'guide' && <p>パンダは自由に暮らしています。お腹が空いたら笹を食べ、眠くなったら寝ます。</p>}
          {activeTab === 'terms' && <p>不適切な投稿は禁止です。</p>}
          {activeTab === 'admin' && (
            <div className="space-y-3">
              {!isAdmin ? (
                <div className="flex gap-2">
                  <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} className="border p-2 rounded flex-1" placeholder="Pass" />
                  <button onClick={() => adminPass === ADMIN_PASSWORD ? setIsAdmin(true) : alert('Wrong')} className="bg-stone-600 text-white p-2 rounded">Login</button>
                </div>
              ) : (
                <div className="space-y-2">
                  <button onClick={handleExportData} disabled={isExporting} className="w-full bg-blue-500 text-white p-2 rounded text-xs">{isExporting ? '...' : 'バックアップ (DL)'}</button>
                  <div className="flex gap-1"><input type="file" accept=".json" onChange={e => setImportFile(e.target.files[0])} className="text-xs w-full" /></div>
                  <button onClick={handleImportData} disabled={isImporting || !importFile} className="w-full bg-orange-500 text-white p-2 rounded text-xs">{isImporting ? '...' : '復元 (Upload)'}</button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// **REBUILT**: Quadruped Walking Panda Component (Corrected structure & Joints)
// Default orientation is RIGHT (Walking Right). If left, scaleX is -1.
const WalkingPanda = ({ x, y, direction = 'left' }) => {
  const isLeft = direction === 'left';
  const scaleX = isLeft ? -1 : 1; 
  const sX = sN(x);
  const sY = sN(y);

  // Leg Style: Pivot from top center to avoid detachment
  const legStyle = { transformBox: 'fill-box', transformOrigin: '50% 10%' };

  return (
    <g transform={`translate(${sX}, ${sY}) scale(${0.7})`}>
      <g className="animate-walk-body">
        {/* ScaleX handles flipping. The panda drawing is FACING RIGHT by default. */}
        <g transform={`scale(${scaleX}, 1)`}>
           
           {/* 1. 奥の足 (Back Legs - Far) - 暗めに描画して奥行きを出す */}
           {/* 右後ろ足 (Rear Right) - Left leg cycle in 2D profile */}
           <g transform="translate(-20, 10)">
              <g className="animate-leg-2" style={legStyle}>
                 <path d="M0,0 L-5,25 L5,25 Z" stroke="#333" strokeWidth="18" strokeLinecap="round" fill="none" filter="url(#fur-filter)" />
              </g>
           </g>
           {/* 左前足 (Front Left) */}
           <g transform="translate(25, 10)">
              <g className="animate-leg-1" style={legStyle}>
                 <path d="M0,0 L5,25 L-5,25 Z" stroke="#333" strokeWidth="18" strokeLinecap="round" fill="none" filter="url(#fur-filter)" />
              </g>
           </g>

           {/* 2. 胴体 (Body) - 横長の楕円で重量感を出す */}
           <ellipse cx="5" cy="0" rx="60" ry="38" fill="url(#furWhite)" filter="url(#fur-filter)" />
           
           {/* 3. 肩バンド (Shoulder Band) - 背中から前足にかけて */}
           <path d="M25,-35 Q40,-10 25,30 L55,25 Q45,-10 55,-35" stroke="url(#furBlack)" strokeWidth="26" fill="none" strokeLinecap="round" filter="url(#fur-filter)" opacity="0.95" />

           {/* 4. 頭 (Head) - Attached to front (Right side) - Corrected coordinates & connection */}
           <g transform="translate(60, -20)"> {/* Adjusted X, Y to sit properly on shoulder */}
               {/* No separate animation to keep head stable */}
              <g transform="scale(0.85) rotate(10)">
                 <PandaHead x={0} y={0} lookDirection="side" />
              </g>
           </g>
           
           {/* 5. 手前の足 (Front Legs) */}
           {/* Rear Left */}
           <g transform="translate(-25, 15)">
              <g className="animate-leg-1" style={legStyle}>
                 <path d="M0,0 L2,25 L-6,25" stroke="url(#furBlack)" strokeWidth="20" strokeLinecap="round" fill="none" filter="url(#fur-filter)" />
              </g>
           </g>
           {/* Front Right */}
           <g transform="translate(45, 15)">
              <g className="animate-leg-2" style={legStyle}>
                 <path d="M0,0 L-5,25 L5,25" stroke="url(#furBlack)" strokeWidth="20" strokeLinecap="round" fill="none" filter="url(#fur-filter)" />
              </g>
           </g>
           
           {/* 6. 尻尾 (Tail) - 左端 */}
           <circle cx="-55" cy="-5" r="10" fill="url(#furWhite)" filter="url(#fur-filter)" />
        </g>
      </g>
    </g>
  );
};

// --- Main App Logic ---
const AIZooContent = () => {
  const [user, setUser] = useState(null);
  const [globalStats, setGlobalStats] = useState({ visitors: 0, lovePoints: 0 });
  const [recentMessages, setRecentMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showInfo, setShowInfo] = useState(false);
  const [isMuted, setIsMuted] = useState(false); // Default unmuted but needs interaction
  
  const [mood, setMood] = useState('idle');
  const [action, setAction] = useState(null);
  const [activity, setActivity] = useState('ground');
  const [pandaPos, setPandaPos] = useState(SPOTS.ground);
  const [scrollX, setScrollX] = useState(0);
  const [isWalking, setIsWalking] = useState(false);
  const [walkDirection, setWalkDirection] = useState('left');
  
  const [hunger, setHunger] = useState(30);
  const [sleepiness, setSleepiness] = useState(0);
  const [inputMessage, setInputMessage] = useState('');
  const [isSubmitting, setIsSubmitting] = useState(false);
  const [pandaSpeech, setPandaSpeech] = useState("今日は何して遊ぼうかなぁ～🐼");
  const [isOnline, setIsOnline] = useState(true);
  
  const { weather, timeOfDay, temperature } = useEnvironment();
  
  // Audio
  const { isMuted: _isMuted, setIsMuted: _setIsMuted, playSE, initAudio } = useSoundSystem();
  const toggleMute = () => _setIsMuted(p => !p);
  
  // Interaction Handler to Start Audio Context
  const handleInteraction = () => {
    initAudio();
  };

  const handleToggleSound = (e) => {
    e.stopPropagation(); // Prevent triggering other click events
    toggleMute();
  };
  
  // Rain particles
  const rainDrops = useMemo(() => {
    return [...Array(20)].map((_, i) => ({
      id: i,
      x: Math.random() * 400,
      delay: Math.random(),
      duration: 0.8 + Math.random() * 0.5
    }));
  }, []);

  // Camera Follow
  useEffect(() => {
     const pX = (pandaPos && !isNaN(pandaPos.x)) ? pandaPos.x : SPOTS.ground.x;
     const target = Math.max(0, Math.min(400, pX - 200));
     setScrollX(prev => {
       const next = prev + (target - prev) * 0.1;
       return isNaN(next) ? 0 : next;
     });
  }, [pandaPos]);

  // Auth Init
  useEffect(() => {
    if (typeof navigator !== 'undefined') setIsOnline(navigator.onLine);
    if (!auth) { setLoading(false); return; }
    const initAuth = async () => { try { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth); } catch (err) {} };
    initAuth();
    const unsub = onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
    return () => unsub();
  }, []);

  // Firestore
  useEffect(() => {
    if (!user || !db) return;
    try {
      const unsubStats = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'general'), s => { if (s.exists()) setGlobalStats(s.data()); else setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'general'), { visitors: 1, lovePoints: 0 }); });
      const unsubMsgs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), s => { const ms = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,5); setRecentMessages(ms); });
      return () => { unsubStats(); unsubMsgs(); };
    } catch (e) { console.log('Firestore sync error', e); }
  }, [user]);

  // Transition Logic
  const transitionToActivity = useCallback((nextActivity) => {
    if (nextActivity === activity || isWalking) return;
    const startPos = SPOTS[activity] || SPOTS.ground;
    const targetPos = SPOTS[nextActivity] || SPOTS.ground;
    
    if (!startPos || !targetPos) return;

    const direction = targetPos.x < startPos.x ? 'left' : 'right';
    setWalkDirection(direction);
    setIsWalking(true);
    setPandaSpeech("トコトコ...");
    playSE('walk');

    const duration = 4000;
    const startTime = Date.now();
    
    const animateMove = () => {
      const now = Date.now();
      const p = Math.min((now - startTime) / duration, 1);
      
      const newX = startPos.x + (targetPos.x - startPos.x) * p;
      const newY = startPos.y + (targetPos.y - startPos.y) * p;
      
      if (!isNaN(newX) && !isNaN(newY)) {
        setPandaPos({ x: newX, y: newY });
      }

      if (p < 1) {
        requestAnimationFrame(animateMove);
      } else {
        setIsWalking(false);
        setActivity(nextActivity);
        setPandaPos(targetPos);
        setPandaSpeech(null);
        if (nextActivity === 'sleeping_rock') { 
            setMood('sleeping'); 
            setPandaSpeech("ふわぁ...おやすみ...💤"); 
            playSE('voice_sleepy');
        } else {
            setMood('idle');
        }
      }
    };
    requestAnimationFrame(animateMove);
  }, [activity, isWalking, playSE]);

  // AI Logic
  useEffect(() => {
    const tick = setInterval(() => {
      if (action || isWalking) return;
      setHunger(h => Math.max(0, h - 1));
      setSleepiness(s => Math.min(100, s + 2));
      
      let nextActivity = activity;
      if (hunger < 10 && activity !== 'ground') nextActivity = 'ground';
      else if (sleepiness > 90 && activity !== 'sleeping_rock') nextActivity = 'sleeping_rock';
      else if (activity === 'sleeping_rock' && sleepiness < 30) nextActivity = 'ground';
      else if (Math.random() < 0.2) {
        const acts = ['ground', 'climbing', 'playing_tire', 'fishing'];
        nextActivity = acts[Math.floor(Math.random() * acts.length)];
      }
      
      if (nextActivity !== activity) transitionToActivity(nextActivity);
    }, 4000);
    return () => clearInterval(tick);
  }, [action, activity, hunger, sleepiness, isWalking, transitionToActivity]);

  const handleAction = (type) => {
    handleInteraction(); // Ensure audio starts
    if (isWalking) return;
    if (type === 'pet') { 
        setMood('happy'); setAction('pet'); setSleepiness(s => Math.max(0, s - 10)); 
        setPandaSpeech("えへへ💖"); 
        playSE('voice_happy');
        playSE('pet');
    } 
    else if (type === 'feed') { 
        if(activity !== 'ground') { transitionToActivity('ground'); return; }
        setMood('happy'); setAction('eat'); setHunger(100); 
        setPandaSpeech("うまいっパン！🌿"); 
        playSE('voice_excited');
        playSE('eat');
    }
    setTimeout(() => { setAction(null); if (activity !== 'sleeping_rock') setMood('idle'); }, 2000);
    if (user && db) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'general'), { lovePoints: increment(1) });
  };

  const handleSend = (e) => {
    e.preventDefault();
    handleInteraction();
    if (!inputMessage.trim()) return;
    if (user && db) addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), { text: inputMessage, userId: user.uid.slice(0,4), createdAt: serverTimestamp() });
    setInputMessage('');
    setPandaSpeech("ふむふむ🐼");
    playSE('click');
  };
  
  const getBubbleStyle = () => {
    const defaultStyle = { top: '40%', left: '50%' };
    try {
      if (isWalking) return { top: '50%', left: '50%' };
      if (activity === 'climbing') return { top: '15%', left: '65%' };
      if (activity === 'sleeping_rock') return { top: '45%', left: '30%' };
      if (activity === 'playing_tire') return { top: '25%', left: '50%' };
      return defaultStyle;
    } catch {
      return defaultStyle;
    }
  };

  if (loading) return <div className="min-h-screen flex items-center justify-center bg-stone-50">Loading AI-ZOO...</div>;

  return (
    <div className="min-h-screen bg-stone-50 text-stone-800 font-sans pb-20" onClick={handleInteraction}>
      <AnimationStyles />
      <InfoModal isOpen={showInfo} onClose={() => setShowInfo(false)} />
      
      <div className={`p-4 shadow-md sticky top-0 z-50 flex justify-between items-center transition-colors duration-1000 ${timeOfDay === 'night' ? 'bg-indigo-900 text-indigo-100' : 'bg-emerald-600 text-white'}`}>
         <h1 className="font-bold flex gap-2"><Sparkles/> AI-ZOO</h1>
         <div className="flex gap-2 text-xs items-center">
            {weather === 'rain' ? <CloudRain/> : <Sun/>} {temperature}°C
            <button onClick={handleToggleSound} className="p-1 hover:bg-white/20 rounded-full">{isMuted ? <VolumeX size={20}/> : <Volume2 size={20}/>}</button>
            <button onClick={(e) => { e.stopPropagation(); setShowInfo(true); }}><Info/></button>
         </div>
      </div>

      <div className="max-w-md mx-auto p-4 space-y-4">
        <div className="flex justify-between bg-white p-2 rounded-lg text-xs text-stone-500 shadow-sm">
           <div className="flex items-center gap-1"><Utensils size={14}/> 空腹 <div className="w-16 h-2 bg-gray-200 rounded"><div className="h-full bg-orange-400 rounded" style={{width: `${hunger}%`}}></div></div></div>
           <div className="flex items-center gap-1"><Battery size={14}/> 元気 <div className="w-16 h-2 bg-gray-200 rounded"><div className="h-full bg-blue-400 rounded" style={{width: `${100-sleepiness}%`}}></div></div></div>
        </div>

        <div onClick={() => handleAction('pet')} className="relative h-[400px] rounded-3xl overflow-hidden shadow-inner border-4 border-white bg-sky-200 cursor-pointer">
           <svg viewBox="0 0 400 400" className="w-full h-full">
              <defs>
                 <filter id="blurFilter"><feGaussianBlur in="SourceGraphic" stdDeviation="2" /></filter>
                 <filter id="fur-filter" x="-20%" y="-20%" width="140%" height="140%"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" /><feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" /></filter>
                 <linearGradient id="skyGradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={timeOfDay === 'night' ? '#1e1b4b' : '#bae6fd'} /><stop offset="100%" stopColor={timeOfDay === 'night' ? '#4c1d95' : '#e0f2fe'} /></linearGradient>
                 <linearGradient id="grassGradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="#84cc16" /><stop offset="100%" stopColor="#4d7c0f" /></linearGradient>
                 <radialGradient id="furWhite" cx="40%" cy="30%" r="70%"><stop offset="0%" stopColor="#fff"/><stop offset="100%" stopColor="#e5e5e5"/></radialGradient>
                 <radialGradient id="furBlack" cx="30%" cy="30%" r="80%"><stop offset="0%" stopColor="#444"/><stop offset="100%" stopColor="#111"/></radialGradient>
                 <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" floodColor="#000" floodOpacity="0.3"/></filter>
              </defs>

              <rect width="400" height="400" fill="url(#skyGradient)" />
              
              <g transform={`translate(${isNaN(scrollX) ? 0 : -scrollX}, 0)`}>
                 <path d="M-100,400 Q200,300 500,400" fill="#22c55e" opacity="0.6" />
                 <path d="M-100,450 C100,380 300,380 500,450 V320 H-100 Z" fill="url(#grassGradient)" transform="translate(0, -20)" />

                 <g transform="translate(280, 50)">
                    <path d="M20,350 L25,100" stroke="#78350f" strokeWidth="28" strokeLinecap="round" />
                    <path d="M20,120 Q-40,140 -100,120" stroke="#78350f" strokeWidth="18" strokeLinecap="round" />
                    <g className="animate-tree-sway origin-top" filter="url(#shadow)">
                       <circle cx="20" cy="80" r="55" fill="#16a34a" />
                       <circle cx="-15" cy="110" r="45" fill="#15803d" />
                       <circle cx="55" cy="110" r="45" fill="#15803d" />
                    </g>
                 </g>
                 <path d="M50,330 Q80,260 140,290 L50,350 Z" fill="#64748b" transform="translate(0, 0)" filter="url(#shadow)" />
                 <g transform="translate(450, 280)">
                    <ellipse cx="0" cy="0" rx="150" ry="40" fill="#38bdf8" />
                 </g>
              </g>

              {/* Ensure TireSwing renders but only shows panda if occupied AND not walking */}
              <TireSwing isOccupied={activity === 'playing_tire' && !isWalking} mood={mood} action={action} scrollX={scrollX} />
              
              <PandaScene mood={mood} action={action} activity={activity} isWalking={isWalking} pandaPos={pandaPos} walkDirection={walkDirection} scrollX={scrollX} />

              {weather === 'rain' && rainDrops.map(drop => (
                  <line 
                    key={drop.id} 
                    x1={drop.x} y1={-20} 
                    x2={drop.x - 5} y2={20} // Short, slightly tilted drops
                    stroke="white" 
                    strokeWidth="1.5" 
                    opacity="0.4" 
                    className="animate-rain" 
                    style={{ animationDelay: `${drop.delay}s`, animationDuration: `${drop.duration}s` }} 
                  />
              ))}
              {timeOfDay === 'night' && <rect width="400" height="400" fill="#000033" opacity="0.3" style={{ mixBlendMode: 'multiply' }} pointerEvents="none" />}

           </svg>
           
           <ActionEffects action={action} />
           {pandaSpeech && <div className="absolute top-1/3 left-1/2 -translate-x-1/2 bg-white/90 px-3 py-1 rounded-full text-xs font-bold shadow-md animate-bounce">{pandaSpeech}</div>}
        </div>

        <div className="grid grid-cols-3 gap-3">
           <button onClick={() => handleAction('feed')} className="flex flex-col items-center bg-white p-3 rounded-xl shadow-sm"><Leaf className="text-emerald-500"/> <span className="text-xs font-bold">おやつ</span></button>
           <button onClick={() => handleAction('pet')} className="flex flex-col items-center bg-white p-3 rounded-xl shadow-sm"><Heart className="text-pink-500"/> <span className="text-xs font-bold">なでる</span></button>
           <button onClick={() => { if(activity === 'sleeping_rock') transitionToActivity('ground'); else transitionToActivity('sleeping_rock'); }} className="flex flex-col items-center bg-white p-3 rounded-xl shadow-sm"><Sparkles className="text-blue-500"/> <span className="text-xs font-bold">寝/起</span></button>
        </div>

        <form onSubmit={handleSend} className="flex gap-2 bg-white p-2 rounded-xl shadow-sm">
           <input className="flex-1 bg-gray-100 rounded px-3 text-sm" placeholder="話しかける..." value={inputMessage} onChange={e => setInputMessage(e.target.value)} />
           <button type="submit" className="bg-emerald-500 text-white p-2 rounded-lg"><Send size={18}/></button>
        </form>

        <div className="bg-white rounded-xl p-4 shadow-sm space-y-2">
           <h3 className="font-bold text-sm text-stone-600 flex gap-2"><MessageCircle size={16}/> みんなの広場</h3>
           {recentMessages.map(m => (
              <div key={m.id} className="bg-stone-50 p-2 rounded text-xs text-stone-600">{m.text}</div>
           ))}
           {recentMessages.length === 0 && <p className="text-xs text-center text-stone-400">メッセージはありません</p>}
        </div>

        <div className="text-center text-xs text-stone-400 pt-8">
           <p>Total Visitors: {globalStats.visitors.toLocaleString()} | Love: {globalStats.lovePoints.toLocaleString()}</p>
           <p className="mt-1">Created by grace of touch</p>
        </div>
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError(error) { return { hasError: true }; }
  componentDidCatch(error, errorInfo) { console.error("Uncaught error:", error, errorInfo); }
  render() {
    if (this.state.hasError) return <div className="p-4 text-center">エラーが発生しました。再読み込みしてください。</div>;
    return this.props.children;
  }
}

function AIZooApp() {
  return (
    <ErrorBoundary>
      <AIZooContent />
    </ErrorBoundary>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AIZooApp />);
  </script>
</body>
</html>
