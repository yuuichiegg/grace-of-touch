function StatusBadge({ status }) {

  };
  return (
    <span className={`px-3 py-1 rounded-full text-xs font-orbitron tracking-widest border ${colors[status] || colors.INVALID}`}>
      {status}
    </span>
  );
}

// ── Plan Tag on Module Card ──
function PlanTag({ plan }) {
  const colors = {
    Starter: 'text-cyan-400 border-cyan-500/30',
    Professional: 'text-blue-400 border-blue-500/30',
    Enterprise: 'text-yellow-500 border-yellow-500/30',
  };

    <span className={`px-2 py-0.5 rounded text-[9px] font-orbitron tracking-wider border ${colors[plan]}`}>

// ── License Verification Section ──
function LicenseVerification({ onVerify, result, loading }) {
  const [key, setKey] = useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    if (key.trim()) onVerify(key.trim());
  };

  return (
    <section className="px-4 mb-6 fade-in">
      <div className="font-orbitron text-[10px] tracking-[0.25em] text-cyan-500/50 mb-3">
        LICENSE VERIFICATION
      </div>
      <div className="bg-white/[0.02] border border-cyan-500/10 rounded-xl p-4">
        <form onSubmit={handleSubmit} className="flex gap-2 mb-3">
          <input
            type="text"
            value={key}
            onChange={e => setKey(e.target.value)}
            placeholder="ライセンスキーを入力 (例: GOT-PRO-2026-042)"
            className="flex-1 bg-black/40 border border-cyan-500/15 rounded-lg px-3 py-2.5 text-sm text-white/80 font-noto placeholder:text-white/20 outline-none focus:border-cyan-500/40 transition-colors"
          />
          <button
            type="submit"
            disabled={loading || !key.trim()}
            className="px-5 py-2.5 bg-cyan-500/10 border border-cyan-500/30 rounded-lg font-orbitron text-[10px] tracking-[0.2em] text-cyan-500/70 hover:bg-cyan-500/20 hover:text-cyan-500 disabled:opacity-30 transition-all"
          >
            {loading ? '...' : 'VERIFY'}
          </button>
        </form>

        <div className="text-[10px] text-white/25 font-noto mb-2">
          デモキー: GOT-STARTER-2026-001 / GOT-PRO-2026-042 / GOT-ENT-2025-007
        </div>

        {result && (
          <div className="mt-4 border-t border-cyan-500/10 pt-4 fade-in">
            {result.status === 'INVALID' ? (
              <div className="text-center py-4">
                <StatusBadge status="INVALID" />
                <p className="mt-3 text-sm text-white/40 font-noto">
                  このライセンスキーは登録されていません。<br/>
                  正しいキーをご確認ください。
                </p>
              </div>
            ) : (
              <div className="space-y-3">
                <div className="flex items-center justify-between">
                  <span className="text-sm font-noto font-medium text-white/80">{result.client}</span>
                  <StatusBadge status={result.status} />
                </div>
                <div className="grid grid-cols-2 gap-2 text-xs">
                  <div className="bg-black/30 rounded-lg p-2.5">
                    <div className="font-orbitron text-[8px] tracking-wider text-cyan-500/40 mb-1">PLAN</div>
                    <div className="text-white/70 font-noto">{result.plan}</div>

                  <div className="bg-black/30 rounded-lg p-2.5">
                    <div className="font-orbitron text-[8px] tracking-wider text-cyan-500/40 mb-1">EXPIRY</div>
                    <div className="text-white/70 font-noto">{result.expiry}</div>

                  <div className="bg-black/30 rounded-lg p-2.5">
                    <div className="font-orbitron text-[8px] tracking-wider text-cyan-500/40 mb-1">CREATED</div>
                    <div className="text-white/70 font-noto">{result.created}</div>
                  </div>
                  <div className="bg-black/30 rounded-lg p-2.5">
                    <div className="font-orbitron text-[8px] tracking-wider text-cyan-500/40 mb-1">MODULES</div>
                    <div className="text-white/70 font-noto">{result.modules.length}個</div>

      </a>

      </div>
    </footer>
  );

// ── Main App ──
function App() {
  const [verifyResult, setVerifyResult] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    // Initialize demo licenses in localStorage if not present
    const stored = localStorage.getItem('got_licenses');
    if (!stored) {
      localStorage.setItem('got_licenses', JSON.stringify(DEMO_LICENSES));
    }
  }, []);

  const handleVerify = useCallback((key) => {
    setLoading(true);
    setVerifyResult(null);
    // Simulate network delay
    setTimeout(() => {
      const licenses = JSON.parse(localStorage.getItem('got_licenses') || '{}');
      const license = licenses[key] || DEMO_LICENSES[key];
      if (license) {
        // Check if expired
        const now = new Date();
        const expiry = new Date(license.expiry);
        const status = expiry < now ? 'EXPIRED' : license.status;
        setVerifyResult({ ...license, status });
      } else {
        setVerifyResult({ status: 'INVALID' });
      }
      setLoading(false);
    }, 600);
  }, []);

  return (
    <div className="max-w-lg mx-auto pb-4">
      <Header />
      <LicenseVerification onVerify={handleVerify} result={verifyResult} loading={loading} />
      <ModulesSection />
      <PlanTiers />
      <LicenseAgreement />
      <FAQSection />
      <SupportSection />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
