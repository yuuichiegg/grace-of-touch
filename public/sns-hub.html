// ─── Default Data ───
const DEFAULT_PLATFORMS = [

  { id:'tiktok', name:'TikTok', emoji:'🎵', desc:'ショート動画', color:'#ff69b4', active:false, followers:0, lastPost:'', queue:0 },

  { id:'facebook', name:'Facebook', emoji:'📘', desc:'ビジネス・コミュニティ', color:'#4267b2', active:false, followers:0, lastPost:'', queue:0 },
  { id:'instagram', name:'Instagram', emoji:'📸', desc:'ビジュアル・ポートフォリオ', color:'#e1306c', active:false, followers:0, lastPost:'', queue:0 },

const TEMPLATES = [
  { id:'app-update', name:'アプリ更新告知', emoji:'🚀', body:'【アップデート】\n{app_name} v{version} をリリースしました！\n\n新機能:\n- {feature1}\n- {feature2}\n\n詳しくはこちら:\nhttps://grace-of-touch.web.app\n\n#GraceOfTouch #WebApp #Tech' },
  { id:'dev-log', name:'開発日記', emoji:'📝', body:'【開発日記】\n本日の進捗:\n\n{content}\n\n今日のハイライト:\n- {highlight}\n\n#開発日記 #IndieGameDev #GraceOfTouch' },
  { id:'tutorial', name:'チュートリアル', emoji:'🎓', body:'【チュートリアル】\n{title}\n\nステップ:\n1. {step1}\n2. {step2}\n3. {step3}\n\n詳細はプロフィールリンクから！\n\n#Tutorial #HowTo #GraceOfTouch' },
  { id:'behind-scenes', name:'制作裏話', emoji:'🎬', body:'【制作裏話】\n{topic}\n\n{story}\n\nこの技術が使われているアプリ:\n{app_link}\n\n#BehindTheScenes #WebDev #GraceOfTouch' },
  { id:'space', name:'宇宙関連', emoji:'🌌', body:'【宇宙トピック】\n{topic}\n\nMega Rocketでシミュレーション体験:\nhttps://grace-of-touch.web.app/rocket.html\n\n#Space #Rocket #GraceOfTouch #宇宙' },
];

const DAYS_JP = ['日','月','火','水','木','金','土'];

const CHAR_LIMITS = { youtube: 5000, tiktok: 2200, twitter: 280, facebook: 63206, instagram: 2200 };

// ─── Toast Component ───
function Toast({ message }) {
  if (!message) return null;
  return <div className="toast">{message}</div>;
}

// ─── Platform Cards ───
function PlatformCards({ platforms, setPlatforms }) {
  const toggleActive = (id) => {
    setPlatforms(prev => prev.map(p => p.id === id ? { ...p, active: !p.active } : p));
  };
  const updateField = (id, field, value) => {
    setPlatforms(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
  };
  return (
    <div>
      <h2 className="orbitron text-sm text-cyan-400 mb-4 tracking-wider">PLATFORM STATUS</h2>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-3">
        {platforms.map(p => (
          <div key={p.id} className="card p-4">
            <div className="flex items-center gap-2 mb-3">
              <span className="text-2xl">{p.emoji}</span>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium truncate">{p.name}</div>
                <div className="text-xs" style={{color:'rgba(255,255,255,0.35)'}}>{p.desc}</div>
              </div>
            </div>
            <div className="flex items-center gap-2 mb-2">
              <button
                onClick={() => toggleActive(p.id)}
                className={`text-xs px-2 py-1 rounded-full border transition-all ${
                  p.active
                    ? 'bg-green-900/30 border-green-500/50 text-green-400'
                    : 'bg-red-900/20 border-red-500/30 text-red-400/60'
                }`}
              >
                {p.active ? 'ACTIVE' : 'INACTIVE'}
              </button>
              <span className={`platform-badge badge-${p.id}`}>Q:{p.queue}</span>
            </div>
            <div className="space-y-1 mt-3">
              <div className="flex items-center gap-1">
                <span className="text-xs" style={{color:'rgba(255,255,255,0.3)',width:'70px'}}>フォロワー</span>
                <input type="number" value={p.followers} min="0"
                  onChange={e => updateField(p.id, 'followers', parseInt(e.target.value)||0)}
                  className="flex-1" style={{padding:'4px 6px',fontSize:'11px'}} />
              </div>
              <div className="flex items-center gap-1">
                <span className="text-xs" style={{color:'rgba(255,255,255,0.3)',width:'70px'}}>最終投稿</span>
                <input type="date" value={p.lastPost}
                  onChange={e => updateField(p.id, 'lastPost', e.target.value)}
                  className="flex-1" style={{padding:'4px 6px',fontSize:'11px'}} />
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Content Calendar ───
function ContentCalendar({ events, setEvents, platforms }) {
  const [weekOffset, setWeekOffset] = useState(0);
  const [dragItem, setDragItem] = useState(null);

  const getWeekDates = useCallback(() => {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - ((dayOfWeek + 6) % 7) + weekOffset * 7);
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      dates.push(d);
    }
    return dates;
  }, [weekOffset]);

  const weekDates = useMemo(() => getWeekDates(), [getWeekDates]);
  const fmt = (d) => d.toISOString().slice(0, 10);
  const isToday = (d) => fmt(d) === fmt(new Date());

  const getColor = (platformId) => {
    const p = platforms.find(x => x.id === platformId);
    return p ? p.color : '#00ffff';
  };

  const handleDrop = (dateStr) => {
    if (dragItem !== null) {
      setEvents(prev => prev.map((e, i) => i === dragItem ? { ...e, date: dateStr } : e));
      setDragItem(null);
    }
  };

  const removeEvent = (idx) => {
    setEvents(prev => prev.filter((_, i) => i !== idx));
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <h2 className="orbitron text-sm text-cyan-400 tracking-wider">CONTENT CALENDAR</h2>
        <div className="flex items-center gap-2">
          <button className="btn-cyan" onClick={() => setWeekOffset(w => w - 1)}>◀ 前週</button>
          <button className="btn-cyan" onClick={() => setWeekOffset(0)}>今週</button>
          <button className="btn-cyan" onClick={() => setWeekOffset(w => w + 1)}>翌週 ▶</button>
        </div>
      </div>
      <div className="grid grid-cols-7 gap-1">
        {weekDates.map((d, i) => (
          <div key={i} className="text-center">
            <div className={`text-xs mb-1 ${i === 0 || i === 6 ? 'text-red-400/60' : ''}`}
              style={{color: isToday(d) ? '#00ffff' : undefined}}>
              {DAYS_JP[d.getDay()]}
            </div>
            <div className={`text-xs mb-1 orbitron ${isToday(d) ? 'text-cyan-400 font-bold' : ''}`}
              style={{color: isToday(d) ? '#00ffff' : 'rgba(255,255,255,0.5)'}}>
              {d.getMonth()+1}/{d.getDate()}
            </div>
            <div
              className={`calendar-cell ${isToday(d) ? 'border-cyan-500/30' : ''}`}
              onDragOver={e => e.preventDefault()}
              onDrop={() => handleDrop(fmt(d))}
            >
              {events.map((ev, idx) => ev.date === fmt(d) ? (
                <div key={idx}
                  className="calendar-event group relative"
                  style={{background:`${getColor(ev.platform)}22`,color:getColor(ev.platform),border:`1px solid ${getColor(ev.platform)}44`}}
                  draggable
                  onDragStart={() => setDragItem(idx)}
                  title={ev.title}
                >
                  {ev.title}
                  <button
                    onClick={(e) => { e.stopPropagation(); removeEvent(idx); }}
                    className="absolute right-0 top-0 opacity-0 group-hover:opacity-100 text-red-400 px-1"
                    style={{fontSize:'9px'}}>x</button>
                </div>
              ) : null)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Quick Post Composer ───
function QuickComposer({ platforms, events, setEvents, setToast, drafts, setDrafts, initialText, clearInitialText }) {
  const [text, setText] = useState('');

  useEffect(() => {
    if (initialText) {
      setText(initialText);
      clearInitialText();
    }
  }, [initialText]);
  const [selectedPlatforms, setSelectedPlatforms] = useState([]);
  const [mediaUrl, setMediaUrl] = useState('');
  const [scheduleDate, setScheduleDate] = useState('');
  const [editingDraft, setEditingDraft] = useState(null);

  const togglePlatform = (id) => {
    setSelectedPlatforms(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
    );
  };

  const minLimit = useMemo(() => {
    if (selectedPlatforms.length === 0) return Infinity;
    return Math.min(...selectedPlatforms.map(id => CHAR_LIMITS[id] || 5000));
  }, [selectedPlatforms]);

  const charCount = text.length;
  const isOverLimit = charCount > minLimit;

  const copyToClipboard = () => {
    navigator.clipboard.writeText(text).then(() => setToast('クリップボードにコピーしました'));
  };

  const saveDraft = () => {
    if (!text.trim()) return;
    const draft = {
      id: editingDraft || Date.now().toString(),
      text, platforms: selectedPlatforms, mediaUrl,
      createdAt: new Date().toISOString(),
    };
    if (editingDraft) {
      setDrafts(prev => prev.map(d => d.id === editingDraft ? draft : d));
    } else {
      setDrafts(prev => [...prev, draft]);
    }
    setToast('下書きを保存しました');
    setEditingDraft(null);
  };

  const schedulePost = () => {
    if (!text.trim() || !scheduleDate) return;
    selectedPlatforms.forEach(pid => {
      setEvents(prev => [...prev, {
        date: scheduleDate,
        platform: pid,
        title: text.slice(0, 20) + (text.length > 20 ? '...' : ''),
        fullText: text,
        mediaUrl,
      }]);
    });
    setPlatformsQueueCount(selectedPlatforms);
    setToast('カレンダーに追加しました');
  };

  const setPlatformsQueueCount = () => {};

  const loadDraft = (draft) => {
    setText(draft.text);
    setSelectedPlatforms(draft.platforms);
    setMediaUrl(draft.mediaUrl || '');
    setEditingDraft(draft.id);
  };

  const deleteDraft = (id) => {
    setDrafts(prev => prev.filter(d => d.id !== id));
    if (editingDraft === id) setEditingDraft(null);
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div className="lg:col-span-2 space-y-3">
        <h2 className="orbitron text-sm text-cyan-400 tracking-wider">QUICK COMPOSER</h2>
        {/* Platform Select */}
        <div className="flex flex-wrap gap-2">
          {platforms.map(p => (
            <button key={p.id}
              onClick={() => togglePlatform(p.id)}
              className={`btn-cyan flex items-center gap-1 ${selectedPlatforms.includes(p.id) ? 'active' : ''}`}
              style={selectedPlatforms.includes(p.id) ? {borderColor: p.color, color: p.color} : {}}
            >
              {p.emoji} {p.name}
            </button>
          ))}
        </div>
        {/* Text Area */}
        <div className="relative">
          <textarea
            value={text} onChange={e => setText(e.target.value)}
            placeholder="投稿内容を入力..."
            rows={8}
            className="w-full resize-y"
          />
          <div className={`absolute bottom-2 right-2 text-xs orbitron ${isOverLimit ? 'text-red-400' : 'text-cyan-400/50'}`}>
            {charCount}{minLimit < Infinity ? ` / ${minLimit}` : ''}
          </div>
        </div>
        {/* Media URL */}
        <input value={mediaUrl} onChange={e => setMediaUrl(e.target.value)}
          placeholder="画像/動画 URL（オプション）" />
        {/* Schedule */}
        <div className="flex items-center gap-2">
          <input type="date" value={scheduleDate} onChange={e => setScheduleDate(e.target.value)}
            style={{width:'180px'}} />
          <button className="btn-cyan" onClick={schedulePost}>📅 スケジュール</button>
        </div>
        {/* Actions */}
        <div className="flex flex-wrap gap-2">
          <button className="btn-cyan" onClick={copyToClipboard}>📋 クリップボードにコピー</button>
          <button className="btn-cyan" onClick={saveDraft}>💾 下書き保存</button>
        </div>
        {/* Preview */}
        {text && (
          <div className="card p-3">
            <div className="text-xs orbitron text-cyan-400/50 mb-2">PREVIEW</div>
            <div className="text-sm whitespace-pre-wrap" style={{color:'rgba(255,255,255,0.7)'}}>{text}</div>
            {mediaUrl && (
              <div className="mt-2 p-2 rounded bg-black/30 text-xs" style={{color:'rgba(255,255,255,0.3)'}}>
                📎 {mediaUrl}
              </div>
            )}
          </div>
        )}
      </div>
      {/* Drafts Sidebar */}
      <div>
        <h3 className="orbitron text-xs text-cyan-400/60 mb-3 tracking-wider">SAVED DRAFTS ({drafts.length})</h3>
        <div className="space-y-2 max-h-96 overflow-y-auto">
          {drafts.length === 0 && (
            <div className="text-xs" style={{color:'rgba(255,255,255,0.2)'}}>下書きはありません</div>
          )}
          {drafts.map(d => (
            <div key={d.id} className="card p-2 cursor-pointer group" onClick={() => loadDraft(d)}>
              <div className="text-xs truncate" style={{color:'rgba(255,255,255,0.6)'}}>{d.text.slice(0,50)}...</div>
              <div className="flex items-center justify-between mt-1">
                <div className="flex gap-1">
                  {d.platforms.map(pid => {
                    const pl = platforms.find(x=>x.id===pid);
                    return pl ? <span key={pid} className="text-xs">{pl.emoji}</span> : null;
                  })}
                </div>
                <button onClick={e => { e.stopPropagation(); deleteDraft(d.id); }}
                  className="text-red-400/50 hover:text-red-400 text-xs opacity-0 group-hover:opacity-100">🗑</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Templates ───

            <div className="text-xs text-cyan-400/50 mt-2 orbitron">CLICK TO USE →</div>

}

// ─── Analytics Dashboard (mock) ───
function AnalyticsDashboard({ platforms }) {
  const canvasRef = useRef(null);
  const [bestTimes] = useState([
    { day: '月曜', time: '12:00-13:00', reason: 'ランチタイムのスマホチェック' },
    { day: '水曜', time: '20:00-21:00', reason: '週の中間リラックスタイム' },
    { day: '金曜', time: '18:00-19:00', reason: '週末前のSNSタイム' },
    { day: '土曜', time: '10:00-11:00', reason: '朝のゆったりブラウジング' },
  ]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    const days = ['月','火','水','木','金','土','日'];
    const barW = (w - 60) / 7;
    const maxH = h - 50;

    // Mock data per platform per day
    const mockData = platforms.map(p => ({
      id: p.id,
      color: p.color,
      values: days.map(() => Math.floor(Math.random() * 80 + 20))
    }));

    // Draw grid
    ctx.strokeStyle = 'rgba(0,255,255,0.06)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = 10 + (maxH - 10) * (i / 4);
      ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(w - 10, y); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '9px Orbitron';
      ctx.fillText(`${100 - i * 25}`, 5, y + 3);
    }

    // Draw bars
    const pCount = mockData.length;
    const subW = (barW - 8) / pCount;
    days.forEach((day, di) => {
      const x0 = 40 + di * barW;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '10px Noto Sans JP';
      ctx.textAlign = 'center';
      ctx.fillText(day, x0 + barW / 2, h - 5);
      mockData.forEach((pd, pi) => {
        const val = pd.values[di];
        const barH = (val / 100) * (maxH - 20);
        const bx = x0 + 4 + pi * subW;
        const by = maxH - barH;
        ctx.fillStyle = pd.color + '88';
        ctx.beginPath();
        ctx.roundRect(bx, by, subW - 1, barH, 2);
        ctx.fill();
      });
    });
  }, [platforms]);

  return (
    <div>
      <h2 className="orbitron text-sm text-cyan-400 mb-4 tracking-wider">ANALYTICS</h2>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 card p-4">
          <div className="text-xs orbitron text-cyan-400/50 mb-2">WEEKLY ENGAGEMENT (モック)</div>
          <canvas ref={canvasRef} style={{width:'100%',height:'220px'}} />
          <div className="flex flex-wrap gap-3 mt-3">
            {platforms.map(p => (
              <div key={p.id} className="flex items-center gap-1 text-xs" style={{color:p.color}}>
                <span style={{width:8,height:8,borderRadius:2,background:p.color,display:'inline-block'}} />
                {p.name}
              </div>
            ))}
          </div>
        </div>
        <div className="space-y-3">
          <div className="card p-4">
            <div className="text-xs orbitron text-cyan-400/50 mb-3">BEST POSTING TIMES</div>
            {bestTimes.map((bt, i) => (
              <div key={i} className="mb-2 pb-2" style={{borderBottom:'1px solid rgba(0,255,255,0.04)'}}>
                <div className="text-xs font-medium">{bt.day} {bt.time}</div>
                <div className="text-xs" style={{color:'rgba(255,255,255,0.3)'}}>{bt.reason}</div>
              </div>
            ))}
          </div>
          <div className="card p-4">
            <div className="text-xs orbitron text-cyan-400/50 mb-3">PLATFORM COMPARISON</div>
            {platforms.map(p => {
              const score = Math.floor(Math.random() * 60 + 40);
              return (
                <div key={p.id} className="mb-2">
                  <div className="flex justify-between text-xs mb-1">
                    <span>{p.emoji} {p.name}</span>
                    <span className="orbitron" style={{color:p.color}}>{score}</span>
                  </div>
                  <div style={{height:4,background:'rgba(255,255,255,0.05)',borderRadius:2}}>
                    <div style={{width:`${score}%`,height:'100%',background:p.color,borderRadius:2,opacity:0.6}} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Update Log ───
const DEFAULT_UPDATES = [
  { date: '2026-03-28', title: 'SNS Hub追加', desc: 'SNSコンテンツ管理ダッシュボードを新規追加' },
  { date: '2026-03-27', title: 'InfraScan AI招待制カード', desc: 'ポータルにInfraScan AI招待制カードを追加' },
  { date: '2026-03-26', title: 'TrackForge v0.3', desc: '歌詞カード・テイク管理・壁紙カスタマイズ機能追加' },
  { date: '2026-03-25', title: 'TunnelDrone v9', desc: 'スムーズ加速・減速、カーブ曲率減速、パスキャッシュ' },
  { date: '2026-03-24', title: 'Mega Rocket v69', desc: 'Firebase Deploy & GitHub管理移行完了' },
];

function UpdateLog({ setText, setTab, updates, setUpdates }) {
  const generateDraft = (update) => {
    const draft = `【Grace of Touch 更新情報】\n\n${update.title}\n${update.desc}\n\n日付: ${update.date}\n\n詳しくはこちら:\nhttps://grace-of-touch.web.app\n\n#GraceOfTouch #Update #WebApp`;
    setText(draft);
    setTab('composer');
  };

  const [newTitle, setNewTitle] = useState('');
  const [newDesc, setNewDesc] = useState('');

  const addUpdate = () => {
    if (!newTitle.trim()) return;
    const today = new Date().toISOString().slice(0, 10);
    setUpdates(prev => [{ date: today, title: newTitle, desc: newDesc }, ...prev]);
    setNewTitle(''); setNewDesc('');
  };

  return (
    <div>
      <h2 className="orbitron text-sm text-cyan-400 mb-4 tracking-wider">UPDATE LOG</h2>
      {/* Add new update */}
      <div className="card p-3 mb-4">
        <div className="text-xs orbitron text-cyan-400/50 mb-2">NEW UPDATE</div>
        <div className="flex gap-2 flex-wrap">
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="タイトル" style={{flex:'1',minWidth:'150px'}} />
          <input value={newDesc} onChange={e=>setNewDesc(e.target.value)} placeholder="説明" style={{flex:'2',minWidth:'200px'}} />
          <button className="btn-cyan" onClick={addUpdate}>+ 追加</button>
        </div>
      </div>
      {/* Updates list */}
      <div className="space-y-2">
        {updates.map((u, i) => (
          <div key={i} className="card p-3 flex items-center justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2">
                <span className="text-xs orbitron" style={{color:'rgba(0,255,255,0.4)'}}>{u.date}</span>
                <span className="text-sm font-medium truncate">{u.title}</span>
              </div>
              <div className="text-xs mt-1" style={{color:'rgba(255,255,255,0.35)'}}>{u.desc}</div>
            </div>
            <button className="btn-cyan whitespace-nowrap" onClick={() => generateDraft(u)}>
              📝 下書き生成
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [tab, setTab] = useState('platforms');
  const [toast, setToastMsg] = useState('');
  const [composerText, setComposerText] = useState('');

  const saved = useMemo(() => loadData(), []);
  const [platforms, setPlatforms] = useState(saved?.platforms || DEFAULT_PLATFORMS);
  const [events, setEvents] = useState(saved?.events || []);
  const [drafts, setDrafts] = useState(saved?.drafts || []);
  const [updates, setUpdates] = useState(saved?.updates || DEFAULT_UPDATES);

  // Auto-save
  useEffect(() => {
    const timer = setTimeout(() => {
      saveData({ platforms, events, drafts, updates });
    }, 500);
    return () => clearTimeout(timer);
  }, [platforms, events, drafts, updates]);

  const setToast = (msg) => {
    setToastMsg(msg);
    setTimeout(() => setToastMsg(''), 3000);
  };

  const tabs = [
    { id: 'platforms', label: '📡 プラットフォーム', },
    { id: 'calendar', label: '📅 カレンダー' },
    { id: 'composer', label: '✍️ 投稿作成' },
    { id: 'templates', label: '📋 テンプレート' },
    { id: 'analytics', label: '📊 アナリティクス' },
    { id: 'updates', label: '📰 更新ログ' },
  ];

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="sticky top-0 z-50" style={{background:'rgba(2,5,16,0.95)',borderBottom:'1px solid rgba(0,255,255,0.08)',backdropFilter:'blur(10px)'}}>
        <div className="max-w-7xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <a href="index.html" className="text-cyan-400/50 hover:text-cyan-400 transition text-sm">← Portal</a>
              <div>
                <h1 className="orbitron text-lg text-cyan-400 glow-cyan tracking-wider">SNS HUB</h1>
                <div className="text-xs" style={{color:'rgba(255,255,255,0.3)'}}>Grace of Touch — Content Management</div>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs orbitron" style={{color:'rgba(0,255,255,0.3)'}}>
                {platforms.filter(p=>p.active).length}/{platforms.length} ACTIVE
              </span>
              <span className="text-xs" style={{color:'rgba(255,255,255,0.2)'}}>|</span>
              <span className="text-xs orbitron" style={{color:'rgba(0,255,255,0.3)'}}>
                {drafts.length} DRAFTS
              </span>
              <span className="text-xs" style={{color:'rgba(255,255,255,0.2)'}}>|</span>
              <span className="text-xs orbitron" style={{color:'rgba(0,255,255,0.3)'}}>
                {events.length} SCHEDULED
              </span>
            </div>
          </div>
          {/* Tabs */}
          <div className="flex gap-1 mt-3 overflow-x-auto pb-1">
            {tabs.map(t => (
              <button key={t.id}
                className={`tab-btn whitespace-nowrap ${tab === t.id ? 'active' : ''}`}
                onClick={() => setTab(t.id)}
              >
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* Content */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab === 'platforms' && <PlatformCards platforms={platforms} setPlatforms={setPlatforms} />}
        {tab === 'calendar' && <ContentCalendar events={events} setEvents={setEvents} platforms={platforms} />}
        {tab === 'composer' && <QuickComposer platforms={platforms} events={events} setEvents={setEvents}
          setToast={setToast} drafts={drafts} setDrafts={setDrafts}
          initialText={composerText} clearInitialText={() => setComposerText('')} />}
        {tab === 'templates' && <TemplatesSection setText={setComposerText} setTab={setTab} />}
        {tab === 'analytics' && <AnalyticsDashboard platforms={platforms} />}
        {tab === 'updates' && <UpdateLog setText={setComposerText} setTab={setTab} updates={updates} setUpdates={setUpdates} />}
      </main>

      {/* Footer */}
      <footer className="text-center py-4" style={{borderTop:'1px solid rgba(0,255,255,0.04)'}}>
        <div className="text-xs" style={{color:'rgba(255,255,255,0.15)'}}>
          © 2024-2026 Grace of Touch Co. All rights reserved.
        </div>
      </footer>

      <Toast message={toast} />
    </div>
  );
}

// Handle template/update text being set from other tabs
function AppWrapper() {
  // We lift the composerText into the main App via a ref-like pattern
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
