<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="author" content="Grace of Touch Co. / Yuuichi Onozaki">
<meta name="copyright" content="© 2024-2026 Grace of Touch Co. All rights reserved.">
<title>AR Golf — Grace of Touch</title>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;background:#0a1a0a;font-family:'Noto Sans JP','Orbitron',sans-serif;touch-action:none;user-select:none;}
canvas{display:block;}

/* HUD Overlay */
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#hud *{pointer-events:auto;}

/* Top bar */
#top-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,transparent 100%);}
#hole-info{font-family:'Orbitron',monospace;color:#00ffcc;font-size:14px;line-height:1.6;}
#hole-info .hole-num{font-size:22px;font-weight:900;color:#fff;}
#hole-info .par{font-size:11px;color:rgba(0,255,204,0.7);letter-spacing:0.15em;}
#score-info{text-align:right;font-family:'Orbitron',monospace;color:#00ffcc;font-size:12px;line-height:1.6;}
#score-info .stroke{font-size:20px;font-weight:700;color:#fff;}
#wind-info{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;
  color:rgba(0,255,204,0.6);font-size:10px;text-align:center;letter-spacing:0.1em;}
#wind-arrow{font-size:20px;display:block;}
#distance{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;
  color:#fff;font-size:13px;text-shadow:0 0 8px rgba(0,255,204,0.5);}

/* Bottom controls */
#controls{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 24px;
  background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,transparent 100%);
  display:flex;flex-direction:column;align-items:center;gap:10px;}

/* Direction slider */
#dir-row{display:flex;align-items:center;gap:10px;width:100%;max-width:360px;}
#dir-row label{font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,255,204,0.5);letter-spacing:0.1em;min-width:40px;}
#dir-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;
  background:linear-gradient(90deg,#ff4444,#00ff88 50%,#ff4444);outline:none;}
#dir-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#fff;border:2px solid #00ffcc;cursor:pointer;}
#dir-value{font-family:'Orbitron',monospace;font-size:11px;color:#00ffcc;min-width:35px;text-align:right;}

/* Angle slider */
#angle-row{display:flex;align-items:center;gap:10px;width:100%;max-width:360px;}
#angle-row label{font-family:'Orbitron',monospace;font-size:9px;color:rgba(0,255,204,0.5);letter-spacing:0.1em;min-width:40px;}
#angle-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;
  background:linear-gradient(90deg,#4488ff,#00ff88,#ffaa00);outline:none;}
#angle-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#fff;border:2px solid #00ffcc;cursor:pointer;}
#angle-value{font-family:'Orbitron',monospace;font-size:11px;color:#00ffcc;min-width:35px;text-align:right;}

/* Power bar */
#power-container{width:100%;max-width:360px;height:28px;border-radius:14px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(0,255,204,0.2);overflow:hidden;position:relative;}
#power-fill{height:100%;width:0%;border-radius:14px;transition:none;
  background:linear-gradient(90deg,#00ff88 0%,#ffff00 50%,#ff4444 100%);}
#power-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:11px;color:#fff;text-shadow:0 0 4px #000;letter-spacing:0.1em;}

/* Swing button */
#swing-btn{width:100%;max-width:360px;height:54px;border-radius:27px;border:2px solid #00ffcc;
  background:linear-gradient(135deg,rgba(0,255,204,0.15),rgba(0,255,204,0.05));
  color:#00ffcc;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;letter-spacing:0.2em;
  cursor:pointer;transition:all 0.15s;text-shadow:0 0 12px rgba(0,255,204,0.5);}
#swing-btn:active{background:rgba(0,255,204,0.3);transform:scale(0.97);}
#swing-btn:disabled{opacity:0.3;cursor:default;}

/* Camera buttons */
#cam-btns{display:flex;gap:8px;}
.cam-btn{padding:6px 14px;border-radius:12px;border:1px solid rgba(0,255,204,0.2);
  background:rgba(0,255,204,0.05);color:rgba(0,255,204,0.6);font-family:'Orbitron',monospace;
  font-size:9px;letter-spacing:0.1em;cursor:pointer;transition:all 0.15s;}
.cam-btn.active{background:rgba(0,255,204,0.2);color:#00ffcc;border-color:#00ffcc;}

/* Next hole / result */
#next-btn{display:none;width:100%;max-width:360px;height:48px;border-radius:24px;border:2px solid #ffcc00;
  background:linear-gradient(135deg,rgba(255,204,0,0.2),rgba(255,204,0,0.05));
  color:#ffcc00;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:0.2em;cursor:pointer;}

/* Event popup */
#event-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-family:'Orbitron',monospace;font-size:clamp(24px,5vw,42px);font-weight:900;
  color:#fff;text-shadow:0 0 30px rgba(0,255,204,0.8),0 0 60px rgba(0,255,204,0.4);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),opacity 0.5s;opacity:0;
  text-align:center;white-space:nowrap;pointer-events:none;}
#event-popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;}

/* Mini-map */
#minimap{position:absolute;bottom:180px;right:12px;width:100px;height:100px;
  border-radius:8px;border:1px solid rgba(0,255,204,0.2);background:rgba(0,0,0,0.6);overflow:hidden;}
#minimap canvas{width:100%;height:100%;}

/* Scorecard overlay */
#scorecard{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:20;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#scorecard.show{display:flex;}
#scorecard h2{font-family:'Orbitron',monospace;font-size:24px;color:#00ffcc;letter-spacing:0.2em;}
#scorecard table{border-collapse:collapse;font-family:'Orbitron',monospace;font-size:13px;color:#fff;}
#scorecard th,#scorecard td{padding:8px 16px;border:1px solid rgba(0,255,204,0.2);text-align:center;}
#scorecard th{color:#00ffcc;font-size:10px;letter-spacing:0.1em;}
#scorecard .under{color:#00ff88;}
#scorecard .over{color:#ff6644;}
#scorecard .par-score{color:#fff;}
#restart-btn{padding:12px 32px;border-radius:24px;border:2px solid #00ffcc;background:rgba(0,255,204,0.1);
  color:#00ffcc;font-family:'Orbitron',monospace;font-size:14px;cursor:pointer;letter-spacing:0.15em;}

/* Fireworks canvas */
#fireworks{position:absolute;inset:0;pointer-events:none;z-index:15;}

/* Motion permission */
#motion-req{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  padding:20px 32px;border-radius:16px;background:rgba(0,0,0,0.9);border:1px solid #00ffcc;
  color:#00ffcc;font-family:'Orbitron',monospace;font-size:12px;text-align:center;cursor:pointer;z-index:30;}
</style>
</head>
<body>

<div id="hud">
  <!-- Top bar -->
  <div id="top-bar">
    <div id="hole-info">
      <div class="hole-num">HOLE <span id="hole-num">1</span></div>
      <div class="par">PAR <span id="par-num">4</span></div>
    </div>
    <div id="wind-info">
      <span id="wind-arrow">&#8593;</span>
      WIND <span id="wind-speed">3</span>m/s
    </div>
    <div id="score-info">
      <div class="stroke">STROKE <span id="stroke-num">0</span></div>
      <div style="font-size:10px;color:rgba(0,255,204,0.5)">TOTAL <span id="total-score">0</span></div>
    </div>
  </div>
  <div id="distance">PIN: <span id="dist-val">250</span>m</div>

  <!-- Mini-map -->
  <div id="minimap"><canvas id="minimap-canvas" width="100" height="100"></canvas></div>

  <!-- Event popup -->
  <div id="event-popup"></div>

  <!-- Bottom controls -->
  <div id="controls">
    <div id="dir-row">
      <label>DIR</label>
      <input type="range" id="dir-slider" min="-30" max="30" value="0" step="1">
      <span id="dir-value">0&deg;</span>
    </div>
    <div id="angle-row">
      <label>LOFT</label>
      <input type="range" id="angle-slider" min="10" max="70" value="35" step="1">
      <span id="angle-value">35&deg;</span>
    </div>
    <div id="power-container">
      <div id="power-fill"></div>
      <div id="power-text">HOLD TO CHARGE</div>
    </div>
    <button id="swing-btn">SWING</button>
    <div id="cam-btns">
      <button class="cam-btn active" data-cam="top">TOP</button>
      <button class="cam-btn" data-cam="follow">FOLLOW</button>
      <button class="cam-btn" data-cam="fps">FPS</button>
    </div>
    <button id="next-btn">NEXT HOLE &#9654;</button>
  </div>

  <!-- Scorecard -->
  <div id="scorecard">
    <h2>SCORECARD</h2>
    <table id="score-table">
      <tr><th>HOLE</th><th>PAR</th><th>SCORE</th><th>+/-</th></tr>
    </table>
    <div id="total-result" style="font-family:'Orbitron',monospace;font-size:18px;color:#00ffcc;margin-top:8px;"></div>
    <button id="restart-btn">PLAY AGAIN</button>
  </div>

  <div id="motion-req">TAP TO ENABLE<br>MOTION SENSOR</div>
</div>

<canvas id="fireworks"></canvas>

<script>
// © 2024-2026 Grace of Touch Co. / Yuuichi Onozaki. All rights reserved.
'use strict';

// ======== COURSE DEFINITIONS ========
const HOLES = [
  { // Hole 1: Straight, river crossing
    par: 4, name: 'Riverside Drive',
    tee: {x:0, z:120}, green: {x:0, z:-120, r:8},
    flag: {x:0, z:-120},
    river: {x:0, z:20, w:200, d:20}, // z-center, width, depth
    buildings: [
      {x:-60,z:0,w:12,h:30,d:12},{x:-65,z:-40,w:15,h:45,d:15},{x:-55,z:40,w:10,h:20,d:10},
      {x:60,z:0,w:14,h:35,d:14},{x:55,z:-50,w:10,h:25,d:10},{x:65,z:30,w:12,h:40,d:12}
    ],
    tunnel: null,
    trees: [{x:-25,z:60},{x:20,z:80},{x:-15,z:-30},{x:30,z:-60},{x:-35,z:-80},{x:25,z:40},{x:-40,z:10},{x:40,z:-20}],
    hills: [{x:30,z:50,r:20,h:4},{x:-20,z:-50,r:25,h:5},{x:0,z:-90,r:15,h:3}],
    windDir: Math.PI * 0.1, windSpeed: 3
  },
  { // Hole 2: Dogleg left around buildings
    par: 4, name: 'City Dogleg',
    tee: {x:50, z:120}, green: {x:-60, z:-100, r:7},
    flag: {x:-60, z:-100},
    river: null,
    buildings: [
      {x:10,z:20,w:30,h:50,d:30},{x:-10,z:-20,w:20,h:40,d:20},{x:30,z:-30,w:15,h:35,d:15},
      {x:50,z:-60,w:12,h:28,d:12},{x:-50,z:50,w:10,h:22,d:10}
    ],
    tunnel: null,
    trees: [{x:-30,z:100},{x:80,z:80},{x:-70,z:0},{x:-80,z:-60},{x:70,z:-80},{x:-40,z:-50},{x:30,z:60}],
    hills: [{x:-30,z:-70,r:20,h:4},{x:50,z:40,r:18,h:3},{x:-60,z:30,r:22,h:5}],
    windDir: Math.PI * 0.7, windSpeed: 5
  },
  { // Hole 3: Through tunnel to hidden green
    par: 3, name: 'Tunnel Shot',
    tee: {x:0, z:100}, green: {x:0, z:-110, r:6},
    flag: {x:0, z:-110},
    river: {x:0, z:-70, w:160, d:14},
    buildings: [
      {x:-40,z:-30,w:14,h:35,d:14},{x:40,z:-30,w:14,h:35,d:14},
      {x:-50,z:-90,w:10,h:25,d:10},{x:50,z:-90,w:10,h:25,d:10}
    ],
    tunnel: {x:0, z:0, rx:8, rz:30}, // center, radius x, length z
    trees: [{x:-20,z:70},{x:25,z:60},{x:-35,z:-50},{x:35,z:-50},{x:0,z:50},{x:-50,z:20},{x:50,z:20}],
    hills: [{x:0,z:-100,r:12,h:2},{x:-30,z:50,r:15,h:3},{x:30,z:50,r:15,h:3}],
    windDir: Math.PI * 1.5, windSpeed: 4
  }
];

// ======== STATE ========
let currentHole = 0;
let strokes = 0;
let totalScore = 0;
let scores = [];
let ballState = 'ready'; // ready, charging, flying, rolling, stopped, event
let power = 0;
let charging = false;
let chargeDir = 1;
let cameraMode = 'top';
let ballPos = new THREE.Vector3();
let ballVel = new THREE.Vector3();
let ballOnGround = false;
let bounceCount = 0;
let hasMotion = false;
let motionPower = 0;

// Wind
let windDir = 0, windSpeed = 3;

// ======== THREE.JS SETUP ========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.003);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 800);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.insertBefore(renderer.domElement, document.getElementById('hud'));

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 80, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048,2048);
dirLight.shadow.camera.left = -150;
dirLight.shadow.camera.right = 150;
dirLight.shadow.camera.top = 150;
dirLight.shadow.camera.bottom = -150;
scene.add(dirLight);

// ======== MATERIALS ========
const grassMat = new THREE.MeshLambertMaterial({color:0x3a8c3a});
const greenMat = new THREE.MeshLambertMaterial({color:0x2ecc71});
const waterMat = new THREE.MeshPhongMaterial({color:0x2288dd, transparent:true, opacity:0.6, shininess:100});
const buildingMat = new THREE.MeshLambertMaterial({color:0x778899});
const buildingMat2 = new THREE.MeshLambertMaterial({color:0x607080});
const trunkMat = new THREE.MeshLambertMaterial({color:0x8B4513});
const leafMat = new THREE.MeshLambertMaterial({color:0x228B22});
const flagMat = new THREE.MeshLambertMaterial({color:0xff2222});
const poleMat = new THREE.MeshLambertMaterial({color:0xcccccc});
const ballMat = new THREE.MeshPhongMaterial({color:0xffffff, shininess:80});
const tunnelMat = new THREE.MeshLambertMaterial({color:0x555555, side: THREE.DoubleSide});
const sandMat = new THREE.MeshLambertMaterial({color:0xf0d090});

// ======== COURSE GROUP ========
let courseGroup = new THREE.Group();
scene.add(courseGroup);

// Ball
const ballGeo = new THREE.SphereGeometry(0.5, 16, 16);
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.castShadow = true;
scene.add(ball);

// Ball trail
const trailPoints = [];
let trailLine = null;

// Shadow under ball
const shadowGeo = new THREE.CircleGeometry(0.8, 16);
const shadowMat = new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.3});
const ballShadow = new THREE.Mesh(shadowGeo, shadowMat);
ballShadow.rotation.x = -Math.PI/2;
scene.add(ballShadow);

// Direction arrow
const arrowGroup = new THREE.Group();
const arrowBody = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,6,8), new THREE.MeshBasicMaterial({color:0x00ffcc, transparent:true, opacity:0.6}));
arrowBody.position.y = 0.3;
arrowBody.rotation.z = Math.PI/2;
arrowBody.position.z = -3;
const arrowHead = new THREE.Mesh(new THREE.ConeGeometry(0.5,1.5,8), new THREE.MeshBasicMaterial({color:0x00ffcc, transparent:true, opacity:0.8}));
arrowHead.rotation.x = -Math.PI/2;
arrowHead.position.z = -6.5;
arrowHead.position.y = 0.3;
arrowGroup.add(arrowBody, arrowHead);
scene.add(arrowGroup);

// ======== TERRAIN HEIGHT ========
let terrainHills = [];

function getTerrainHeight(x, z) {
  let h = 0;
  for (const hill of terrainHills) {
    const dx = x - hill.x, dz = z - hill.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < hill.r) {
      h += hill.h * (1 - dist/hill.r) * (1 - dist/hill.r);
    }
  }
  return h;
}

// ======== BUILD COURSE ========
let riverMesh = null;
let tunnelMesh = null;
let greenMesh = null;
let holeMesh = null;
let buildingMeshes = [];
let riverBounds = null;
let tunnelBounds = null;

function clearCourse() {
  while (courseGroup.children.length) courseGroup.remove(courseGroup.children[0]);
  buildingMeshes = [];
  riverMesh = null;
  tunnelMesh = null;
  greenMesh = null;
  riverBounds = null;
  tunnelBounds = null;
  terrainHills = [];
}

function buildCourse(idx) {
  clearCourse();
  const h = HOLES[idx];
  terrainHills = h.hills || [];

  // Ground plane
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300, 60, 60), grassMat);
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  // Deform vertices for hills
  const pos = ground.geometry.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getY(i); // plane is XY before rotation
    pos.setZ(i, getTerrainHeight(x, -z));
  }
  ground.geometry.computeVertexNormals();
  courseGroup.add(ground);

  // Fairway (lighter strip)
  const fwMat = new THREE.MeshLambertMaterial({color:0x4CAF50});
  const fw = new THREE.Mesh(new THREE.PlaneGeometry(30,260,1,1), fwMat);
  fw.rotation.x = -Math.PI/2;
  fw.position.y = 0.02;
  fw.position.x = (h.tee.x + h.green.x) / 2;
  fw.position.z = (h.tee.z + h.green.z) / 2;
  fw.receiveShadow = true;
  const angle = Math.atan2(h.green.x - h.tee.x, h.green.z - h.tee.z);
  fw.rotation.z = -angle;
  courseGroup.add(fw);

  // Tee box
  const teeBox = new THREE.Mesh(new THREE.BoxGeometry(4,0.15,4), new THREE.MeshLambertMaterial({color:0x5cb85c}));
  teeBox.position.set(h.tee.x, 0.08 + getTerrainHeight(h.tee.x, h.tee.z), h.tee.z);
  teeBox.receiveShadow = true;
  courseGroup.add(teeBox);

  // Tee marker
  const teeMarkerL = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8), new THREE.MeshLambertMaterial({color:0xff4444}));
  teeMarkerL.position.set(h.tee.x-1.5, 0.4+getTerrainHeight(h.tee.x, h.tee.z), h.tee.z);
  const teeMarkerR = teeMarkerL.clone();
  teeMarkerR.position.x = h.tee.x+1.5;
  courseGroup.add(teeMarkerL, teeMarkerR);

  // Green
  const greenGeo = new THREE.CircleGeometry(h.green.r, 32);
  greenMesh = new THREE.Mesh(greenGeo, greenMat);
  greenMesh.rotation.x = -Math.PI/2;
  greenMesh.position.set(h.green.x, 0.03 + getTerrainHeight(h.green.x, h.green.z), h.green.z);
  greenMesh.receiveShadow = true;
  courseGroup.add(greenMesh);

  // Hole (dark circle)
  holeMesh = new THREE.Mesh(new THREE.CircleGeometry(0.5, 16), new THREE.MeshBasicMaterial({color:0x111111}));
  holeMesh.rotation.x = -Math.PI/2;
  holeMesh.position.set(h.flag.x, 0.05 + getTerrainHeight(h.flag.x, h.flag.z), h.flag.z);
  courseGroup.add(holeMesh);

  // Flag
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,4,6), poleMat);
  pole.position.set(h.flag.x, 2 + getTerrainHeight(h.flag.x, h.flag.z), h.flag.z);
  courseGroup.add(pole);
  const flag = new THREE.Mesh(new THREE.PlaneGeometry(1.5,0.8), flagMat);
  flag.position.set(h.flag.x + 0.75, 3.8 + getTerrainHeight(h.flag.x, h.flag.z), h.flag.z);
  flag.material.side = THREE.DoubleSide;
  courseGroup.add(flag);

  // River
  if (h.river) {
    const rv = h.river;
    riverMesh = new THREE.Mesh(new THREE.PlaneGeometry(rv.w, rv.d, 20, 4), waterMat.clone());
    riverMesh.rotation.x = -Math.PI/2;
    riverMesh.position.set(rv.x, -0.3, rv.z);
    courseGroup.add(riverMesh);
    riverBounds = {xMin: rv.x - rv.w/2, xMax: rv.x + rv.w/2, zMin: rv.z - rv.d/2, zMax: rv.z + rv.d/2};

    // River banks (sand)
    const bankN = new THREE.Mesh(new THREE.PlaneGeometry(rv.w, 2), sandMat);
    bankN.rotation.x = -Math.PI/2;
    bankN.position.set(rv.x, 0.01, rv.z - rv.d/2 - 1);
    const bankS = bankN.clone();
    bankS.position.z = rv.z + rv.d/2 + 1;
    courseGroup.add(bankN, bankS);
  }

  // Buildings
  for (const b of h.buildings) {
    const mat = Math.random() > 0.5 ? buildingMat : buildingMat2;
    const bldg = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), mat.clone());
    bldg.position.set(b.x, b.h/2, b.z);
    bldg.castShadow = true;
    bldg.receiveShadow = true;
    // Windows
    const winMat = new THREE.MeshBasicMaterial({color:0xffffcc, transparent:true, opacity:0.6});
    for (let wy = 3; wy < b.h - 2; wy += 4) {
      for (let wx = -b.w/2+2; wx < b.w/2-1; wx += 3) {
        const win = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.5), winMat);
        win.position.set(b.x + wx, wy, b.z + b.d/2 + 0.01);
        courseGroup.add(win);
      }
    }
    courseGroup.add(bldg);
    buildingMeshes.push({mesh:bldg, bounds:{
      xMin:b.x-b.w/2, xMax:b.x+b.w/2, zMin:b.z-b.d/2, zMax:b.z+b.d/2, yMax:b.h
    }});
  }

  // Tunnel
  if (h.tunnel) {
    const t = h.tunnel;
    const tunGeo = new THREE.CylinderGeometry(t.rx, t.rx, t.rz*2, 16, 1, true);
    tunnelMesh = new THREE.Mesh(tunGeo, tunnelMat);
    tunnelMesh.rotation.x = Math.PI/2;
    tunnelMesh.position.set(t.x, t.rx * 0.5, t.z);
    courseGroup.add(tunnelMesh);
    tunnelBounds = {x:t.x, z:t.z, rx:t.rx, rz:t.rz};

    // Tunnel opening rings
    const ringGeo = new THREE.TorusGeometry(t.rx, 0.3, 8, 24);
    const ringMat = new THREE.MeshLambertMaterial({color:0x666666});
    const ring1 = new THREE.Mesh(ringGeo, ringMat);
    ring1.position.set(t.x, t.rx*0.5, t.z + t.rz);
    courseGroup.add(ring1);
    const ring2 = ring1.clone();
    ring2.position.z = t.z - t.rz;
    courseGroup.add(ring2);
  }

  // Trees
  for (const t of h.trees) {
    const th = getTerrainHeight(t.x, t.z);
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,3,6), trunkMat);
    trunk.position.set(t.x, 1.5 + th, t.z);
    trunk.castShadow = true;
    const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 5, 8), leafMat);
    leaves.position.set(t.x, 5.5 + th, t.z);
    leaves.castShadow = true;
    courseGroup.add(trunk, leaves);
  }

  // Sky dome gradient
  // (using fog + background is enough)

  // Set wind
  windDir = h.windDir;
  windSpeed = h.windSpeed;
  updateWindUI();
}

const minimapCanvas = document.getElementById('minimap-canvas');

function drawMinimap() {
  const h = HOLES[currentHole];
  mctx.clearRect(0,0,100,100);
  mctx.fillStyle = '#1a3a1a';
  mctx.fillRect(0,0,100,100);

  const scale = 0.3;
  const ox = 50, oz = 50;

  // River
  if (h.river) {
    mctx.fillStyle = 'rgba(34,136,221,0.5)';
    const rv = h.river;
    mctx.fillRect(ox + (rv.x-rv.w/2)*scale, oz + (rv.z-rv.d/2)*scale, rv.w*scale, rv.d*scale);
  }

  // Buildings
  mctx.fillStyle = '#667';
  for (const b of h.buildings) {
    mctx.fillRect(ox+(b.x-b.w/2)*scale, oz+(b.z-b.d/2)*scale, b.w*scale, b.d*scale);
  }

  // Green
  mctx.fillStyle = '#2ecc71';
  mctx.beginPath();
  mctx.arc(ox + h.green.x*scale, oz + h.green.z*scale, h.green.r*scale, 0, Math.PI*2);
  mctx.fill();

  // Flag
  mctx.fillStyle = '#ff2222';
  mctx.fillRect(ox + h.flag.x*scale - 1, oz + h.flag.z*scale - 1, 3, 3);

  // Ball
  mctx.fillStyle = '#fff';
  mctx.beginPath();
  mctx.arc(ox + ballPos.x*scale, oz + ballPos.z*scale, 2, 0, Math.PI*2);
  mctx.fill();

  // Tee
  mctx.fillStyle = '#ff4444';
  mctx.fillRect(ox + h.tee.x*scale - 1, oz + h.tee.z*scale - 1, 3, 3);
}

const fwCanvas = document.getElementById('fireworks');
const fwCtx = fwCanvas.getContext('2d');
let fireworks = [];
let fwActive = false;

function resizeFW() {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
resizeFW();

class Particle {
  constructor(x,y,color) {
    this.x = x; this.y = y;
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*5+2;
    this.vx = Math.cos(angle)*speed;
    this.vy = Math.sin(angle)*speed;
    this.color = color;
    this.life = 1;
    this.decay = Math.random()*0.02+0.01;
    this.size = Math.random()*3+1;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.05;
    this.life -= this.decay;
  }
  draw(ctx) {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function launchFireworks() {
  fwActive = true;
  const colors = ['#ff0044','#ffcc00','#00ffcc','#ff8800','#ff00ff','#00ff88'];
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const x = Math.random()*fwCanvas.width*0.6 + fwCanvas.width*0.2;
      const y = Math.random()*fwCanvas.height*0.3 + fwCanvas.height*0.1;
      const c = colors[Math.floor(Math.random()*colors.length)];
      for (let j = 0; j < 60; j++) fireworks.push(new Particle(x,y,c));
    }, i*400);
  }
  setTimeout(() => { fwActive = false; }, 4000);
}

function updateFireworks() {
  if (!fwActive && fireworks.length === 0) return;
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  for (let i = fireworks.length-1; i >= 0; i--) {
    fireworks[i].update();
    fireworks[i].draw(fwCtx);
    if (fireworks[i].life <= 0) fireworks.splice(i,1);
  }
  fwCtx.globalAlpha = 1;
}

// ======== SPLASH EFFECT ========
let splashParticles = [];

function createSplash(x, y, z) {
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.15, 4, 4);
    const mat = new THREE.MeshBasicMaterial({color:0x44aaff, transparent:true, opacity:0.8});
    const p = new THREE.Mesh(geo, mat);
    p.position.set(x, y, z);
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*0.3+0.1;
    p.userData.vel = new THREE.Vector3(Math.cos(angle)*speed, Math.random()*0.4+0.2, Math.sin(angle)*speed);
    p.userData.life = 1;
    scene.add(p);
    splashParticles.push(p);
  }
}

function updateSplash(dt) {
  for (let i = splashParticles.length-1; i >= 0; i--) {
    const p = splashParticles[i];
    p.userData.vel.y -= 0.015;
    p.position.add(p.userData.vel);
    p.userData.life -= 0.03;
    p.material.opacity = p.userData.life;
    if (p.userData.life <= 0) {
      scene.remove(p);
      splashParticles.splice(i,1);
    }
  }
}

// ======== CRASH EFFECT ========
let crashParticles = [];

function createCrash(x, y, z) {
  for (let i = 0; i < 15; i++) {
    const geo = new THREE.BoxGeometry(0.3,0.3,0.3);
    const mat = new THREE.MeshBasicMaterial({color:0xffaa44, transparent:true, opacity:0.9});
    const p = new THREE.Mesh(geo, mat);
    p.position.set(x, y, z);
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*0.2+0.05;
    p.userData.vel = new THREE.Vector3(Math.cos(angle)*speed, Math.random()*0.3+0.1, Math.sin(angle)*speed);
    p.userData.life = 1;
    scene.add(p);
    crashParticles.push(p);
  }
}

function updateCrash(dt) {
  for (let i = crashParticles.length-1; i >= 0; i--) {
    const p = crashParticles[i];
    p.userData.vel.y -= 0.01;
    p.position.add(p.userData.vel);
    p.userData.life -= 0.025;
    p.material.opacity = p.userData.life;
    p.rotation.x += 0.1;
    p.rotation.z += 0.1;
    if (p.userData.life <= 0) {
      scene.remove(p);
      crashParticles.splice(i,1);
    }
  }
}

// ======== BALL PHYSICS ========
const GRAVITY = -18;
const FRICTION = 0.985;
const GROUND_FRICTION = 0.96;
const BOUNCE_DAMP = 0.4;
const ROLL_STOP = 0.15;

function resetBall() {
  const h = HOLES[currentHole];
  const th = getTerrainHeight(h.tee.x, h.tee.z);
  ballPos.set(h.tee.x, 0.5 + th, h.tee.z);
  ballVel.set(0,0,0);
  ball.position.copy(ballPos);
  ballState = 'ready';
  bounceCount = 0;
  power = 0;
  $powerFill.style.width = '0%';
  $powerText.textContent = 'HOLD TO CHARGE';
  $swingBtn.disabled = false;
  $swingBtn.textContent = 'SWING';
  $nextBtn.style.display = 'none';
  arrowGroup.visible = true;
  updateArrow();
  clearTrail();
}

function swing() {
  if (ballState !== 'ready') return;
  strokes++;
  updateHoleUI();

  const h = HOLES[currentHole];
  const dirDeg = parseFloat($dirSlider.value);
  const angleDeg = parseFloat($angleSlider.value);
  const pw = power / 100;

  // Base direction: toward flag
  const toFlagX = h.flag.x - ballPos.x;
  const toFlagZ = h.flag.z - ballPos.z;
  const baseAngle = Math.atan2(toFlagX, toFlagZ);

  // Apply direction offset
  const finalDir = baseAngle + (dirDeg * Math.PI / 180);

  // Power → speed (max ~50 m/s)
  const speed = pw * 55;
  const launchAngle = angleDeg * Math.PI / 180;

  ballVel.x = Math.sin(finalDir) * Math.cos(launchAngle) * speed;
  ballVel.y = Math.sin(launchAngle) * speed;
  ballVel.z = Math.cos(finalDir) * Math.cos(launchAngle) * speed;

  ballState = 'flying';
  bounceCount = 0;
  arrowGroup.visible = false;
  $swingBtn.disabled = true;
  $swingBtn.textContent = '...';
  clearTrail();
}

function updateBall(dt) {
  if (ballState !== 'flying' && ballState !== 'rolling') return;

  // Wind effect
  ballVel.x += Math.sin(windDir) * windSpeed * 0.008 * dt;
  ballVel.z += Math.cos(windDir) * windSpeed * 0.008 * dt;

  // Gravity
  if (ballState === 'flying') {
    ballVel.y += GRAVITY * dt;
  }

  // Air friction
  if (ballState === 'flying') {
    ballVel.x *= (1 - 0.002);
    ballVel.z *= (1 - 0.002);
  }

  // Move
  ballPos.x += ballVel.x * dt;
  ballPos.y += ballVel.y * dt;
  ballPos.z += ballVel.z * dt;

  // Terrain height
  const terrH = getTerrainHeight(ballPos.x, ballPos.z);

  // Ground collision
  if (ballPos.y <= 0.5 + terrH) {
    ballPos.y = 0.5 + terrH;

    // Check water hazard
    if (riverBounds && ballPos.x > riverBounds.xMin && ballPos.x < riverBounds.xMax
        && ballPos.z > riverBounds.zMin && ballPos.z < riverBounds.zMax) {
      waterHazard();
      return;
    }

    // Check building collision
    for (const b of buildingMeshes) {
      const bb = b.bounds;
      if (ballPos.x > bb.xMin && ballPos.x < bb.xMax && ballPos.z > bb.zMin && ballPos.z < bb.zMax) {
        buildingHit();
        return;
      }
    }

    if (ballState === 'flying') {
      bounceCount++;
      if (Math.abs(ballVel.y) < 1.5 || bounceCount > 4) {
        ballState = 'rolling';
        ballVel.y = 0;
      } else {
        ballVel.y = -ballVel.y * BOUNCE_DAMP;
        ballVel.x *= 0.8;
        ballVel.z *= 0.8;
      }
    }

    if (ballState === 'rolling') {
      ballVel.y = 0;
      ballVel.x *= GROUND_FRICTION;
      ballVel.z *= GROUND_FRICTION;

      // Slope effect
      const sampleDist = 1;
      const hL = getTerrainHeight(ballPos.x - sampleDist, ballPos.z);
      const hR = getTerrainHeight(ballPos.x + sampleDist, ballPos.z);
      const hF = getTerrainHeight(ballPos.x, ballPos.z - sampleDist);
      const hB = getTerrainHeight(ballPos.x, ballPos.z + sampleDist);
      ballVel.x += (hL - hR) * 0.3 * dt;
      ballVel.z += (hF - hB) * 0.3 * dt;

      const speed = Math.sqrt(ballVel.x*ballVel.x + ballVel.z*ballVel.z);
      if (speed < ROLL_STOP) {
        ballVel.set(0,0,0);
        ballStopped();
      }
    }
  }

  // Check building collision mid-air
  for (const b of buildingMeshes) {
    const bb = b.bounds;
    if (ballPos.x > bb.xMin && ballPos.x < bb.xMax && ballPos.z > bb.zMin && ballPos.z < bb.zMax && ballPos.y < bb.yMax) {
      buildingHit();
      return;
    }
  }

  // Check tunnel pass-through
  if (tunnelBounds && !ball.userData.tunnelPassed) {
    const tb = tunnelBounds;
    const dx = ballPos.x - tb.x;
    const dy = ballPos.y - tb.rx * 0.5;
    if (Math.sqrt(dx*dx+dy*dy) < tb.rx && Math.abs(ballPos.z - tb.z) < tb.rz) {
      ball.userData.inTunnel = true;
    } else if (ball.userData.inTunnel && Math.abs(ballPos.z - tb.z) > tb.rz) {
      ball.userData.inTunnel = false;
      ball.userData.tunnelPassed = true;
      tunnelBonus();
    }
  }

  // Check hole-in
  const h = HOLES[currentHole];
  const dxH = ballPos.x - h.flag.x, dzH = ballPos.z - h.flag.z;
  const distToHole = Math.sqrt(dxH*dxH + dzH*dzH);
  if (distToHole < 1.0 && (ballState === 'rolling' || (ballState === 'flying' && ballPos.y < 2))) {
    holeIn();
    return;
  }

  // Out of bounds
  if (Math.abs(ballPos.x) > 140 || Math.abs(ballPos.z) > 150) {
    showEvent('OB! +1', '#ff4444');
    strokes++;
    totalScore++;
    updateHoleUI();
    resetBall();
    return;
  }

  // Trail
  addTrailPoint(ballPos.clone());

  ball.position.copy(ballPos);
  ballShadow.position.set(ballPos.x, terrH + 0.02, ballPos.z);
  updateDistUI();
}

// ======== EVENTS ========
function waterHazard() {
  ballState = 'event';
  createSplash(ballPos.x, 0.2, ballPos.z);
  showEvent('川ポチャ! +2', '#2288dd', 2500);
  strokes += 2;
  totalScore += 2;
  updateHoleUI();
  setTimeout(() => resetBall(), 2500);
}

function buildingHit() {
  ballState = 'event';
  createCrash(ballPos.x, ballPos.y, ballPos.z);
  showEvent('ビルに入った! +1', '#ff8800', 2000);
  strokes += 1;
  totalScore += 1;
  updateHoleUI();
  setTimeout(() => resetBall(), 2000);
}

function tunnelBonus() {
  showEvent('トンネルショット! -1', '#00ff88', 2500);
  strokes -= 1;
  if (strokes < 1) strokes = 1;
  totalScore -= 1;
  updateHoleUI();
}

function holeIn() {
  ballState = 'event';
  ballVel.set(0,0,0);
  const h = HOLES[currentHole];
  ballPos.set(h.flag.x, 0.2 + getTerrainHeight(h.flag.x, h.flag.z), h.flag.z);
  ball.position.copy(ballPos);

  const diff = strokes - h.par;
  let label = '';
  if (strokes === 1) { label = 'HOLE IN ONE!!!'; launchFireworks(); }
  else if (diff === -3) label = 'ALBATROSS!';
  else if (diff === -2) { label = 'EAGLE!'; launchFireworks(); }
  else if (diff === -1) label = 'BIRDIE!';
  else if (diff === 0) label = 'PAR';
  else if (diff === 1) label = 'BOGEY';
  else if (diff === 2) label = 'DOUBLE BOGEY';
  else label = `+${diff}`;

  const color = diff <= -1 ? '#00ff88' : (diff === 0 ? '#fff' : '#ff6644');
  showEvent(label, color, 3000);

  scores.push({hole: currentHole+1, par: h.par, score: strokes, diff});
  totalScore = scores.reduce((s,sc) => s + sc.score, 0);
  updateHoleUI();

  setTimeout(() => {
    if (currentHole < HOLES.length - 1) {
      $nextBtn.style.display = 'block';
    } else {
      showScorecard();
    }
  }, 2000);
}

function ballStopped() {
  ballState = 'ready';
  $swingBtn.disabled = false;
  $swingBtn.textContent = 'SWING';
  arrowGroup.visible = true;
  updateArrow();
  power = 0;
  $powerFill.style.width = '0%';
  $powerText.textContent = 'HOLD TO CHARGE';
}

function nextHole() {
  currentHole++;
  strokes = 0;
  ball.userData.tunnelPassed = false;
  ball.userData.inTunnel = false;
  buildCourse(currentHole);
  resetBall();
  updateHoleUI();
  $nextBtn.style.display = 'none';
}

function showScorecard() {
  const sc = document.getElementById('scorecard');
  const table = document.getElementById('score-table');
  // Clear old rows except header
  while (table.rows.length > 1) table.deleteRow(1);
  let totalPar = 0;
  for (const s of scores) {
    const row = table.insertRow();
    row.insertCell().textContent = s.hole;
    row.insertCell().textContent = s.par;
    row.insertCell().textContent = s.score;
    const diffCell = row.insertCell();
    diffCell.textContent = s.diff === 0 ? 'E' : (s.diff > 0 ? `+${s.diff}` : s.diff);
    diffCell.className = s.diff < 0 ? 'under' : (s.diff > 0 ? 'over' : 'par-score');
    totalPar += s.par;
  }
  const totalDiff = totalScore - totalPar;
  document.getElementById('total-result').textContent =
    `TOTAL: ${totalScore} (${totalDiff === 0 ? 'EVEN' : (totalDiff > 0 ? '+'+totalDiff : totalDiff)})`;
  sc.classList.add('show');
}

// ======== TRAIL ========
function clearTrail() {
  if (trailLine) { scene.remove(trailLine); trailLine = null; }
  trailPoints.length = 0;
}

function addTrailPoint(p) {
  trailPoints.push(p);
  if (trailPoints.length > 200) trailPoints.shift();
  if (trailLine) scene.remove(trailLine);
  if (trailPoints.length < 2) return;
  const geo = new THREE.BufferGeometry().setFromPoints(trailPoints);
  const mat = new THREE.LineBasicMaterial({color:0x00ffcc, transparent:true, opacity:0.4});
  trailLine = new THREE.Line(geo, mat);
  scene.add(trailLine);
}

// ======== DIRECTION ARROW ========
function updateArrow() {
  if (ballState !== 'ready') return;
  const h = HOLES[currentHole];
  const dirDeg = parseFloat($dirSlider.value);
  const toFlagX = h.flag.x - ballPos.x;
  const toFlagZ = h.flag.z - ballPos.z;
  const baseAngle = Math.atan2(toFlagX, toFlagZ);
  const finalDir = baseAngle + (dirDeg * Math.PI / 180);

  arrowGroup.position.set(ballPos.x, 0.5, ballPos.z);
  arrowGroup.rotation.y = finalDir;
}

// ======== CAMERA ========
function updateCamera() {
  const h = HOLES[currentHole];
  if (cameraMode === 'top') {
    const cx = (h.tee.x + h.green.x)/2;
    const cz = (h.tee.z + h.green.z)/2;
    camera.position.set(cx, 120, cz + 60);
    camera.lookAt(cx, 0, cz);
  } else if (cameraMode === 'follow') {
    const offset = new THREE.Vector3(0, 15, 20);
    camera.position.lerp(ballPos.clone().add(offset), 0.05);
    camera.lookAt(ballPos);
  } else if (cameraMode === 'fps') {
    const dirDeg = parseFloat($dirSlider.value);
    const toFlagX = h.flag.x - ballPos.x;
    const toFlagZ = h.flag.z - ballPos.z;
    const baseAngle = Math.atan2(toFlagX, toFlagZ);
    const finalDir = baseAngle + (dirDeg * Math.PI / 180);

    const behind = new THREE.Vector3(
      ballPos.x - Math.sin(finalDir) * 4,
      ballPos.y + 2,
      ballPos.z - Math.cos(finalDir) * 4
    );
    camera.position.lerp(behind, 0.08);
    const lookAt = ballPos.clone();
    lookAt.y += 1;
    camera.lookAt(lookAt);
  }
}

// ======== WATER ANIMATION ========
let waterTime = 0;
function animateWater(dt) {
  if (!riverMesh) return;
  waterTime += dt;
  const pos = riverMesh.geometry.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    pos.setZ(i, Math.sin(x*0.3 + waterTime*2)*0.2 + Math.cos(waterTime*1.5)*0.1);
  }
  pos.needsUpdate = true;
}

// ======== POWER CHARGING ========
let chargeInterval = null;

function startCharge() {
  if (ballState !== 'ready') return;
  charging = true;
  power = 0;
  chargeDir = 1;
  $powerText.textContent = '';
  chargeInterval = setInterval(() => {
    power += chargeDir * 2;
    if (power >= 100) { power = 100; chargeDir = -1; }
    if (power <= 0) { power = 0; chargeDir = 1; }
    $powerFill.style.width = power + '%';
    $powerText.textContent = Math.round(power) + '%';
  }, 20);
}

function endCharge() {
  if (!charging) return;
  charging = false;
  clearInterval(chargeInterval);
  if (power > 2) swing();
  else {
    power = 0;
    $powerFill.style.width = '0%';
    $powerText.textContent = 'HOLD TO CHARGE';
  }
}

// ======== EVENT LISTENERS ========
$swingBtn.addEventListener('mousedown', startCharge);
$swingBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startCharge(); });
window.addEventListener('mouseup', endCharge);
window.addEventListener('touchend', endCharge);

$dirSlider.addEventListener('input', () => {
  $dirValue.textContent = $dirSlider.value + '\u00B0';
  updateArrow();
});
$angleSlider.addEventListener('input', () => {
  $angleValue.textContent = $angleSlider.value + '\u00B0';
});

$nextBtn.addEventListener('click', nextHole);

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('scorecard').classList.remove('show');
  currentHole = 0; strokes = 0; totalScore = 0; scores = [];
  ball.userData.tunnelPassed = false;
  ball.userData.inTunnel = false;
  buildCourse(0);
  resetBall();
  updateHoleUI();
});

// Camera buttons
document.querySelectorAll('.cam-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cameraMode = btn.dataset.cam;
  });
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  resizeFW();
});

// ======== DEVICE MOTION (optional) ========
let lastAccel = 0;
let motionAvailable = false;

function handleMotion(e) {
  if (!e.accelerationIncludingGravity) return;
  const a = e.accelerationIncludingGravity;
  const total = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
  const delta = Math.abs(total - lastAccel);
  lastAccel = total;

  // Detect shake while charging
  if (charging && delta > 5) {
    power = Math.min(100, power + delta * 2);
    $powerFill.style.width = power + '%';
    $powerText.textContent = Math.round(power) + '%';
  }

  // Auto-swing on strong shake
  if (ballState === 'ready' && !charging && delta > 25) {
    power = Math.min(100, delta * 3);
    $powerFill.style.width = power + '%';
    swing();
  }
}

function requestMotion() {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().then(response => {
      if (response === 'granted') {
        window.addEventListener('devicemotion', handleMotion);
        motionAvailable = true;
      }
    });
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    window.addEventListener('devicemotion', handleMotion);
    motionAvailable = true;
  }
}

// Show motion request on iOS
if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
  const motionReq = document.getElementById('motion-req');
  motionReq.style.display = 'block';
  motionReq.addEventListener('click', () => {
    requestMotion();
    motionReq.style.display = 'none';
  });
} else {
  requestMotion();
}

// ======== ANIMATION LOOP ========
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  updateBall(dt);
  updateCamera();
  animateWater(dt);
  updateSplash(dt);
  updateCrash(dt);
  updateFireworks();
  drawMinimap();

  // Ball rotation (visual)
  if (ballState === 'flying' || ballState === 'rolling') {
    const speed = ballVel.length();
    ball.rotation.x += speed * dt * 0.5;
    ball.rotation.z += speed * dt * 0.3;
  }

  // Flag wave
  const flagMeshes = courseGroup.children.filter(c => c.material === flagMat);
  flagMeshes.forEach(f => { f.rotation.y = Math.sin(clock.elapsedTime * 3) * 0.15; });

  renderer.render(scene, camera);
}

// ======== INIT ========
buildCourse(0);
resetBall();
updateHoleUI();
animate();

</script>
</body>
</html>
