<svg id="gracevox-icon" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="gv-bg" cx="50%" cy="40%" r="70%">
            <stop offset="0%" stop-color="#1a1035"/>
            <stop offset="50%" stop-color="#0d0d1a"/>
            <stop offset="100%" stop-color="#06060c"/>
          </radialGradient>
          <linearGradient id="gv-wave" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6c5ce7"/>
            <stop offset="30%" stop-color="#a855f7"/>
            <stop offset="60%" stop-color="#22d3ee"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
          <linearGradient id="gv-fade" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#333345" stop-opacity="0.8"/>
            <stop offset="40%" stop-color="#6c5ce7" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="gv-spec" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#1a0533" stop-opacity="0.8"/>
            <stop offset="25%" stop-color="#6c5ce7" stop-opacity="0.6"/>
            <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
          </linearGradient>
          <filter id="gv-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
          <filter id="gv-soft" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
          </filter>
          <filter id="gv-key-dissolve" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
          </filter>
        </defs>

        <!-- Background -->
        <rect width="192" height="192" fill="url(#gv-bg)"/>

        <!-- Spectrogram columns (background texture) -->
        <g opacity="0.3">
          <rect x="10" y="30" width="3" height="100" rx="1.5" fill="url(#gv-spec)" opacity="0.4"/>
          <rect x="16" y="45" width="3" height="70" rx="1.5" fill="url(#gv-spec)" opacity="0.6"/>
          <rect x="22" y="28" width="3" height="105" rx="1.5" fill="url(#gv-spec)" opacity="0.5"/>
          <rect x="28" y="40" width="3" height="80" rx="1.5" fill="url(#gv-spec)" opacity="0.7"/>
          <rect x="34" y="35" width="3" height="90" rx="1.5" fill="url(#gv-spec)" opacity="0.45"/>
          <rect x="155" y="38" width="3" height="85" rx="1.5" fill="url(#gv-spec)" opacity="0.5"/>
          <rect x="161" y="32" width="3" height="95" rx="1.5" fill="url(#gv-spec)" opacity="0.4"/>
          <rect x="167" y="42" width="3" height="75" rx="1.5" fill="url(#gv-spec)" opacity="0.55"/>
          <rect x="173" y="48" width="3" height="65" rx="1.5" fill="url(#gv-spec)" opacity="0.35"/>
        </g>

        <!-- ═══ KEYBOARD KEYS (bottom) dissolving upward into voice waves ═══ -->
        <!-- Row 3 (bottom, most solid): ZXCV... -->
        <g opacity="0.55">
          <rect x="28" y="158" width="14" height="12" rx="2.5" fill="none" stroke="#4a4a6a" stroke-width="1"/>
          <rect x="46" y="158" width="14" height="12" rx="2.5" fill="none" stroke="#4a4a6a" stroke-width="1"/>
          <rect x="64" y="158" width="14" height="12" rx="2.5" fill="none" stroke="#4a4a6a" stroke-width="1"/>
          <rect x="82" y="158" width="28" height="12" rx="2.5" fill="none" stroke="#4a4a6a" stroke-width="1"/>
          <rect x="114" y="158" width="14" height="12" rx="2.5" fill="none" stroke="#4a4a6a" stroke-width="1"/>
          <rect x="132" y="158" width="14" height="12" rx="2.5" fill="none" stroke="#4a4a6a" stroke-width="1"/>
          <rect x="150" y="158" width="14" height="12" rx="2.5" fill="none" stroke="#4a4a6a" stroke-width="1"/>
        </g>
        <!-- Row 2 (middle, fading): ASDF... -->
        <g opacity="0.35">
          <rect x="24" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
          <rect x="42" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
          <rect x="60" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
          <rect x="78" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
          <rect x="96" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
          <rect x="114" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
          <rect x="132" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
          <rect x="150" y="142" width="14" height="12" rx="2.5" fill="none" stroke="#5a5a7a" stroke-width="0.8"/>
        </g>
        <!-- Row 1 (top, dissolving): QWER... becoming particles -->
        <g opacity="0.18" filter="url(#gv-key-dissolve)">
          <rect x="20" y="126" width="13" height="11" rx="2.5" fill="none" stroke="#6c5ce7" stroke-width="0.7"/>
          <rect x="37" y="126" width="13" height="11" rx="2.5" fill="none" stroke="#6c5ce7" stroke-width="0.7"/>
          <rect x="54" y="125" width="13" height="11" rx="3" fill="none" stroke="#7c6cf7" stroke-width="0.6"/>
          <rect x="71" y="124" width="13" height="11" rx="3.5" fill="none" stroke="#8c7cf7" stroke-width="0.5"/>
          <rect x="88" y="122" width="13" height="11" rx="4" fill="none" stroke="#9c8cf7" stroke-width="0.4"/>
          <rect x="105" y="121" width="13" height="10" rx="4.5" fill="none" stroke="#a78bfa" stroke-width="0.3"/>
          <rect x="122" y="120" width="12" height="10" rx="5" fill="none" stroke="#a78bfa" stroke-width="0.25"/>
          <rect x="139" y="119" width="11" height="9" rx="5" fill="none" stroke="#b79bfa" stroke-width="0.2"/>
          <rect x="155" y="118" width="10" height="8" rx="5" fill="none" stroke="#c7abfa" stroke-width="0.15"/>
        </g>

        <!-- Particles rising from dissolving keys (transition zone) -->
        <g opacity="0.4">
          <circle cx="40" cy="118" r="1.5" fill="#6c5ce7"/>
          <circle cx="58" cy="112" r="1.2" fill="#7c6cf7"/>
          <circle cx="75" cy="108" r="1.8" fill="#a855f7"/>
          <circle cx="92" cy="104" r="1.0" fill="#22d3ee"/>
          <circle cx="110" cy="110" r="1.4" fill="#a78bfa"/>
          <circle cx="128" cy="106" r="1.6" fill="#6c5ce7"/>
          <circle cx="145" cy="114" r="1.1" fill="#22d3ee"/>
          <circle cx="55" cy="105" r="0.8" fill="#ffffff" opacity="0.6"/>
          <circle cx="100" cy="98" r="0.9" fill="#ffffff" opacity="0.5"/>
          <circle cx="135" cy="100" r="1.0" fill="#a855f7" opacity="0.5"/>
        </g>

        <!-- ═══ VOICE WAVE (center hero — born from dissolved keyboard) ═══ -->
        <!-- Outer glow -->
        <path d="M 16,78 Q 36,48 58,78 Q 72,102 96,55 Q 118,20 136,78 Q 152,115 176,78"
              fill="none" stroke="url(#gv-wave)" stroke-width="8" stroke-linecap="round"
              filter="url(#gv-soft)" opacity="0.45"/>
        <!-- Main wave -->
        <path d="M 16,78 Q 36,46 58,78 Q 72,104 96,52 Q 118,16 136,78 Q 152,118 176,78"
              fill="none" stroke="url(#gv-wave)" stroke-width="3.5" stroke-linecap="round"
              filter="url(#gv-glow)"/>
        <!-- Secondary wave -->
        <path d="M 16,78 Q 34,58 56,78 Q 70,96 96,64 Q 120,36 138,78 Q 154,108 176,78"
              fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.45"
              filter="url(#gv-glow)"/>
        <!-- Tertiary wave -->
        <path d="M 16,78 Q 38,66 60,78 Q 76,88 96,70 Q 116,52 138,78 Q 155,96 176,78"
              fill="none" stroke="#22d3ee" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

        <!-- Peak recording dot -->
        <circle cx="96" cy="52" r="3.5" fill="#ffffff" opacity="0.9"/>
        <circle cx="96" cy="52" r="6" fill="#a855f7" opacity="0.3"/>

        <!-- Text appearing from voice (top area) — the output -->
        <g opacity="0.22" font-family="'DM Sans', sans-serif" fill="#22d3ee">
          <text x="30" y="28" font-size="7" letter-spacing="0.15em">あ い う</text>
          <text x="96" y="20" font-size="8" letter-spacing="0.12em" text-anchor="middle" fill="#a78bfa">声 → 文字</text>
          <text x="140" y="30" font-size="6" letter-spacing="0.15em" fill="#6c5ce7">A B C</text>
        </g>

        <!-- Bottom text -->
        <text x="168" y="180" font-family="'DM Sans', sans-serif" font-size="10" font-weight="700"
              fill="#6c5ce7" opacity="0.45" text-anchor="end" letter-spacing="0.06em">Vox</text>

        <!-- Corner accents -->
        <circle cx="16" cy="16" r="2" fill="#6c5ce7" opacity="0.25"/>
        <circle cx="176" cy="16" r="2" fill="#22d3ee" opacity="0.25"/>
      </svg>