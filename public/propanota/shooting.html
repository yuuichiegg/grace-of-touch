            } catch (e) { window.location.href = '/'; }

    // ====== SOURCE CODE PROTECTION ======
    document.addEventListener('contextmenu', e => e.preventDefault());

      if (e.ctrlKey && ['u','U','s','S'].includes(e.key)) { e.preventDefault(); return false; }
    });
    document.addEventListener('selectstart', e => e.preventDefault());

    <style>

<body>
<a href="/client/" style="position:fixed;top:12px;right:12px;z-index:99999;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(201,169,110,0.3);border-radius:8px;padding:6px 14px;text-decoration:none;color:rgba(201,169,110,0.8);font-family:monospace;font-size:11px;letter-spacing:0.1em;transition:all 0.3s;" onmouseover="this.style.background='rgba(201,169,110,0.12)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>DASHBOARD</a>

<div id="ui-layer">
    <div class="title">Propanota Shooting System</div>
    <div class="subtitle">菅井楽器プロパノータ × エアガン連携プロトタイプ</div>
</div>

<div id="start-overlay">
    <div class="btn">CLICK TO START</div>
    <p style="margin-top: 20px; color: #aaa;">クリックしてシミュレーションを開始</p>
</div>

<canvas id="canvas"></canvas>

<script>
    class AudioEngine {
        constructor() { this.ctx = null; this.masterGain = null; this.reverbNode = null; }
        init() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AudioContext();
            this.masterGain = this.ctx.createGain();
            this.masterGain.gain.value = 0.5;
            this.masterGain.connect(this.ctx.destination);
            this.setupReverb();
        }
        setupReverb() {
            const sampleRate = this.ctx.sampleRate;
            const length = sampleRate * 2.0;
            const impulse = this.ctx.createBuffer(2, length, sampleRate);
            const left = impulse.getChannelData(0);
            const right = impulse.getChannelData(1);
            for (let i = 0; i < length; i++) {
                const decay = Math.pow(1 - i / length, 5);
                left[i] = (Math.random() * 2 - 1) * decay;
                right[i] = (Math.random() * 2 - 1) * decay;
            }
            this.reverbNode = this.ctx.createConvolver();
            this.reverbNode.buffer = impulse;
            this.reverbNode.connect(this.masterGain);
        }
        playNote(freq) {
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const t = this.ctx.currentTime;
            const osc = this.ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, t);
            const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.8, t + 0.01); gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
            const osc2 = this.ctx.createOscillator(); osc2.type = 'sine'; osc2.frequency.setValueAtTime(freq * 2.02, t);
            const gain2 = this.ctx.createGain(); gain2.gain.setValueAtTime(0, t); gain2.gain.linearRampToValueAtTime(0.3, t + 0.01); gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
            const noiseOsc = this.ctx.createOscillator(); noiseOsc.type = 'square'; noiseOsc.frequency.setValueAtTime(100, t);
            const noiseGain = this.ctx.createGain(); noiseGain.gain.setValueAtTime(0.1, t); noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
            osc.connect(gain); osc2.connect(gain2); noiseOsc.connect(noiseGain);
            gain.connect(this.masterGain); gain.connect(this.reverbNode); gain2.connect(this.masterGain); noiseGain.connect(this.masterGain);
            osc.start(t); osc2.start(t); noiseOsc.start(t); osc.stop(t + 3.0); osc2.stop(t + 3.0); noiseOsc.stop(t + 3.0);
        }
    }

    const ANGLE_OFFSET = 22.5;
    const NOTES = [
        { note: 'A3', freq: 220.00, angle: 0 + ANGLE_OFFSET },
        { note: 'C4', freq: 261.63, angle: 45 + ANGLE_OFFSET },
        { note: 'D4', freq: 293.66, angle: 90 + ANGLE_OFFSET },
        { note: 'E4', freq: 329.63, angle: 135 + ANGLE_OFFSET },
        { note: 'G4', freq: 392.00, angle: 180 + ANGLE_OFFSET },
        { note: 'A4', freq: 440.00, angle: 225 + ANGLE_OFFSET },
        { note: 'C5', freq: 523.25, angle: 270 + ANGLE_OFFSET },
        { note: 'D5', freq: 587.33, angle: 315 + ANGLE_OFFSET }
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const audio = new AudioEngine();
    let width, height, centerX, centerY;
    let targets = [], bullets = [], particles = [], hammers = [];
    let propanotaRadius = 100;
    let mouseX = 0, mouseY = 0;

    class Target {
        constructor(x, y, noteInfo) { this.x = x; this.y = y; this.radius = 25; this.hitRadius = 35; this.noteInfo = noteInfo; this.active = true; this.pulse = 0; }
        draw() {
            ctx.beginPath(); ctx.moveTo(this.x, this.y);
            const pivotX = centerX + (Math.cos(this.noteInfo.angle * Math.PI/180) * (propanotaRadius + 20));
            const pivotY = centerY + (Math.sin(this.noteInfo.angle * Math.PI/180) * (propanotaRadius + 20));
            ctx.lineTo(pivotX, pivotY); ctx.strokeStyle = '#444'; ctx.lineWidth = 4; ctx.stroke();
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + Math.sin(this.pulse) * 2, 0, Math.PI * 2);
            ctx.fillStyle = this.active ? '#e74c3c' : '#555'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.6, 0, Math.PI * 2); ctx.strokeStyle = '#fff'; ctx.stroke();
            ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(this.noteInfo.note, this.x, this.y); this.pulse += 0.1;
        }
        hit() { for(let i=0;i<10;i++) particles.push(new Particle(this.x, this.y, '#fff')); hammers.push(new Hammer(this.noteInfo.angle, this.noteInfo.freq)); }
    }

    class Hammer {
        constructor(angleDeg, freq) { this.angleRad = angleDeg * Math.PI / 180; this.freq = freq; this.distance = propanotaRadius + 40; this.targetDistance = propanotaRadius - 10; this.state = 'down'; this.speed = 15; this.life = 1.0; }
        update() {
            if (this.state === 'down') { this.distance -= this.speed; if (this.distance <= this.targetDistance) { this.state = 'hit'; this.distance = this.targetDistance; audio.playNote(this.freq); drumPulse = 15;
                const hitX = centerX + Math.cos(this.angleRad) * this.targetDistance; const hitY = centerY + Math.sin(this.angleRad) * this.targetDistance;
                for(let i=0;i<8;i++) particles.push(new Particle(hitX, hitY, '#ffd700')); }
            } else if (this.state === 'hit') { this.state = 'up'; } else if (this.state === 'up') { this.distance += this.speed * 0.5; this.life -= 0.1; }
        }
        draw() { if (this.life <= 0) return; const x = centerX + Math.cos(this.angleRad) * this.distance; const y = centerY + Math.sin(this.angleRad) * this.distance;
            const pivotX = centerX + Math.cos(this.angleRad) * (propanotaRadius + 50); const pivotY = centerY + Math.sin(this.angleRad) * (propanotaRadius + 50);
            ctx.beginPath(); ctx.moveTo(pivotX, pivotY); ctx.lineTo(x, y); ctx.strokeStyle = `rgba(200, 200, 200, ${this.life})`; ctx.lineWidth = 6; ctx.stroke();
            ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`; ctx.fill(); }
    }

    class Bullet {
        constructor(startX, startY, targetX, targetY) { this.x = startX; this.y = startY; const angle = Math.atan2(targetY - startY, targetX - startX); this.speed = 30; this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed; this.active = true; }
        update() { const steps = 3; const stepVx = this.vx / steps; const stepVy = this.vy / steps;
            for (let s = 0; s < steps; s++) { if (!this.active) break; this.x += stepVx; this.y += stepVy;
                for (let t of targets) { const dx = this.x - t.x; const dy = this.y - t.y; if (Math.sqrt(dx*dx + dy*dy) < t.hitRadius) { t.hit(); this.active = false; break; } }
                if (this.active && (this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50)) this.active = false; } }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fillStyle = '#ff0'; ctx.fill(); }
    }

    class Particle {
        constructor(x, y, color) { this.x = x; this.y = y; this.color = color; const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 3 + 1; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed; this.life = 1.0; }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.05; }
        draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1.0; }
    }

    let drumPulse = 0;
    function init() { resize(); window.addEventListener('resize', resize); window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mousedown', (e) => { shoot(e.clientX, e.clientY); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false}); loop(); }
    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; centerX = width / 2; centerY = height / 2;
        const minDim = Math.min(width, height); let targetRadius = Math.max(150, Math.min(minDim * 0.35, 250)); propanotaRadius = targetRadius * 0.45; setupTargets(targetRadius); }
    function setupTargets(radius) { targets = []; NOTES.forEach(note => { const rad = note.angle * Math.PI / 180; targets.push(new Target(centerX + Math.cos(rad) * radius, centerY + Math.sin(rad) * radius, note)); }); }
    function shoot(targetX, targetY) { bullets.push(new Bullet(centerX, height, targetX, targetY)); for(let i=0;i<5;i++) particles.push(new Particle(centerX + (Math.random()*20-10), height, '#fa0')); }
    function drawDrum() { ctx.beginPath(); ctx.arc(centerX, centerY, propanotaRadius + drumPulse, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, propanotaRadius); grad.addColorStop(0, '#4a69bd'); grad.addColorStop(1, '#0c2461');
        ctx.fillStyle = grad; ctx.fill(); ctx.lineWidth = 5; ctx.strokeStyle = '#1e3799'; ctx.stroke();
        ctx.strokeStyle = '#82ccdd'; ctx.lineWidth = 2;
        NOTES.forEach(note => { const rad = note.angle * Math.PI / 180; const tx = centerX + Math.cos(rad) * (propanotaRadius * 0.7); const ty = centerY + Math.sin(rad) * (propanotaRadius * 0.7);
            ctx.beginPath(); ctx.arc(tx, ty, propanotaRadius * 0.15, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill(); ctx.stroke(); });
        ctx.fillStyle = '#fff'; ctx.font = `${Math.max(10, propanotaRadius/8)}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText("PROPANOTA", centerX, centerY); }
    function drawCrosshair() { ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)'; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(mouseX - 15, mouseY); ctx.lineTo(mouseX + 15, mouseY); ctx.moveTo(mouseX, mouseY - 15); ctx.lineTo(mouseX, mouseY + 15); ctx.stroke();
        ctx.beginPath(); ctx.arc(mouseX, mouseY, 10, 0, Math.PI * 2); ctx.stroke(); }
    function loop() { ctx.fillStyle = '#222'; ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1; const gridSize = 50;
        for(let x=0;x<width;x+=gridSize){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,height);ctx.stroke();}
        for(let y=0;y<height;y+=gridSize){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(width,y);ctx.stroke();}
        drawDrum(); targets.forEach(t => t.draw());
        for (let i = hammers.length - 1; i >= 0; i--) { hammers[i].update(); hammers[i].draw(); if (hammers[i].life <= 0) hammers.splice(i, 1); }
        for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].update(); bullets[i].draw(); if (!bullets[i].active) bullets.splice(i, 1); }
        for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].life <= 0) particles.splice(i, 1); }
        drawCrosshair(); if(drumPulse > 0) drumPulse *= 0.9; requestAnimationFrame(loop); }
    document.getElementById('start-overlay').addEventListener('click', function() { this.style.display = 'none'; audio.init(); init(); });
</script>
