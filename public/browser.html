<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e293b;
  --accent:#00e5ff;--accent2:#00ff88;--text:#e2e8f0;--text2:#94a3b8;
  --danger:#ff4757;--warn:#ffa502;
  --voice:#6c5ce7;--voice-glow:rgba(108,92,231,.4);--recording:#ff6b6b;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP','JetBrains Mono',sans-serif;}

/* ===== BROWSER CHROME ===== */
#browser{display:flex;flex-direction:column;height:100vh;}

/* --- Tab Bar --- */
#tab-bar{display:flex;align-items:center;background:var(--bg);
  padding:4px 8px 0;gap:2px;min-height:40px;overflow-x:auto;flex-shrink:0;}
#tab-bar::-webkit-scrollbar{height:2px;}
#tab-bar::-webkit-scrollbar-thumb{background:var(--accent);border-radius:1px;}

.tab{display:flex;align-items:center;gap:6px;padding:6px 12px;
  background:var(--surface);border-radius:8px 8px 0 0;cursor:pointer;
  font-size:12px;color:var(--text2);max-width:200px;min-width:60px;
  border:1px solid transparent;border-bottom:none;transition:all .15s;
  font-family:'JetBrains Mono',monospace;user-select:none;flex-shrink:0;}
.tab:hover{background:var(--surface2);color:var(--text);}
.tab.active{background:var(--surface2);color:var(--accent);
  border-color:var(--border);box-shadow:0 -2px 8px rgba(0,229,255,.1);}
.tab-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.tab-favicon{width:14px;height:14px;border-radius:2px;flex-shrink:0;}
.tab-close{width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;font-size:14px;line-height:1;color:var(--text2);flex-shrink:0;}
.tab-close:hover{background:var(--danger);color:#fff;}
#new-tab-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px dashed var(--border);border-radius:6px;
  color:var(--text2);font-size:18px;cursor:pointer;flex-shrink:0;transition:all .15s;}
#new-tab-btn:hover{border-color:var(--accent);color:var(--accent);
  box-shadow:0 0 12px rgba(0,229,255,.15);}

/* --- Navigation Bar --- */
#nav-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;
  background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:var(--text2);cursor:pointer;
  border-radius:6px;font-size:16px;transition:all .15s;}
.nav-btn:hover:not(:disabled){background:rgba(0,229,255,.1);color:var(--accent);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-btn:active:not(:disabled){transform:scale(.9);}

#url-bar-wrapper{flex:1;position:relative;display:flex;align-items:center;}
#url-bar{width:100%;padding:7px 68px 7px 34px;background:var(--bg);
  border:1px solid var(--border);border-radius:20px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;
  transition:all .2s;}
#url-bar:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,255,.15);}
#url-bar::placeholder{color:var(--text2);}
#url-icon{position:absolute;left:11px;font-size:14px;pointer-events:none;color:var(--text2);}
#ssl-indicator{position:absolute;left:11px;font-size:13px;cursor:help;}
#ssl-indicator.secure{color:var(--accent2);}
#ssl-indicator.insecure{color:var(--warn);}
#voice-btn{position:absolute;right:32px;width:24px;height:24px;border-radius:50%;
  background:var(--surface);border:1.5px solid var(--voice);color:var(--voice);
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;}
#voice-btn:hover{background:var(--voice);color:#fff;box-shadow:0 0 12px var(--voice-glow);}
#voice-btn.listening{background:var(--recording);border-color:var(--recording);color:#fff;
  animation:voicePulse 1s ease-in-out infinite;}
@keyframes voicePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,.4)}50%{box-shadow:0 0 0 8px rgba(255,107,107,0)}}
#bookmark-btn{position:absolute;right:8px;font-size:16px;cursor:pointer;
  color:var(--text2);transition:all .15s;background:none;border:none;}
#bookmark-btn:hover{color:var(--warn);}
#bookmark-btn.bookmarked{color:var(--warn);}

/* --- Side Panel Toggle --- */
#panel-btn{font-size:18px;}

/* --- Content Area --- */
#content-area{flex:1;position:relative;overflow:hidden;background:var(--bg);}
.tab-content{position:absolute;inset:0;display:none;}
.tab-content.active{display:block;}
.tab-content iframe{width:100%;height:100%;border:none;background:#fff;}

/* --- New Tab Page --- */
.new-tab-page{display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;height:100%;padding:32px 20px 40px;overflow-y:auto;}
.ntp-logo{font-family:'Orbitron',monospace;font-size:clamp(22px,4vw,36px);
  font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;user-select:none;}
.ntp-sub{font-size:11px;color:var(--text2);margin-bottom:16px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.1em;}
.ntp-search{width:min(500px,90%);position:relative;margin-bottom:20px;}
.ntp-search input{width:100%;padding:14px 20px 14px 44px;background:var(--surface);
  border:1px solid var(--border);border-radius:24px;color:var(--text);
  font-size:15px;outline:none;transition:all .2s;font-family:inherit;}
.ntp-search input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(0,229,255,.1);}
.ntp-search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--text2);font-size:16px;}
.ntp-shortcuts{display:grid;grid-template-columns:repeat(auto-fill,80px);
  gap:16px;justify-content:center;max-width:500px;}
.ntp-shortcut{display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;padding:12px 8px;border-radius:12px;transition:all .15s;}
.ntp-shortcut:hover{background:var(--surface);}
.ntp-shortcut-icon{width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  border:1px solid var(--border);transition:all .2s;position:relative;overflow:hidden;}
.ntp-shortcut-icon::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.08),transparent 60%);
  pointer-events:none;}
.ntp-shortcut:hover .ntp-shortcut-icon{border-color:var(--accent);
  box-shadow:0 4px 20px rgba(0,229,255,.2);transform:translateY(-2px);}
/* Feed cards */
.feed-card{display:flex;gap:10px;padding:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;}
.feed-card:hover{border-color:#ff6b9d;background:var(--surface2);}
.feed-card img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.feed-card-info{flex:1;min-width:0;}
.feed-card-title{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.feed-card-sub{font-size:10px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-card-tag{font-size:9px;padding:2px 6px;border-radius:4px;margin-top:4px;display:inline-block;}
#ntp-feed::-webkit-scrollbar{width:3px;}
#ntp-feed::-webkit-scrollbar-thumb{background:#ff6b9d;border-radius:2px;}
.ntp-shortcut-label{font-size:11px;color:var(--text2);text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72px;}

/* --- Side Panel (Bookmarks/History) --- */
#side-panel{position:absolute;top:0;right:0;width:300px;height:100%;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .25s ease;z-index:100;
  display:flex;flex-direction:column;}
#side-panel.open{transform:translateX(0);}
.panel-header{display:flex;align-items:center;padding:12px 16px;gap:8px;
  border-bottom:1px solid var(--border);}
.panel-tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;
  color:var(--text2);transition:all .15s;font-family:'JetBrains Mono',monospace;}
.panel-tab:hover{color:var(--text);}
.panel-tab.active{background:rgba(0,229,255,.1);color:var(--accent);}
.panel-close{margin-left:auto;cursor:pointer;color:var(--text2);font-size:18px;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;}
.panel-close:hover{background:var(--danger);color:#fff;}
.panel-body{flex:1;overflow-y:auto;padding:8px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.panel-item{display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);
  transition:all .1s;}
.panel-item:hover{background:var(--surface2);color:var(--text);}
.panel-item-icon{font-size:14px;flex-shrink:0;}
.panel-item-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.panel-item-url{font-size:10px;color:var(--text2);opacity:.6;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.panel-item-delete{opacity:0;color:var(--danger);font-size:14px;flex-shrink:0;cursor:pointer;}
.panel-item:hover .panel-item-delete{opacity:1;}
.panel-empty{text-align:center;color:var(--text2);font-size:12px;padding:40px 20px;opacity:.5;}

/* --- Loading Bar --- */
#loading-bar{position:absolute;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));
  z-index:200;transition:width .3s ease;width:0;opacity:0;}
#loading-bar.loading{opacity:1;}

/* --- Status Bar --- */
#status-bar{display:flex;align-items:center;padding:2px 10px;
  background:var(--surface);border-top:1px solid var(--border);
  font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;
  flex-shrink:0;min-height:22px;gap:12px;}
#status-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tab-count{opacity:.6;}

/* --- Context Menu --- */
#context-menu{position:fixed;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:4px;min-width:180px;z-index:1000;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.5);}
.ctx-item{padding:8px 12px;font-size:12px;color:var(--text);cursor:pointer;
  border-radius:4px;display:flex;align-items:center;gap:8px;}
.ctx-item:hover{background:rgba(0,229,255,.1);color:var(--accent);}
.ctx-sep{height:1px;background:var(--border);margin:4px 8px;}

/* --- Voice active state (URL bar glow) --- */
#url-bar.voice-active{border-color:var(--recording);box-shadow:0 0 12px rgba(255,107,107,.2);}

/* --- NTP Voice Button --- */
.ntp-voice-section{margin-bottom:16px;text-align:center;}
.ntp-voice-btn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--voice),#8b5cf6);
  border:none;color:#fff;font-size:28px;cursor:pointer;transition:all .25s;
  box-shadow:0 4px 20px var(--voice-glow);display:flex;align-items:center;justify-content:center;margin:0 auto;}
.ntp-voice-btn:hover{transform:scale(1.1);box-shadow:0 6px 30px var(--voice-glow);}
.ntp-voice-btn:active{transform:scale(.95);}
.ntp-voice-label{font-size:11px;color:var(--text2);margin-top:10px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}

/* --- Animations --- */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.loading-shimmer{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;}

/* --- Responsive --- */
@media(max-width:600px){
  .tab{max-width:120px;padding:6px 8px;}
  #side-panel{width:100%;}
  .ntp-shortcuts{grid-template-columns:repeat(auto-fill,70px);gap:12px;}
}
</style>
</head>

<script>
// ===== Grace Browser Engine =====
const SEARCH_ENGINE = 'https://www.google.com/search?igu=1&q=';
const HOME_URL = 'grace://newtab';
const PROXY_PREFIXES = [
  '', // direct
];

// State
let tabs = [];
let activeTabId = null;
let nextTabId = 1;
let panelMode = 'bookmarks';

// Storage helpers
function loadJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}
function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let bookmarks = loadJSON('grace-bookmarks', [
  { title: 'Google', url: 'https://www.google.com/webhp?igu=1', icon: '🔍' },
  { title: 'Wikipedia', url: 'https://ja.wikipedia.org/', icon: '📚' },
  { title: 'YouTube', url: 'https://www.youtube.com/', icon: '▶️' },
  { title: 'GitHub', url: 'https://github.com/', icon: '🐙' },
  { title: 'MDN', url: 'https://developer.mozilla.org/', icon: '📖' },
  { title: 'Grace of Touch', url: '/index.html', icon: '🚀' },
  { title: 'GraceVox', url: '/gracevox.html', icon: '🎤' },
  { title: 'Records', url: '/records.html', icon: '🎵' },
]);

let browsingHistory = loadJSON('grace-history', []);
const MAX_HISTORY = 200;

// DOM refs
const tabsContainer = document.getElementById('tabs-container');
const contentArea = document.getElementById('content-area');
const urlBar = document.getElementById('url-bar');
const sslIndicator = document.getElementById('ssl-indicator');
const bookmarkBtn = document.getElementById('bookmark-btn');
const loadingBar = document.getElementById('loading-bar');
const statusText = document.getElementById('status-text');
const tabCountEl = document.getElementById('tab-count');
const sidePanel = document.getElementById('side-panel');
const panelContent = document.getElementById('panel-content');
const contextMenu = document.getElementById('context-menu');

// ===== Tab Management =====
function createTab(url = HOME_URL, active = true) {
  const id = nextTabId++;
  const tab = {
    id, url, title: '新しいタブ', history: [], historyIndex: -1, loading: false
  };
  tabs.push(tab);
  if (active) activateTab(id);
  if (url !== HOME_URL) navigateTab(id, url);
  renderTabs();
  return id;
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  // Remove content
  const content = document.getElementById(`tab-content-${id}`);
  if (content) content.remove();
  tabs.splice(idx, 1);
  if (tabs.length === 0) {
    createTab();
    return;
  }
  if (activeTabId === id) {
    const newIdx = Math.min(idx, tabs.length - 1);
    activateTab(tabs[newIdx].id);
  }
  renderTabs();
}

function activateTab(id) {
  activeTabId = id;
  // Toggle content visibility
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  let content = document.getElementById(`tab-content-${id}`);
  if (!content) {
    content = createTabContent(id);
  }
  content.classList.add('active');
  // Update URL bar
  const tab = getTab(id);
  if (tab) {
    updateUrlBar(tab.url);
    updateNavButtons(tab);
  }
  renderTabs();
}

function getTab(id) { return tabs.find(t => t.id === id); }

function createTabContent(id) {
  const tab = getTab(id);
  const div = document.createElement('div');
  div.className = 'tab-content active';
  div.id = `tab-content-${id}`;
  if (!tab || tab.url === HOME_URL) {
    div.innerHTML = buildNewTabPage();
    initNewTabPage(div, id);
  }
  contentArea.insertBefore(div, sidePanel);
  return div;
}

function buildNewTabPage() {
  let shortcuts = bookmarks.slice(0, 8).map(b =>
    `<div class="ntp-shortcut" data-url="${escapeAttr(b.url)}">
      <div class="ntp-shortcut-icon">${b.icon || '🌐'}</div>
      <div class="ntp-shortcut-label">${escapeHTML(b.title)}</div>
    </div>`
  ).join('');

  // Music & Audio Studio Apps (primary)
  const studioApps = [
    { icon:'🎤', title:'GraceVox', desc:'音声入力', url:'/gracevox.html' },
    { icon:'🎛️', title:'TrackForge', desc:'DTM/MTR', url:'/trackforge/' },
    { icon:'🎵', title:'Records', desc:'楽曲ライブラリ', url:'/records.html' },
    { icon:'🥁', title:'Resonance', desc:'3D楽器', url:'/resonance-drum.html' },
  ];
  const studioHTML = studioApps.map(a =>
    `<div class="ntp-shortcut" data-url="${escapeAttr(a.url)}" style="gap:4px;">
      <div class="ntp-shortcut-icon" style="border-color:rgba(108,92,231,.4);background:linear-gradient(135deg,rgba(108,92,231,.2),rgba(108,92,231,.05));font-size:26px;">${a.icon}</div>
      <div class="ntp-shortcut-label" style="color:#8b7cf7;font-size:10px;">${escapeHTML(a.title)}</div>
      <div style="font-size:8px;color:var(--text2);opacity:.6;">${a.desc}</div>
    </div>`
  ).join('');

  // 3D & Creative Tools
  const creativeApps = [
    { icon:'🚀', title:'Mega Rocket', desc:'宇宙探索SIM', url:'/rocket.html' },
    { icon:'⚙️', title:'Grace Engine', desc:'3Dカスタマイザー', url:'/grace-engine-demo.html' },

function initNewTabPage(container, tabId) {
  const input = container.querySelector('#ntp-input');
  if (input) {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && input.value.trim()) {
        e.preventDefault(); // prevent newline in textarea
        navigateTab(tabId, resolveUrl(input.value.trim()));
      }
    });
    setTimeout(() => input.focus(), 100);
  }
  // NTP voice button is handled by startNtpVoice() via onclick
  container.querySelectorAll('.ntp-shortcut').forEach(el => {
    el.addEventListener('click', () => {
      navigateTab(tabId, el.dataset.url);
    });
  });
  // Load Podcast/DTM feed
  loadNtpFeed(container, tabId);
}

// Podcast/DTM Feed — curated music production & podcast content
async function loadNtpFeed(container, tabId) {
  const feedEl = container.querySelector('#ntp-feed');
  if (!feedEl) return;

  // Curated DTM/Music/Podcast categories (iTunes Search API — free, no key needed)
  const queries = [
    { q: 'DTM+music+production', tag: 'DTM', color: '#6c5ce7' },
    { q: 'podcast+音楽制作', tag: 'Podcast', color: '#ff6b9d' },
    { q: 'synthesizer+tutorial', tag: 'Synth', color: '#00e5ff' },
    { q: 'recording+mixing+mastering', tag: 'Mix', color: '#ffa502' },
  ];

  try {
    // Fetch one random category to keep it fast
    const pick = queries[Math.floor(Math.random() * queries.length)];
    const res = await fetch(`https://itunes.apple.com/search?term=${pick.q}&media=podcast&limit=6&country=jp`);
    if (!res.ok) throw new Error('Feed fetch failed');
    const data = await res.json();
    if (!data.results || data.results.length === 0) {
      feedEl.innerHTML = '<div style="color:var(--text2);font-size:11px;text-align:center;padding:12px;">No feeds available</div>';
      return;
    }
    feedEl.innerHTML = data.results.map(item => `
      <div class="feed-card" data-url="${escapeAttr(item.collectionViewUrl || item.trackViewUrl || '')}">
        <img src="${escapeAttr(item.artworkUrl60 || item.artworkUrl100 || '')}" alt="" loading="lazy"
          onerror="this.style.display='none'">
        <div class="feed-card-info">
          <div class="feed-card-title">${escapeHTML(item.trackName || item.collectionName || '')}</div>
          <div class="feed-card-sub">${escapeHTML(item.artistName || '')}</div>
          <span class="feed-card-tag" style="background:${pick.color}22;color:${pick.color};">${pick.tag}</span>
        </div>
      </div>
    `).join('');

    feedEl.querySelectorAll('.feed-card').forEach(card => {
      card.addEventListener('click', () => {
        const url = card.dataset.url;
        if (url) window.open(url, '_blank');
      });
    });
  } catch (e) {
    feedEl.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;">
        <div style="font-size:11px;color:var(--text2);">オフラインまたはフィード取得失敗</div>
        <div style="display:flex;gap:8px;">
          ${queries.map(q => `<span class="feed-card-tag" style="background:${q.color}22;color:${q.color};cursor:pointer;"
            onclick="window.open('https://podcasts.apple.com/jp/search?term=${q.q}','_blank')">${q.tag}</span>`).join('')}
        </div>
      </div>`;
  }
}

// ===== Navigation =====
function navigateTab(id, url) {
  const tab = getTab(id);
  if (!tab) return;

  url = resolveUrl(url);

  if (url === HOME_URL) {
    tab.url = url;
    tab.title = '新しいタブ';
    const content = document.getElementById(`tab-content-${id}`);
    if (content) {
      content.innerHTML = buildNewTabPage();
      initNewTabPage(content, id);
    }
    if (id === activeTabId) updateUrlBar(url);
    renderTabs();
    return;
  }

  // Push to tab history
  if (tab.historyIndex < tab.history.length - 1) {
    tab.history = tab.history.slice(0, tab.historyIndex + 1);
  }
  tab.history.push(url);
  tab.historyIndex = tab.history.length - 1;

  tab.url = url;

  // External URLs → open in real browser tab (iframe blocked by X-Frame-Options)
  const isLocal = url.startsWith('/') || url.startsWith(window.location.origin);
  if (!isLocal && /^https?:\/\//i.test(url)) {
    window.open(url, '_blank');
    addHistory(extractDomain(url), url);
    // Stay on current page
    tab.history.pop();
    tab.historyIndex = Math.max(0, tab.historyIndex - 1);
    tab.url = tab.history[tab.historyIndex] || HOME_URL;
    if (id === activeTabId) {
      updateUrlBar(tab.url);
      updateNavButtons(tab);
    }
    setStatus(`外部サイトを新しいタブで開きました`);
    showPichanBubble('Chromeで開いたよ！');
    renderTabs();
    return;
  }

  tab.loading = true;
  showLoading(true);
  setStatus(`読み込み中: ${url}`);

  const content = document.getElementById(`tab-content-${id}`);
  if (content) {
    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox';
    iframe.referrerPolicy = 'no-referrer';
    iframe.allow = 'autoplay; encrypted-media';
    iframe.src = url;

    iframe.addEventListener('load', () => {
      tab.loading = false;
      showLoading(false);
      try {
        const doc = iframe.contentDocument;
        if (doc && doc.title) tab.title = doc.title;
      } catch(e) {
        tab.title = extractDomain(url);
      }
      addHistory(tab.title, url);
      if (id === activeTabId) {
        updateUrlBar(url);
        updateNavButtons(tab);
      }
      setStatus('準備完了');
      renderTabs();
    });

    iframe.addEventListener('error', () => {
      tab.loading = false;
      showLoading(false);
      tab.title = extractDomain(url);
      setStatus('読み込みエラー');
      renderTabs();
    });

    content.innerHTML = '';
    content.appendChild(iframe);
  }

  if (id === activeTabId) {
    updateUrlBar(url);
    updateNavButtons(tab);
  }
  renderTabs();
}

function goBack() {
  const tab = getTab(activeTabId);
  if (!tab || tab.historyIndex <= 0) return;
  tab.historyIndex--;
  const url = tab.history[tab.historyIndex];
  loadHistoryEntry(tab, url);
}

function goForward() {
  const tab = getTab(activeTabId);
  if (!tab || tab.historyIndex >= tab.history.length - 1) return;
  tab.historyIndex++;
  const url = tab.history[tab.historyIndex];
  loadHistoryEntry(tab, url);
}

function loadHistoryEntry(tab, url) {
  tab.url = url;
  const content = document.getElementById(`tab-content-${tab.id}`);
  if (content) {
    const iframe = content.querySelector('iframe');
    if (iframe) {
      iframe.src = url;
    } else {
      navigateTab(tab.id, url);
      return;
    }
  }
  if (tab.id === activeTabId) {
    updateUrlBar(url);
    updateNavButtons(tab);
  }
}

function reload() {
  const tab = getTab(activeTabId);
  if (!tab) return;
  if (tab.url === HOME_URL) return;
  const content = document.getElementById(`tab-content-${tab.id}`);
  if (content) {
    const iframe = content.querySelector('iframe');
    if (iframe) {
      tab.loading = true;
      showLoading(true);
      iframe.src = iframe.src;
    }
  }
}

function goHome() {
  navigateTab(activeTabId, HOME_URL);
}

// ===== URL Resolution =====
function resolveUrl(input) {
  if (!input) return HOME_URL;
  if (input === HOME_URL) return input;
  if (input.startsWith('/')) return input; // local paths
  if (/^https?:\/\//i.test(input)) return input;
  if (/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(input)) return input;
  // Local file paths (e.g., gracevox.html, records.html)
  if (/\.(html?|htm)$/i.test(input)) return '/' + input;
  // Check if it looks like a domain (must have at least one dot, not just .html)
  if (/^[^\s]+\.[^\s]+$/.test(input) && !input.includes(' ')) {
    return 'https://' + input;
  }
  // Treat as search
  return SEARCH_ENGINE + encodeURIComponent(input);
}

function extractDomain(url) {
  try {
    if (url.startsWith('/')) return 'localhost';
    return new URL(url).hostname;
  } catch { return url.slice(0, 30); }
}

// ===== UI Rendering =====
function renderTabs() {
  tabsContainer.innerHTML = '';
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.innerHTML = `
      <span class="tab-favicon">${tab.url === HOME_URL ? '🏠' : '🌐'}</span>
      <span class="tab-title">${escapeHTML(tab.title || '新しいタブ')}</span>
      <span class="tab-close" data-id="${tab.id}">×</span>`;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-close')) {
        closeTab(parseInt(e.target.dataset.id));
      } else {
        activateTab(tab.id);
      }
    });
    // Middle click to close
    el.addEventListener('auxclick', (e) => {
      if (e.button === 1) { e.preventDefault(); closeTab(tab.id); }
    });
    tabsContainer.appendChild(el);
  });
  tabCountEl.textContent = `${tabs.length} タブ`;
  updateBookmarkBtn();
}

function updateUrlBar(url) {
  if (url === HOME_URL) {
    urlBar.value = '';
    sslIndicator.textContent = '🔍';
    sslIndicator.className = '';
    sslIndicator.title = '検索';
  } else {
    urlBar.value = url;
    if (url.startsWith('https://')) {
      sslIndicator.textContent = '🔒';
      sslIndicator.className = 'secure';
      sslIndicator.title = '安全な接続';
    } else if (url.startsWith('http://')) {
      sslIndicator.textContent = '⚠';
      sslIndicator.className = 'insecure';
      sslIndicator.title = '保護されていない接続';
    } else {
      sslIndicator.textContent = '📄';
      sslIndicator.className = '';
      sslIndicator.title = 'ローカルページ';
    }
  }
}

function updateNavButtons(tab) {
  document.getElementById('btn-back').disabled = !tab || tab.historyIndex <= 0;
  document.getElementById('btn-forward').disabled = !tab || tab.historyIndex >= tab.history.length - 1;
}

function updateBookmarkBtn() {
  const tab = getTab(activeTabId);
  if (tab && bookmarks.some(b => b.url === tab.url)) {
    bookmarkBtn.textContent = '★';
    bookmarkBtn.classList.add('bookmarked');
  } else {
    bookmarkBtn.textContent = '☆';
    bookmarkBtn.classList.remove('bookmarked');
  }
}

function showLoading(show) {
  if (show) {
    loadingBar.style.width = '70%';
    loadingBar.classList.add('loading');
  } else {
    loadingBar.style.width = '100%';
    setTimeout(() => {
      loadingBar.classList.remove('loading');
      loadingBar.style.width = '0';
    }, 300);
  }
}

function setStatus(text) { statusText.textContent = text; }

// ===== Bookmarks & History =====
function toggleBookmark() {
  const tab = getTab(activeTabId);
  if (!tab || tab.url === HOME_URL) return;
  const idx = bookmarks.findIndex(b => b.url === tab.url);
  if (idx >= 0) {
    bookmarks.splice(idx, 1);
  } else {
    bookmarks.push({ title: tab.title || extractDomain(tab.url), url: tab.url, icon: '🌐' });
  }
  saveJSON('grace-bookmarks', bookmarks);
  updateBookmarkBtn();
  if (panelMode === 'bookmarks') renderPanel();
}

function addHistory(title, url) {
  if (url === HOME_URL) return;
  browsingHistory.unshift({ title, url, time: Date.now() });
  if (browsingHistory.length > MAX_HISTORY) browsingHistory = browsingHistory.slice(0, MAX_HISTORY);
  saveJSON('grace-history', browsingHistory);
}

// ===== Side Panel =====
function togglePanel() {
  sidePanel.classList.toggle('open');
  if (sidePanel.classList.contains('open')) renderPanel();
}

function renderPanel() {
  const items = panelMode === 'bookmarks' ? bookmarks : browsingHistory;
  if (items.length === 0) {
    panelContent.innerHTML = `<div class="panel-empty">${panelMode === 'bookmarks' ? 'ブックマークはありません' : '履歴はありません'}</div>`;
    return;
  }
  panelContent.innerHTML = items.map((item, i) => {
    const timeStr = item.time ? new Date(item.time).toLocaleString('ja-JP', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    }) : '';
    return `<div class="panel-item" data-url="${escapeAttr(item.url)}">
      <span class="panel-item-icon">${item.icon || '🌐'}</span>
      <div style="flex:1;overflow:hidden;">
        <div class="panel-item-text">${escapeHTML(item.title)}</div>
        <div class="panel-item-url">${timeStr ? timeStr + ' · ' : ''}${escapeHTML(item.url)}</div>
      </div>
      <span class="panel-item-delete" data-idx="${i}" title="削除">✕</span>
    </div>`;
  }).join('');

  panelContent.querySelectorAll('.panel-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('panel-item-delete')) {
        const idx = parseInt(e.target.dataset.idx);
        if (panelMode === 'bookmarks') {
          bookmarks.splice(idx, 1);
          saveJSON('grace-bookmarks', bookmarks);
        } else {
          browsingHistory.splice(idx, 1);
          saveJSON('grace-history', browsingHistory);
        }
        renderPanel();
        return;
      }
      navigateTab(activeTabId, el.dataset.url);
      sidePanel.classList.remove('open');
    });
  });
}

  contextMenu.innerHTML = [
    { icon: '←', label: '戻る', action: 'goBack' },
    { icon: '→', label: '進む', action: 'goForward' },
    { icon: '⟳', label: '再読み込み', action: 'reload' },
    { sep: true },
    { icon: '★', label: 'ブックマークに追加', action: 'bookmark', show: isPage },
    { icon: '↓', label: 'ページをダウンロード', action: 'download', show: isPage },
    { icon: '+', label: '新しいタブ', action: 'newTab' },
    { sep: true },
    { icon: '⌂', label: 'ホームに戻る', action: 'home' },
  ].filter(item => item.show !== false).map(item => {
    if (item.sep) return '<div class="ctx-sep"></div>';
    return `<div class="ctx-item" data-action="${item.action}"><span>${item.icon}</span> ${item.label}</div>`;
  }).join('');

  contextMenu.style.display = 'block';
  contextMenu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  contextMenu.style.top = Math.min(e.clientY, window.innerHeight - 250) + 'px';
});
contextMenu.addEventListener('click', (e) => {
  const action = e.target.closest('.ctx-item')?.dataset.action;
  contextMenu.style.display = 'none';
  if (!action) return;
  switch(action) {
    case 'goBack': goBack(); break;
    case 'goForward': goForward(); break;
    case 'reload': reload(); break;
    case 'bookmark': toggleBookmark(); break;
    case 'download': document.getElementById('btn-download').click(); break;
    case 'newTab': createTab(); break;
    case 'home': goHome(); break;
  }
});
document.addEventListener('click', () => { contextMenu.style.display = 'none'; });

// URL bar
urlBar.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && urlBar.value.trim()) {
    navigateTab(activeTabId, resolveUrl(urlBar.value.trim()));
    urlBar.blur();
  }
  if (e.key === 'Escape') { urlBar.blur(); }
});
urlBar.addEventListener('focus', () => urlBar.select());

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    switch(e.key) {
      case 't': e.preventDefault(); createTab(); break;
      case 'w': e.preventDefault(); closeTab(activeTabId); break;
      case 'l': e.preventDefault(); urlBar.focus(); break;
      case 'r': e.preventDefault(); reload(); break;
    }
    if (e.shiftKey && e.key === 'V') { e.preventDefault(); startVoiceSearch(); }
  }
  if (e.altKey) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goForward(); }
  }
});

// ===== Inline Voice Search (URL bar direct input) =====
const voiceNavBtn = document.getElementById('voice-btn');
let voiceRecognition = null;
let voiceFinalText = '';
let _voiceActive = false;

const hasSpeechRecognition = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

// NTP Go button: submit search from NTP input
function ntpGo() {
  const ntpInput = document.getElementById('ntp-input');
  if (ntpInput && ntpInput.value.trim()) {
    navigateTab(activeTabId, resolveUrl(ntpInput.value.trim()));
  }
}

// NTP voice: GraceVox-quality voice input with voiceprint
let _ntpVoiceActive = false, _ntpVoiceRec = null;
let _ntpVoiceCtx = null, _ntpVoiceAnalyser = null, _ntpVoiceStream = null, _ntpVoiceAnim = null;
let _ntpFinalText = '';

function startNtpVoice() {
  if (!hasSpeechRecognition) { setStatus('音声認識非対応'); return; }
  const ntpInput = document.getElementById('ntp-input');
  const btn = document.getElementById('ntp-voice-btn');
  if (!ntpInput) return;

  if (_ntpVoiceActive) { stopNtpVoice(); return; } // toggle off

  _ntpVoiceActive = true;
  _ntpFinalText = ntpInput.value || ''; // keep existing text
  ntpInput.placeholder = '🎤 話してください...';
  ntpInput.focus();
  if (btn) { btn.style.background='#ff6b6b'; btn.textContent='■'; }

  // Show voiceprint canvas
  const vpCanvas = document.getElementById('ntp-voiceprint');
  if (vpCanvas) vpCanvas.style.display = 'block';

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  _ntpVoiceRec = new SR();
  _ntpVoiceRec.continuous = true;  // 途切れても継続
  _ntpVoiceRec.interimResults = true;
  _ntpVoiceRec.lang = 'ja-JP';

  let _ntpResultIdx = 0; // track processed results to avoid duplication
  _ntpVoiceRec.onresult = (e) => {
    let interim = '';
    for (let i = _ntpResultIdx; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        _ntpFinalText += e.results[i][0].transcript;
        _ntpResultIdx = i + 1; // mark as processed
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    ntpInput.value = _ntpFinalText + interim;
    // Auto-resize textarea
    ntpInput.style.height = 'auto';
    ntpInput.style.height = Math.min(120, ntpInput.scrollHeight) + 'px';
  };

  _ntpVoiceRec.onerror = (e) => {
    if (e.error === 'no-speech') {
      setStatus('音声が検出されませんでした — マイクは待機中');
      // Don't stop! Keep listening
    } else if (e.error === 'not-allowed') {
      setStatus('マイクへのアクセスが許可されていません');
      stopNtpVoice();
    }
  };

  _ntpVoiceRec.onend = () => {
    // Auto-copy to clipboard when speech pauses (like GraceVox)
    if (_ntpFinalText.trim()) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(_ntpFinalText.trim()).then(() => {
          setStatus('📋 コピーしました — ■で停止、Enterで検索');
        }).catch(() => {});
      }
    }
    // Auto-restart if still active (continuous mode may stop on silence)
    if (_ntpVoiceActive) {
      _ntpResultIdx = 0;
      try { _ntpVoiceRec.start(); } catch(e) { stopNtpVoice(); }
    }
  };

  _ntpVoiceRec.start();
  _startNtpVoiceprint();
  setStatus('🎤 音声入力中... ■で停止');
}

function stopNtpVoice() {
  _ntpVoiceActive = false;
  if (_ntpVoiceRec) { try{_ntpVoiceRec.abort();}catch(e){} _ntpVoiceRec=null; }
  _stopNtpVoiceprint();
  const btn = document.getElementById('ntp-voice-btn');
  const ntpInput = document.getElementById('ntp-input');
  if (btn) { btn.style.background='linear-gradient(135deg,#6c5ce7,#8b5cf6)'; btn.textContent='🎤'; }
  if (ntpInput) ntpInput.placeholder = '検索、URL、または音声メモ...';
  const vpCanvas = document.getElementById('ntp-voiceprint');
  if (vpCanvas) vpCanvas.style.display = 'none';
  setStatus('準備完了');
}

// Voiceprint visualizer for NTP
function _startNtpVoiceprint() {
  if (!navigator.mediaDevices) return;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    _ntpVoiceStream = stream;
    _ntpVoiceCtx = new (window.AudioContext || window.webkitAudioContext)();
    _ntpVoiceAnalyser = _ntpVoiceCtx.createAnalyser();
    _ntpVoiceAnalyser.fftSize = 256;
    _ntpVoiceCtx.createMediaStreamSource(stream).connect(_ntpVoiceAnalyser);
    _drawNtpVoiceprint();
  }).catch(() => {});
}

function _drawNtpVoiceprint() {
  if (!_ntpVoiceAnalyser || !_ntpVoiceActive) return;
  const cv = document.getElementById('ntp-voiceprint');
  if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  const w = cv.clientWidth * dpr, h = cv.clientHeight * dpr;
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  const ctx = cv.getContext('2d');
  const data = new Uint8Array(_ntpVoiceAnalyser.frequencyBinCount);
  _ntpVoiceAnalyser.getByteFrequencyData(data);

  // Scroll left
  const img = ctx.getImageData(2, 0, w - 2, h);
  ctx.putImageData(img, 0, 0);
  ctx.clearRect(w - 2, 0, 2, h);

  // Draw new column (cyber neon palette)
  const bins = Math.min(data.length, 64);
  const sliceH = h / bins;
  for (let i = 0; i < bins; i++) {
    const v = data[i] / 255;
    if (v < 0.02) continue;
    let r, g, b;
    if (v < 0.05) { r=0; g=v*200; b=v*400; }
    else if (v < 0.2) { const t=(v-0.05)/0.15; r=t*40; g=10+t*80; b=20+t*180; }
    else if (v < 0.45) { const t=(v-0.2)/0.25; r=40+t*140; g=90-t*50; b=200+t*55; }
    else if (v < 0.75) { const t=(v-0.45)/0.3; r=180+t*75; g=40+t*40; b=255-t*100; }
    else if (v < 0.9) { const t=(v-0.75)/0.15; r=255; g=80+t*120; b=155+t*100; }
    else { const t=(v-0.9)/0.1; r=255; g=200+t*55; b=255; }
    ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
    ctx.fillRect(w - 2, h - (i + 1) * sliceH, 2, Math.ceil(sliceH) + 1);
  }
  _ntpVoiceAnim = requestAnimationFrame(_drawNtpVoiceprint);
}

function _stopNtpVoiceprint() {
  if (_ntpVoiceAnim) { cancelAnimationFrame(_ntpVoiceAnim); _ntpVoiceAnim = null; }
  if (_ntpVoiceStream) { _ntpVoiceStream.getTracks().forEach(t => t.stop()); _ntpVoiceStream = null; }
  if (_ntpVoiceCtx) { _ntpVoiceCtx.close().catch(()=>{}); _ntpVoiceCtx = null; }
  _ntpVoiceAnalyser = null;
}

function startVoiceSearch() {
  if (!hasSpeechRecognition) {
    setStatus('このブラウザは音声認識に対応していません');
    return;
  }
  if (_voiceActive) { stopVoiceSearch(); return; } // toggle off

  voiceFinalText = '';
  _voiceActive = true;
  voiceNavBtn.classList.add('listening');
  urlBar.classList.add('voice-active');
  urlBar.value = '';
  urlBar.placeholder = '🎤 話してください...';
  urlBar.focus();

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceRecognition = new SR();
  voiceRecognition.continuous = false;
  voiceRecognition.interimResults = true;
  voiceRecognition.lang = 'ja-JP';

  voiceRecognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if (final) voiceFinalText = final;
    // リアルタイムでURLバーに表示
    urlBar.value = voiceFinalText || interim;
  };

  voiceRecognition.onerror = (e) => {
    if (e.error === 'no-speech') {
      setStatus('音声が検出されませんでした。もう一度お試しください');
    } else if (e.error === 'not-allowed') {
      setStatus('マイクへのアクセスが許可されていません');
    }
    stopVoiceSearch();
  };

  voiceRecognition.onend = () => {
    _voiceActive = false;
    voiceNavBtn.classList.remove('listening');
    urlBar.placeholder = 'URLを入力、音声で検索...';
    const text = (voiceFinalText || urlBar.value).trim();
    if (text) {
      urlBar.value = text;
      urlBar.focus();
      urlBar.select();
      setStatus(`🎤 "${text}" — Enterで検索`);
    } else {
      setStatus('準備完了');
    }
  };

  voiceRecognition.start();
  setStatus('🎤 音声入力中... もう一度押すと停止');
}

function stopVoiceSearch() {
  if (voiceRecognition) {
    try { voiceRecognition.stop(); } catch(e) {}
    voiceRecognition = null;
  }
  _voiceActive = false;
  voiceNavBtn.classList.remove('listening');
  urlBar.classList.remove('voice-active');
  urlBar.placeholder = 'URLを入力、音声で検索...';
  setStatus('準備完了');
}

// Legacy function kept for NTP voice button compatibility
function confirmVoiceSearch() { stopVoiceSearch(); }

// Voice button: toggle inline voice input

// Pi-chan drag
(function(){
  const el = document.getElementById('pichanMini');
  if (!el) return;
  let _dragging=false, _moved=false, _sx=0, _sy=0, _sr=0, _sb=0;
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault(); _dragging=false; _moved=false;
    _sx=e.clientX; _sy=e.clientY;
    _sr=parseInt(el.style.right)||12; _sb=parseInt(el.style.bottom)||28;
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', (e) => {
    const dx=e.clientX-_sx, dy=e.clientY-_sy;
    if(Math.abs(dx)>5||Math.abs(dy)>5){
      _moved=true; _dragging=true;
      el.style.right=Math.max(0,_sr-dx)+'px';
      el.style.bottom=Math.max(0,_sb-dy)+'px';
      el.style.transition='none';
    }
  });
  el.addEventListener('pointerup', (e) => {
    el.releasePointerCapture(e.pointerId);
    el.style.transition='';
    if(_dragging){ _dragging=false; showPichanBubble('ここに置いてくれるの？ありがとう！'); }
  });
})();
