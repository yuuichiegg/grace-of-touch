// Simple hash from icon passphrase
const hashPassphrase = async (icons) => {
  const data = new TextEncoder().encode(icons.join(''));
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 32);
};

const CloudSync = {
  async save(hash, data) {
    if (!db) return;
    try {
      await db.collection('sync').doc(hash).set({
        ...data,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      console.log('[GraceOS] Cloud save OK');
    } catch (e) { console.warn('[GraceOS] Cloud save failed:', e.message); }
  },
  async load(hash) {
    if (!db) return null;
    try {
      const doc = await db.collection('sync').doc(hash).get();
      if (doc.exists) {
        console.log('[GraceOS] Cloud load OK');
        return doc.data();
      }
      return null;
    } catch (e) { console.warn('[GraceOS] Cloud load failed:', e.message); return null; }
  }
};

};

const mean = arr => arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 0;
const std = arr => {
  if (!arr.length) return 0;
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s,x)=>s+(x-m)*(x-m),0) / arr.length);
};
const zScore = (value, m, s) => (s === 0 || isNaN(s)) ? 0 : (value - m) / s;

const computeBaseline = (logs) => {
  const speeds = logs.map(l => l.vital.avgSpeed);
  const jitters = logs.map(l => l.vital.jitter);
  const ruminations = logs.map(l => l.vital.rumination);
  const rhythms = logs.map(l => l.vital.rhythmIrregularity);
  return {
    speedMean: mean(speeds), speedStd: std(speeds),
    jitterMean: mean(jitters), jitterStd: std(jitters),
    ruminationMean: mean(ruminations), ruminationStd: std(ruminations),
    rhythmMean: mean(rhythms), rhythmStd: std(rhythms)
  };
};

// --- 音響管理カスタムフック (安全なUnlock強化版) ---
class GraceAudioManager {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.isInitialized = false;
  }

  unlock() {
    if (!this.ctx) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AudioContext();
    }
    
    // すでに running なら初期化チェックのみ
    if (this.ctx.state === 'running') {
      if (!this.isInitialized) this._initializeOscillators();
      return;
    }

    // suspended なら resume を試す（ユーザー gesture 内で呼ばれることを期待）
    if (this.ctx.state === 'suspended') {
      this.ctx.resume().then(() => {
        console.log("AudioContext resumed successfully. State:", this.ctx.state);
        if (!this.isInitialized) this._initializeOscillators();
      }).catch(err => {
        console.warn("Resume failed. Gesture might be required:", err);
      });
    } else {
      // interrupted などの場合
      this.ctx.resume().catch(err => console.warn(err));
    }
  }

  _initializeOscillators() {
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.setValueAtTime(0, this.ctx.currentTime);
    this.masterGain.connect(this.ctx.destination);

    const oscLeft = this.ctx.createOscillator();
    const oscRight = this.ctx.createOscillator();
    oscLeft.type = 'sine'; oscRight.type = 'sine';
    oscLeft.frequency.value = 174; oscRight.frequency.value = 178; 

    if (this.ctx.createStereoPanner) {
      const pannerLeft = this.ctx.createStereoPanner();
      const pannerRight = this.ctx.createStereoPanner();
      pannerLeft.pan.value = -1; pannerRight.pan.value = 1;
      oscLeft.connect(pannerLeft).connect(this.masterGain);
      oscRight.connect(pannerRight).connect(this.masterGain);
    } else {
      oscLeft.connect(this.masterGain); oscRight.connect(this.masterGain);
    }

    const droneOsc = this.ctx.createOscillator();
    droneOsc.type = 'triangle'; droneOsc.frequency.value = 87; 

    const lfo = this.ctx.createOscillator();
    const lfoGain = this.ctx.createGain();
    lfo.type = 'sine'; lfo.frequency.value = 0.05; 
    
    const droneBaseGain = this.ctx.createGain();
    droneBaseGain.gain.value = 0.15; 

    lfo.connect(lfoGain.gain); lfoGain.gain.value = 0.4; 
    droneOsc.connect(lfoGain).connect(droneBaseGain).connect(this.masterGain);

    oscLeft.start(); oscRight.start(); lfo.start(); droneOsc.start();
    this.isInitialized = true;
    console.log("Audio initialized: Oscillators started");
  }

  setVolume(vol) {
    if (this.ctx && this.masterGain) {
      console.log(`Setting volume to ${vol}, context state: ${this.ctx.state}`);
      this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime);
      this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, this.ctx.currentTime);
      this.masterGain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 1.5);
    } else {
      console.warn("Cannot set volume: ctx or masterGain missing", { ctx: !!this.ctx, gain: !!this.masterGain });
    }
  }

  suspend() {
    if (this.ctx && this.ctx.state === 'running') {
      this.ctx.suspend().then(() => console.log("Audio suspended"));
    }
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume().then(() => console.log("Audio resumed")).catch(err => console.warn(err));
    }
  }
}

const audioManager = new GraceAudioManager();

const useGraceAudio = (targetVolume, isPlaying) => {
  useEffect(() => {
    if (!isPlaying) {
      audioManager.setVolume(0);
      return;
    }
    audioManager.setVolume(targetVolume);
  }, [targetVolume, isPlaying]);

  useEffect(() => {
    const handleVisibilityChange = () => {
      if (document.hidden) {
        audioManager.suspend();
      } else {
        // 画面復帰時は即 resume 試行 + 少し遅延で再試行 (iOS対策)
        const tryResume = () => {
          if (audioManager.ctx && audioManager.ctx.state === 'suspended') {
            audioManager.ctx.resume()
              .then(() => console.log("Resumed after visibilitychange"))
              .catch(e => console.warn("Resume after visibilitychange failed", e));
          }
        };
        tryResume();
        setTimeout(tryResume, 300);
        setTimeout(tryResume, 1000);
      }
    };
    document.addEventListener("visibilitychange", handleVisibilityChange);
    return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
  }, []);
};

function useLatestRef(val) {
  const ref = useRef(val);
  useEffect(() => { ref.current = val; }, [val]);
  return ref;
}

  const [message, setMessage] = useState("");
  const [isObserving, setIsObserving] = useState(false);
  
  const onSaveRef = useLatestRef(onSave);
  const baselineRef = useLatestRef(baseline);

  const points = useRef([]);
  const tracking = useRef(false);
  const analyzeTimeout = useRef(null);
  const particlesRef = useRef([]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const resize = () => {
      const parent = canvas.parentElement;
      const w = parent.clientWidth || window.innerWidth;
      const h = parent.clientHeight || Math.max(200, window.innerHeight - 160);
      canvas.width = w; canvas.height = h;
    };
    resize(); window.addEventListener("resize", resize);
    setTimeout(resize, 150);

    let running = true;
    let animationFrameId;
    const renderLoop = () => {
      if (!running) return;
      ctx.fillStyle = isEmergency ? "rgba(0, 0, 0, 0.1)" : "rgba(11, 15, 26, 0.15)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      particlesRef.current = particlesRef.current.filter(p => {
        ctx.fillStyle = isEmergency ? `rgba(100, 110, 140, ${p.alpha})` : `rgba(160, 190, 255, ${p.alpha})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.015;
        return p.alpha > 0;
      });
      animationFrameId = requestAnimationFrame(renderLoop);
    };
    renderLoop();

    const start = (e) => {
      if (analyzeTimeout.current) clearTimeout(analyzeTimeout.current);
      tracking.current = true; setIsObserving(true); setMessage(""); points.current = [];
      const rect = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      points.current.push({ x, y, time: performance.now(), angle: 0, speed: 0 });
    };

    const move = (e) => {
      if (!tracking.current) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      const now = performance.now();
      const lastP = points.current[points.current.length - 1];
      const dt = Math.max(1, now - lastP.time);
      const dx = x - lastP.x; const dy = y - lastP.y;
      const speed = Math.sqrt(dx*dx + dy*dy) / dt;
      const angle = Math.atan2(dy, dx);
      points.current.push({ x, y, speed, angle, time: now });
      for(let i=0; i<Math.min(6, Math.floor(speed * 3) + 1); i++) {
        particlesRef.current.push({ x: x + (Math.random()-0.5)*15, y: y + (Math.random()-0.5)*15, vx: (Math.random()-0.5)*(speed*4+1), vy: (Math.random()-0.5)*(speed*4+1), size: Math.random()*2+0.5, alpha: 1 });
      }
      if (analyzeTimeout.current) clearTimeout(analyzeTimeout.current);
      analyzeTimeout.current = setTimeout(() => { tracking.current = false; setIsObserving(false); analyze(); }, 2000);
    };

    const endAndAnalyze = () => { tracking.current = false; setIsObserving(false); analyze(); };

    const analyze = () => {
      const p = points.current;
      if (p.length < 10) return;
      let changes = 0, totalSpeed = 0, totalDist = 0, intervals = [], totalAngleChange = 0, fixationTime = 0, sharpTurns = 0, longMoves = 0;
      for (let i = 1; i < p.length; i++) {
        let dx = p[i].x - p[i-1].x, dy = p[i].y - p[i-1].y, dist = Math.sqrt(dx*dx + dy*dy), dt = p[i].time - p[i-1].time;
        intervals.push(dt); if (dt > 0) totalSpeed += dist / dt; totalDist += dist;
        if (dist < 5) fixationTime += dt;
        if (dist > 20 || (dist / Math.max(dt, 1) > 2.0)) longMoves++;
        if (i >= 2) {
          let a1 = p[i-1].angle, a2 = p[i].angle, diff = a2 - a1;
          if (diff > Math.PI) diff -= 2 * Math.PI; if (diff < -Math.PI) diff += 2 * Math.PI;
          totalAngleChange += diff;
          if (Math.abs(diff) > 2.4) sharpTurns++;
          if (Math.abs(diff) > 1.0) changes++;
        }
      }
      const totalTime = p[p.length - 1].time - p[0].time;
      const avgSpeed = (totalSpeed / p.length) * 10, jitter = changes / p.length;
      let rhythmIrregularity = 0; if (intervals.length > 0) { const m = mean(intervals); rhythmIrregularity = Math.sqrt(intervals.reduce((s,x)=>s+(x-m)*(x-m),0)/intervals.length); }
      const straightDist = Math.sqrt(Math.pow(p[p.length - 1].x - p[0].x, 2) + Math.pow(p[p.length - 1].y - p[0].y, 2));
      const rumination = (totalDist / (straightDist || 1));
      const loopIntensity = Math.abs(totalAngleChange) / (2 * Math.PI), pressureFixation = fixationTime / totalTime, threatReflex = sharpTurns / p.length, releaseFlow = longMoves / p.length;

      const currentBaseline = baselineRef.current;
      let state = "calm", messageToDisplay = "";
      
      if (!currentBaseline) {
        messageToDisplay = "神経の基準を計測しています。\n（自動校正中）";
        if (threatReflex > 0.4) state = "pre_impulse";
        else if (pressureFixation > 0.35) state = "suppression";
        else if (loopIntensity > 1.2) state = "rumination";
        else if (releaseFlow > 0.18) state = "regulated";
      } else {
        const speedZ = zScore(avgSpeed, currentBaseline.speedMean, currentBaseline.speedStd);
        const jitterZ = zScore(jitter, currentBaseline.jitterMean, currentBaseline.jitterStd);
        if (threatReflex > 0.4) state = "pre_impulse";
        else if (pressureFixation > 0.35) state = "suppression";
        else if (loopIntensity > 1.2) state = "rumination";
        else if (releaseFlow > 0.18) state = "regulated";
        else if (speedZ > 1.2 && jitterZ > 1.2) state = "anxious";
        else state = "calm";
        
        const msgs = { pre_impulse: "運動反射の兆候（衝動）\n返信の前に「境界」を引くことを推奨します。", suppression: "感情の抑圧・固着\n言えない感情を抑え込んでいませんか。", rumination: "未完了タスクの反芻\n思考が同じ軌道を回っています。", regulated: "安全な着地（解放）\n神経系が安全な状態に着地しています。", anxious: "神経が警戒モードです。\n刺激を強く受け取っています。", calm: "体が安全だと判断しています。" };
        messageToDisplay = msgs[state];
      }
      
      setMessage(messageToDisplay);
      onSaveRef.current({ id: Date.now(), type: 'touch_vital', stateLabel: state, vital: { avgSpeed, jitter, rumination, rhythmIrregularity, loopIntensity, pressureFixation, threatReflex, releaseFlow }, timestamp: new Date().toISOString() });
    };

    canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move, { passive: true }); window.addEventListener("mouseup", endAndAnalyze); 
    canvas.addEventListener("touchstart", start, { passive: true }); canvas.addEventListener("touchmove", move, { passive: true }); window.addEventListener("touchend", endAndAnalyze);
    
    return () => { 
      running = false;
      window.removeEventListener("resize", resize); cancelAnimationFrame(animationFrameId); if (analyzeTimeout.current) clearTimeout(analyzeTimeout.current); 
      canvas.removeEventListener("mousedown", start); canvas.removeEventListener("mousemove", move); window.removeEventListener("mouseup", endAndAnalyze); 
      canvas.removeEventListener("touchstart", start); canvas.removeEventListener("touchmove", move); window.removeEventListener("touchend", endAndAnalyze); 
    };
  }, []); 

  return (
    <div className="flex flex-col animate-fade-in relative" style={{ height: 'calc(100dvh - 9rem)' }}>
      <div className="absolute top-6 left-0 right-0 text-center z-10 pointer-events-none" style={{ opacity: (isObserving || message) ? 0 : 0.6 }}>
        <p className="text-xs tracking-widest font-light text-slate-300">いまの気持ちを、言葉じゃなく、<br/>指で置いていってください。</p>
      </div>
      <div className="flex-1 relative w-full">
        <canvas ref={canvasRef} className="absolute inset-0 w-full h-full rounded-2xl transition-colors duration-1000 shadow-inner" style={{ background: '#0b0f1a', touchAction: 'none' }} />
        <div className="absolute inset-0 pointer-events-none flex items-center justify-center px-4 transition-all duration-2000 ease-out" style={{ opacity: message ? 1 : 0, transform: message ? 'translateY(0)' : 'translateY(10px)' }}>
          <p className="text-center text-sm leading-loose tracking-wide font-light whitespace-pre-line text-indigo-100/90 bg-slate-950/40 p-4 rounded-2xl backdrop-blur-sm border border-slate-800/30">{message}</p>
        </div>
      </div>
    </div>
  );
};

};

// --- 呼吸ガイド ---
const BreathingGuide = () => {
  const [active, setActive] = useState(false);
  const [phase, setPhase] = useState('ready'); // ready, inhale, hold, exhale
  const [count, setCount] = useState(0);
  const [cycles, setCycles] = useState(0);
  const timerRef = useRef(null);

  const INHALE = 4, HOLD = 4, EXHALE = 6;

  useEffect(() => {
    if (!active) return;
    let currentPhase = 'inhale';
    let currentCount = INHALE;
    setPhase('inhale');
    setCount(INHALE);

    timerRef.current = setInterval(() => {
      currentCount--;
      if (currentCount <= 0) {
        if (currentPhase === 'inhale') { currentPhase = 'hold'; currentCount = HOLD; }
        else if (currentPhase === 'hold') { currentPhase = 'exhale'; currentCount = EXHALE; }
        else { currentPhase = 'inhale'; currentCount = INHALE; setCycles(c => c + 1); }
      }
      setPhase(currentPhase);
      setCount(currentCount);
    }, 1000);

    return () => clearInterval(timerRef.current);
  }, [active]);

  const phaseLabel = { ready: 'タップして開始', inhale: '吸う', hold: '止める', exhale: '吐く' };
  const phaseColor = { ready: 'text-slate-500', inhale: 'text-sky-400', hold: 'text-amber-400', exhale: 'text-indigo-400' };
  const circleScale = { ready: 0.4, inhale: 1, hold: 1, exhale: 0.4 };

  return (
    <div className="p-5 rounded-lg bg-sky-950/10 border border-sky-900/20 animate-fade-in">
      <h4 className="text-xs tracking-[0.2em] text-sky-400/70 mb-5 flex items-center"><Wind className="w-4 h-4 mr-2" />BREATHING GUIDE</h4>

      <div className="flex flex-col items-center py-4">
        <button onClick={() => { setActive(!active); setCycles(0); setPhase('ready'); setCount(0); }}
          className="relative w-32 h-32 rounded-full flex items-center justify-center mb-4">
          <div className={`absolute inset-0 rounded-full bg-sky-500/10 border border-sky-500/20 transition-transform duration-1000 ease-in-out`}
            style={{ transform: `scale(${circleScale[phase]})` }} />
          <div className="relative z-10 text-center">
            <div className={`text-3xl font-light mb-1 transition-colors duration-500 ${phaseColor[phase]}`}>
              {active ? count : ''}
            </div>
            <div className={`text-xs tracking-widest ${phaseColor[phase]}`}>{phaseLabel[phase]}</div>
          </div>
        </button>
        {active && (
          <div className="flex gap-4 items-center">
            <span className="text-xs text-slate-600 tracking-widest">{cycles} サイクル</span>
            <button onClick={() => { setActive(false); setPhase('ready'); }} className="text-xs text-slate-500 underline hover:text-slate-300 min-h-[44px] px-2">停止</button>
          </div>
        )}
        {!active && (
          <p className="text-xs text-slate-600 tracking-wider text-center leading-relaxed mt-2">4-4-6 呼吸法<br/>副交感神経を活性化します</p>
        )}
      </div>
    </div>
  );
};

  const combinedTimeline = [...logs, ...unsentLogs].sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());

  const formatDate = (isoString) => {
    const d = new Date(isoString);
    return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;

  return (

        <div role="dialog" aria-modal="true" className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-sm animate-fade-in">

          </div>
        </div>
      )}

      <DailyIntention intention={intention} onSave={onIntention} />

      <SelfCheckIn checkins={checkins} onSave={onCheckin} />

      <BreathingGuide />

      <div className="mb-6 flex justify-between items-end">
        <h2 className="text-sm font-light tracking-widest text-slate-400">観測記録</h2>
        <button onClick={clearLogs} className="text-xs underline text-slate-500 hover:text-slate-300 min-h-[44px] px-2 flex items-center">初期化</button>

      {latestVital && baseline && (
        <div className="p-5 rounded-lg bg-slate-900/30 border border-slate-800/50 mb-6 animate-fade-in relative">
          <h4 className="text-xs tracking-[0.2em] text-slate-500 mb-6 text-center">BIOMETRIC DEVIATION</h4>
          <div className="absolute top-[48px] bottom-5 left-1/2 w-px bg-slate-700/50 z-0"></div>
          <div className="space-y-4 relative z-10">
            <VitalZMeter label="IMPULSE" z={latestVital.threatReflex * 10 - 2} color="bg-red-500/60" isEmergency={isEmergency} />
            <VitalZMeter label="SUPPRESSION" z={latestVital.pressureFixation * 10 - 2} color="bg-orange-500/60" isEmergency={isEmergency} />
            <VitalZMeter label="RHYTHM" z={zScore(latestVital.rhythmIrregularity, baseline.rhythmMean, baseline.rhythmStd)} color="bg-blue-500/60" isEmergency={isEmergency} />
          </div>
        </div>
      )}

      <div className="space-y-5">
        {combinedTimeline.map(log => {
           const isLocked = log.type === 'unsent_message' && Date.now() < log.unlockAt;
           return (
            <div key={log.id} className="text-xs flex flex-col gap-2 border-l border-slate-800 pl-3">
              <span className="font-mono text-slate-500 tracking-wider text-xs">{formatDate(log.timestamp)}</span>
              {log.type === 'touch_vital' ? (
                <span className="text-slate-400 font-light italic">神経の律動を記録: {log.stateLabel}</span>

const MotorCooldownScreen = ({ onFinish }) => {

  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize(); window.addEventListener("resize", resize);
    
    let running = true;
    let animationFrameId;
    const draw = (e) => {
      const x = e.touches ? e.touches[0].clientX : e.clientX; const y = e.touches ? e.touches[0].clientY : e.clientY;
      ctx.fillStyle = "rgba(100, 140, 200, 0.08)"; ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fill();
    };
    const renderFade = () => {
      if (!running) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      animationFrameId = requestAnimationFrame(renderFade);
    };
    renderFade();

    canvas.addEventListener("touchmove", draw, { passive: true }); canvas.addEventListener("mousemove", draw);
    return () => {
      running = false;
      window.removeEventListener("resize", resize); cancelAnimationFrame(animationFrameId);
      canvas.removeEventListener("touchmove", draw); canvas.removeEventListener("mousemove", draw);
    };
  }, []);

  return (
    <div role="dialog" aria-modal="true" className="fixed inset-0 bg-black z-50 flex items-center justify-center text-center animate-fade-in" style={{ touchAction: 'auto' }}>

const OnboardingScreen = ({ onComplete, onUnlockAudio }) => {
  const [step, setStep] = useState(0); 
  const [vitalMessage, setVitalMessage] = useState(""); 
  const canvasRef = useRef(null); 
  const points = useRef([]); 
  const tracking = useRef(false);
  const onUnlockAudioRef = useLatestRef(onUnlockAudio);

  useEffect(() => { 
    let t1, t2;
    if (step === 0) t1 = setTimeout(() => setStep(1), 3500); 
    if (step === 1) t2 = setTimeout(() => setStep(2), 3500); 
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [step]);
  
  useEffect(() => {
    if (step !== 2) return; 
    const canvas = canvasRef.current; const ctx = canvas.getContext("2d"); 
    let particles = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }; resize();
    
    let running = true;
    let animationFrameId;
    const drawParticles = () => { 
      if (!running) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
      particles = particles.filter(p => { 
        ctx.fillStyle = `rgba(160, 180, 255, ${p.alpha})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); 
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.02; 
        return p.alpha > 0;
      }); 
      animationFrameId = requestAnimationFrame(drawParticles); 
    }; 
    drawParticles();
    
    const move = (e) => { 
      if (!tracking.current) return; 
      const x = (e.touches ? e.touches[0].clientX : e.clientX); const y = (e.touches ? e.touches[0].clientY : e.clientY); 
      const now = performance.now(); const lastP = points.current[points.current.length - 1]; 
      const speed = Math.sqrt(Math.pow(x-lastP.x,2)+Math.pow(y-lastP.y,2))/(Math.max(1, now-lastP.time)); 
      points.current.push({ x, y, time: now, angle: Math.atan2(y-lastP.y, x-lastP.x) }); 
      for(let i=0; i<Math.min(5, Math.floor(speed*2)+1); i++) particles.push({ x, y, vx: (Math.random()-0.5)*speed*5, vy: (Math.random()-0.5)*speed*5, size: Math.random()*2+1, alpha: 1 }); 
    };
    
    const end = () => { tracking.current = false; setStep(3); setVitalMessage("体が安全だと判断しています。"); };

    const handleMouseDown = (e) => { onUnlockAudioRef.current(); tracking.current = true; points.current = [{x:e.clientX, y:e.clientY, time:performance.now()}]; };
    const handleTouchStart = (e) => { onUnlockAudioRef.current(); tracking.current = true; points.current = [{x:e.touches[0].clientX, y:e.touches[0].clientY, time:performance.now()}]; };

    canvas.addEventListener("mousedown", handleMouseDown); 
    canvas.addEventListener("mousemove", move, { passive: true }); 
    window.addEventListener("mouseup", end);
    
    canvas.addEventListener("touchstart", handleTouchStart, { passive: true }); 
    canvas.addEventListener("touchmove", move, { passive: true }); 
    window.addEventListener("touchend", end);
    
    return () => {
      running = false;
      window.removeEventListener("resize", resize); cancelAnimationFrame(animationFrameId);
      canvas.removeEventListener("mousedown", handleMouseDown);
      canvas.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", end);
      canvas.removeEventListener("touchstart", handleTouchStart);
      canvas.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", end);
    };
  }, [step, onUnlockAudioRef]);

  useEffect(() => { 
    let t3, t4;
    if (step === 3) t3 = setTimeout(() => setStep(4), 4000); 
    if (step === 4) t4 = setTimeout(() => { localStorage.setItem(LOCAL_STORAGE_KEY_ONBOARDING, 'true'); onComplete(); }, 4000); 
    return () => { clearTimeout(t3); clearTimeout(t4); };
  }, [step, onComplete]);
  
  return (
    <div className="fixed inset-0 bg-black z-[100] flex items-center justify-center text-center px-6 py-8" style={{ touchAction: 'none' }}>
      <div className="max-w-sm w-full relative z-10 pointer-events-none">
        <div className={`transition-opacity duration-2000 ${step === 0 ? 'opacity-100' : 'opacity-0 absolute'}`}><p className="text-slate-400 text-sm tracking-widest font-light animate-fade-in">言葉は、嘘をつきます。</p></div>
        <div className={`transition-opacity duration-2000 ${step === 1 ? 'opacity-100' : 'opacity-0 absolute'}`}><p className="text-slate-400 text-sm tracking-widest font-light animate-fade-in">でも、指先は嘘をつけない。</p></div>
        <div className={`transition-opacity duration-2000 ${step === 2 ? 'opacity-100' : 'opacity-0 absolute'}`}>
          <p className="text-slate-400 text-xs tracking-[0.2em] font-light animate-fade-in">いまの気持ちを、言葉じゃなく、<br/>この暗闇に置いていってください。<br/><span className="text-[10px] opacity-50 mt-4 block">（触れると、深い音が始まります）</span></p>
        </div>
        <div className={`transition-opacity duration-2000 ${step === 3 ? 'opacity-100' : 'opacity-0 absolute'}`}><p className="text-indigo-200/80 text-sm tracking-wider animate-fade-in">{vitalMessage}</p></div>
        <div className={`transition-opacity duration-2000 ${step === 4 ? 'opacity-100' : 'opacity-0 absolute'}`}><p className="text-slate-400 text-sm tracking-widest font-light animate-fade-in">ここは、言葉にならないものを<br/>置いていく場所です。</p></div>
      </div>
      {step === 2 && <canvas ref={canvasRef} className="absolute inset-0 w-full h-full opacity-80 cursor-crosshair" />}
    </div>
  );
};

        setBaseline(b);
      } else if (Array.isArray(b) && b.length > 0 && b[0].speedMean !== undefined) {
        setBaseline(b[0]); 
      }
    } catch { localStorage.removeItem(LOCAL_STORAGE_KEY_BASELINE); }

    const lastBoundary = localStorage.getItem(LOCAL_STORAGE_KEY_BOUNDARY);
    if (lastBoundary && (Date.now() - Number(lastBoundary) < 1800000)) {
      setBoundaryMode(true);
    }

    try {
      const savedCheckins = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_CHECKIN) || "[]");
      if (Array.isArray(savedCheckins)) setCheckins(savedCheckins);
    } catch { localStorage.removeItem(LOCAL_STORAGE_KEY_CHECKIN); }

    try {
      const savedIntention = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_INTENTION));
      if (savedIntention && savedIntention.text) setIntention(savedIntention);
    } catch { localStorage.removeItem(LOCAL_STORAGE_KEY_INTENTION); }

    setIsLoaded(true);
  }, []);

  // [追加] App全体での初回タッチによる確実なUnlockキャッチ
  useEffect(() => {
    const unlockOnFirstInteraction = () => {
      handleUnlockAudio();
      document.removeEventListener('touchstart', unlockOnFirstInteraction);
      document.removeEventListener('click', unlockOnFirstInteraction);
    };

    if (isOnboarded) {
      document.addEventListener('touchstart', unlockOnFirstInteraction, { once: true });
      document.addEventListener('click', unlockOnFirstInteraction, { once: true });
    }

    return () => {
      document.removeEventListener('touchstart', unlockOnFirstInteraction);
      document.removeEventListener('click', unlockOnFirstInteraction);
    };
  }, [isOnboarded, handleUnlockAudio]);

  const handleCheckin = useCallback((entry) => {
    setCheckins(prev => {
      const updated = [...prev, entry].slice(-30);
      safeSave(LOCAL_STORAGE_KEY_CHECKIN, updated, 30);
      return updated;
    });
  }, []);

  const handleIntention = useCallback((entry) => {
    setIntention(entry);
    try { localStorage.setItem(LOCAL_STORAGE_KEY_INTENTION, JSON.stringify(entry)); } catch {}
  }, []);

  // --- Cloud sync: login handler ---
  const handlePassphraseLogin = useCallback((hash, cloudData) => {
    setSyncHash(hash);
    setShowPassphrase(false);
    if (cloudData) {
      // Restore from cloud (logs/unsent are NOT synced — session-specific)
      if (cloudData.checkins) { setCheckins(cloudData.checkins); safeSave(LOCAL_STORAGE_KEY_CHECKIN, cloudData.checkins, 30); }
      if (cloudData.intention) { setIntention(cloudData.intention); try { localStorage.setItem(LOCAL_STORAGE_KEY_INTENTION, JSON.stringify(cloudData.intention)); } catch {} }
      if (cloudData.onboarded) { setIsOnboarded(true); localStorage.setItem(LOCAL_STORAGE_KEY_ONBOARDING, 'true'); }
      console.log('[GraceOS] Restored from cloud');
    }
  }, []);

  const handlePassphraseSkip = useCallback(() => {
    setShowPassphrase(false);
  }, []);

  // --- Cloud sync: auto-save on data change (debounced) ---
  const syncTimerRef = useRef(null);
  useEffect(() => {
    if (!syncHash || !isLoaded) return;
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    syncTimerRef.current = setTimeout(() => {
      CloudSync.save(syncHash, {
        checkins: checkins.slice(-30),
        intention,
        onboarded: isOnboarded
      });
    }, 5000);
    return () => clearTimeout(syncTimerRef.current);
  }, [syncHash, checkins, intention, isOnboarded, isLoaded]);

  const handleSaveLog = useCallback((newLog) => {
    setLogs(prev => {
      const updated = [...prev, newLog].slice(-100);
      safeSave(LOCAL_STORAGE_KEY_TOUCH, updated, 100);
      return updated;
    });
  }, []);

  useEffect(() => {
    if (!baseline) {
      const vitalLogs = logs.filter(l => l.type === 'touch_vital' && l.vital);
      if (vitalLogs.length >= 4) {
        const newBaseline = computeBaseline(vitalLogs);
        safeSave(LOCAL_STORAGE_KEY_BASELINE, [newBaseline], 1); 
        setBaseline(newBaseline);
      }
    }
  }, [logs, baseline]);

  useEffect(() => {
    const handleVisibility = () => {
      if (document.hidden) {
        hiddenTimeRef.current = Date.now();
        setLogs(currentLogs => {
          const vitalLogs = currentLogs.filter(l => l.type === 'touch_vital' && l.vital);
          if (vitalLogs.length > 0) {
            const latest = vitalLogs[vitalLogs.length - 1];
            if (latest.stateLabel === 'pre_impulse' || latest.vital.threatReflex > 0.5) {
              lastStateWasCriticalRef.current = true;
            }
          }
          return currentLogs;
        });
      } else if (hiddenTimeRef.current) {
        const diff = Date.now() - hiddenTimeRef.current;
        
        if (diff > 15 * 60 * 1000) {
          setActiveTab('grace');
          setBoundaryMode(false);
          setShowReturnGate(false);
          setAftercare(false);
          setMotorCooldown(false);
          setIsEmergency(false);
          setInterventionResolved(false);
        } 
        else if (diff < 300000 && lastStateWasCriticalRef.current) {
          setBoundaryMode(true);
          setActiveTab('guard'); 
          handleSaveLog({ id: Date.now(), type: "reflex_return", timestamp: new Date().toISOString() });
        }
        hiddenTimeRef.current = null; 
        lastStateWasCriticalRef.current = false;
      }
    };
    document.addEventListener("visibilitychange", handleVisibility);
    return () => document.removeEventListener("visibilitychange", handleVisibility);
  }, [handleSaveLog]);

  const consecutiveCriticalRef = useRef(0);

  useEffect(() => {
    const vitalLogs = logs.filter(l => l.type === 'touch_vital' && l.vital);
    // Skip emergency detection for data loaded from localStorage (only trigger on NEW logs)
    if (initialLogCountRef.current === null) {
      initialLogCountRef.current = vitalLogs.length;
      return;
    }
    if (vitalLogs.length <= initialLogCountRef.current) return;

    // Need at least 8 logs for stable baseline before triggering emergency
    if (baseline && vitalLogs.length >= 8) {
      const latestLog = vitalLogs[vitalLogs.length - 1];

      if (latestLog.id === lastResolvedLogId) {
        setIsEmergency(false);
        consecutiveCriticalRef.current = 0;
        return;
      }

      const latest = latestLog.vital;
      const sz = Math.abs(zScore(latest.avgSpeed, baseline.speedMean, baseline.speedStd));
      const jz = Math.abs(zScore(latest.jitter, baseline.jitterMean, baseline.jitterStd));
      const rz = Math.abs(zScore(latest.rhythmIrregularity, baseline.rhythmMean, baseline.rhythmStd));
      const isCritical = Math.sqrt(sz*sz + jz*jz + rz*rz) > 5.0 || latest.threatReflex > 0.5;

      if (isCritical) {
        consecutiveCriticalRef.current++;
      } else {
        consecutiveCriticalRef.current = 0;
        setIsEmergency(false);
      }

      // Only trigger emergency after 3 consecutive critical readings
      if (consecutiveCriticalRef.current >= 3) {
        setIsEmergency(true);
        setInterventionResolved(false);
      }
    }
  }, [logs, baseline, lastResolvedLogId]);

  const hasReflex = logs.some(l => l.type === 'reflex_return' && (Date.now() - new Date(l.timestamp).getTime()) < 86400000);
  const handleClearLogs = useCallback(() => {
    if(window.confirm('観測記録と基準線を初期化しますか？（設定やオンボーディング状態は保持されます）')) { 
      localStorage.removeItem(LOCAL_STORAGE_KEY_TOUCH);
      localStorage.removeItem(LOCAL_STORAGE_KEY_UNSENT);
      localStorage.removeItem(LOCAL_STORAGE_KEY_BASELINE);
      
      setLogs([]);
      setUnsentLogs([]);
      setBaseline(null);
      setIsEmergency(false);
      setInterventionResolved(false);
      setLastResolvedLogId(null);
    }
  }, []);

  const resetAllOverlays = useCallback(() => {
    setShowReturnGate(false);
    setAftercare(false);
    setMotorCooldown(false);
    setIsEmergency(false);
    setInterventionResolved(false);
  }, []);

  const handleReturnGateFinish = () => {
    try {
      const savedUnsent = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_UNSENT) || "[]");
      if (Array.isArray(savedUnsent)) setUnsentLogs(savedUnsent);
    } catch(e) {}
    resetAllOverlays();
  };

  const handleInterventionComplete = () => {
    setInterventionResolved(true);
    setShowReturnGate(true);
    const vitalLogs = logs.filter(l => l.type === 'touch_vital' && l.vital);
    if (vitalLogs.length > 0) {
      setLastResolvedLogId(vitalLogs[vitalLogs.length - 1].id);
    }
  };

  if (!isLoaded) return <div className="min-h-screen bg-black"></div>;

  if (showPassphrase) {
    return (
      <PassphraseScreen
        onLogin={handlePassphraseLogin}
        onSkip={handlePassphraseSkip}
      />
    );
  }

  if (!isOnboarded) {
    return (
      <OnboardingScreen
        onComplete={() => {
          setIsOnboarded(true);
          handleUnlockAudio();
        }}
        onUnlockAudio={handleUnlockAudio}
      />
    );
  }

  return (
    <div className={`h-full font-sans bg-[#0b0f1a] text-slate-200 selection:bg-indigo-900/50 flex justify-center transition-colors duration-1000 ${isEmergency ? 'bg-black' : ''}`}>

      {boundaryMode && !isEmergency && !showReturnGate && !aftercare && !motorCooldown && (
        <ResponseGuard onAllow={() => { setBoundaryMode(false); }} />
      )}
      {isEmergency && !interventionResolved && !showReturnGate && !aftercare && !motorCooldown && (
        <InterventionScreen onComplete={handleInterventionComplete} />
      )}
      {showReturnGate && (
        <ReturnGate onFinish={handleReturnGateFinish} />
      )}
      {aftercare && (
        <AftercareScreen onDone={resetAllOverlays} />
      )}
      {motorCooldown && (
        <MotorCooldownScreen onFinish={resetAllOverlays} />
      )}

      <div className="w-full max-w-lg h-full flex flex-col relative border-x border-slate-900/50 shadow-2xl">
        <header className="shrink-0 px-4 py-4 sm:py-6 flex items-center justify-between">
          <button onClick={() => setIsMuted(m => !m)} className="w-8 h-8 flex items-center justify-center" title={isMuted ? '音声ON' : '音声OFF'}>
            {isMuted ? (
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-400/60">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <line x1="23" y1="9" x2="17" y2="15"/>
                <line x1="17" y1="9" x2="23" y2="15"/>
              </svg>
            ) : (
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-600">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            )}
          </button>
          <h1 className="text-xs tracking-[0.4em] font-light text-slate-500">神経OS</h1>
          <button onClick={() => setShowPassphrase(true)} className="w-8 h-8 flex items-center justify-center" title={syncHash ? 'クラウド同期中' : 'クラウド未接続'}>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={syncHash ? 'text-indigo-400/60' : 'text-slate-700'}>
              <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
            </svg>
          </button>
        </header>

        <main className="flex-1 min-h-0 px-4 sm:px-6 overflow-y-auto pb-20 custom-scrollbar">
          {activeTab === 'grace' && (
            <GraceSpace onSave={handleSaveLog} isEmergency={isEmergency} baseline={baseline} />
          )}
          {activeTab === 'guard' && (
            <ConsentGuard onExit={() => setActiveTab('grace')} />
          )}
          {activeTab === 'insight' && (
            <Insight
              logs={logs}
              unsentLogs={unsentLogs}
              checkins={checkins}
              onCheckin={handleCheckin}
              intention={intention}
              onIntention={handleIntention}
              clearLogs={handleClearLogs}
              baseline={baseline}
              isEmergency={isEmergency}
            />
          )}
        </main>

        <nav className="shrink-0 w-full backdrop-blur-md bg-[#0b0f1a]/80 border-t border-slate-900 pb-safe z-20">
          <div className="flex justify-center items-center p-2 gap-6">
            <NavButton
                icon={<Fingerprint />}
                label="観測"
                isActive={activeTab === 'grace'}
                onClick={() => { setActiveTab('grace'); }}
              />
            <NavButton
              icon={<Lock />}
              label="守る"
              isActive={activeTab === 'guard'}
              onClick={() => { setActiveTab('guard'); }}
            />
            <NavButton
              icon={<Activity />}
              label="洞察"
              isActive={activeTab === 'insight'}
              onClick={() => { setActiveTab('insight'); }}
            />
          </div>
        </nav>

      </div>
    </div>
  );
}

    // --- ナビゲーションボタン ---
    const NavButton = ({ icon, label, isActive, onClick }) => (
      <button
        onClick={onClick}
        className={`flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all min-h-[44px] ${isActive ? 'text-sky-400' : 'text-slate-500'}`}
      >
        <div className={`transition-transform duration-200 ${isActive ? 'scale-110' : ''}`}>
          {React.cloneElement(icon, { size: 22 })}
        </div>
        <span className="text-[10px] font-semibold tracking-wider">{label}</span>
      </button>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
