<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Provenance Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // SHA-256 ハッシュ生成
        // ==========================================
        async function generateSHA256Hash(text) {
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(text);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            } catch (error) {
                return "hash-fallback-" + Math.random().toString(36).substring(2, 15);
            }
        }

        // ==========================================
        // Mock Backend
        // ==========================================
        let LOG_DB = [];
        const mockApi = {
            createLog: async (logData) => {
                const timestamp = new Date().toISOString();
                const dataToHash = `${logData.user_id}|${logData.model_name}|${logData.user_prompt}|${logData.output}|${logData.edit_notes}|${timestamp}`;
                const digitalSignature = await generateSHA256Hash(dataToHash);
                const newLog = { id: crypto.randomUUID(), created_at: timestamp, signature: digitalSignature, ...logData };
                LOG_DB.unshift(newLog);
                return newLog;
            },
            getLogs: async () => [...LOG_DB],
            getLog: async (id) => {
                const log = LOG_DB.find(l => l.id === id);
                if (!log) throw new Error("Log not found");
                return log;
            },
            generateBadge: async (id) => {
                const log = await mockApi.getLog(id);
                const humanEffortScore = log.edit_notes.length > 50 ? 98 : log.edit_notes.length > 10 ? 85 : 50;
                return {
                    proof_url: `https://provenance.app/verify/${log.id}`,
                    creator: log.user_id,
                    timestamp: log.created_at,
                    model: log.model_name,
                    signature: log.signature,
                    human_effort: humanEffortScore,
                };
            }
        };

        // ==========================================
        // App Component
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('create');
            const [logs, setLogs] = useState([]);
            const [badgeData, setBadgeData] = useState(null);
            const [copied, setCopied] = useState(false);
            const [formData, setFormData] = useState({
                user_id: '', model_name: 'gpt-4o', system_prompt: '',
                user_prompt: '', output: '', edit_notes: ''
            });

            useEffect(() => {
                if (activeTab === 'list') { loadLogs(); setBadgeData(null); }
            }, [activeTab]);

            const loadLogs = async () => {
                const data = await mockApi.getLogs();
                setLogs(data);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.user_id) { alert("クリエイター名は必須です"); return; }
                await mockApi.createLog(formData);
                setFormData(prev => ({ ...prev, user_prompt: '', output: '', edit_notes: '' }));
                setActiveTab('list');
            };

            const handleGenerateBadge = async (logId) => {
                const badge = await mockApi.generateBadge(logId);
                setBadgeData(badge);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const copyToClipboard = (text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text);
                } else {
                    const ta = document.createElement("textarea");
                    ta.value = text; document.body.appendChild(ta); ta.select();
                    try { document.execCommand('copy'); } catch (e) { }
                    document.body.removeChild(ta);
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-10">

                    {/* ヘッダー */}
                    <header className="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 text-white w-10 h-10 rounded-xl flex items-center justify-center text-xl">🛡️</div>
                                <div>
                                    <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">
                                        Creator Provenance Log
                                    </h1>
                                    <p className="text-xs text-slate-500 font-medium tracking-wide">PROTECT YOUR INTELLECTUAL EFFORT</p>
                                </div>
                            </div>
                            <div className="flex gap-2 bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => setActiveTab('create')}
                                    className={`flex items-center gap-1.5 px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'create' ? 'bg-white shadow text-indigo-600' : 'text-slate-600 hover:bg-slate-200'}`}>
                                    ➕ 証拠を記録
                                </button>
                                <button onClick={() => setActiveTab('list')}
                                    className={`flex items-center gap-1.5 px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'list' ? 'bg-white shadow text-indigo-600' : 'text-slate-600 hover:bg-slate-200'}`}>
                                    📋 記録一覧
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 mt-8">

                        {/* ===== 新規作成タブ ===== */}
                        {activeTab === 'create' && (
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-indigo-50 border-b border-indigo-100 px-6 py-5">
                                    <h2 className="text-lg font-semibold text-indigo-900 flex items-center gap-2">
                                        🔑 あなたの創作プロセスを暗号学的に記録する
                                    </h2>
                                    <p className="text-sm text-indigo-700 mt-1">
                                        記録されたデータはSHA-256ハッシュ化され、「あなたが作成した」という確固たる証明になります。
                                    </p>
                                </div>

                                <form onSubmit={handleSubmit} className="p-6 space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-sm font-bold text-slate-700 block">
                                                👤 クリエイター名（権利者） <span className="text-red-500">*</span>
                                            </label>
                                            <input type="text" name="user_id" value={formData.user_id}
                                                onChange={handleInputChange} required
                                                placeholder="本名またはペンネーム"
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-sm font-bold text-slate-700 block">
                                                🤖 使用AIモデル <span className="text-red-500">*</span>
                                            </label>
                                            <input type="text" name="model_name" value={formData.model_name}
                                                onChange={handleInputChange} required
                                                className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" />
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-slate-700 block">
                                            💬 AIへの指示（プロンプト） <span className="text-red-500">*</span>
                                        </label>
                                        <textarea name="user_prompt" value={formData.user_prompt}
                                            onChange={handleInputChange} rows="3" required
                                            placeholder="AIにどのような指示を出したか（あなたの思考のプロセス）"
                                            className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono text-sm" />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-slate-700 block">
                                            📄 AIの初期出力（ベースデータ） <span className="text-red-500">*</span>
                                        </label>
                                        <textarea name="output" value={formData.output}
                                            onChange={handleInputChange} rows="4" required
                                            placeholder="AIが最初に出力したテキスト"
                                            className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono text-sm" />
                                    </div>

                                    <div className="space-y-2 bg-amber-50 p-4 rounded-lg border border-amber-200">
                                        <label className="text-sm font-bold text-amber-800 block">
                                            ✏️ 人間による編集・加筆内容（重要）
                                        </label>
                                        <p className="text-xs text-amber-700 mb-2">
                                            「どう修正・独自性を加えたか」を具体的に記載してください。これが著作権保護の強い根拠になります。
                                        </p>
                                        <textarea name="edit_notes" value={formData.edit_notes}
                                            onChange={handleInputChange} rows="3"
                                            placeholder="例: 第2段落の論理展開が甘かったため、自身の経験データを基に大幅に書き換えた。独自の考察を末尾に追加した。"
                                            className="w-full px-4 py-3 border border-amber-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none transition-all font-mono text-sm bg-white" />
                                    </div>

                                    <div className="pt-4 border-t border-slate-100 flex justify-end">
                                        <button type="submit"
                                            className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg font-bold transition-colors shadow-md hover:shadow-lg">
                                            🔑 署名して記録する
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* ===== 履歴一覧タブ ===== */}
                        {activeTab === 'list' && (
                            <div className="space-y-6">

                                {/* 証明書表示 */}
                                {badgeData && (
                                    <div className="bg-white border-2 border-indigo-600 rounded-xl shadow-xl overflow-hidden animate-fade">
                                        <div className="py-2 bg-indigo-600 text-center text-white text-xs font-bold tracking-widest uppercase">
                                            ✦ Certificate of Originality &amp; Provenance ✦
                                        </div>
                                        <div className="p-6 md:p-8">

                                            {/* タイトル */}
                                            <div className="flex items-start gap-4 mb-6 border-b border-slate-100 pb-6">
                                                <div className="bg-indigo-100 p-4 rounded-full text-3xl">🛡️</div>
                                                <div>
                                                    <h3 className="text-2xl font-black text-slate-800 mb-1">創作証明書</h3>
                                                    <p className="text-slate-500 text-sm">このドキュメントは、以下のクリエイターによる創作とAI支援のプロセスを証明します。</p>
                                                </div>
                                            </div>

                                            {/* 詳細情報 */}
                                            <div className="grid md:grid-cols-2 gap-6 mb-6">
                                                <div className="space-y-4">
                                                    <div>
                                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Creator / 権利者</p>
                                                        <p className="text-lg font-bold text-slate-800">👤 {badgeData.creator}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Timestamp / 記録日時</p>
                                                        <p className="text-sm font-mono text-slate-700 bg-slate-50 p-2 rounded border border-slate-100">
                                                            🕐 {new Date(badgeData.timestamp).toLocaleString('ja-JP', { timeZoneName: 'short' })}
                                                        </p>
                                                    </div>
                                                    <div>
                                                        <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">AI Model / 使用ツール</p>
                                                        <p className="text-sm font-medium text-slate-700">🤖 {badgeData.model}</p>
                                                    </div>
                                                </div>

                                                {/* 人間関与度スコア */}
                                                <div className="bg-slate-50 rounded-xl p-5 border border-slate-200">
                                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider mb-3">Human Contribution / 人間の関与度</p>
                                                    <div className="flex items-end gap-2 mb-3">
                                                        <span className="text-5xl font-black text-indigo-600">{badgeData.human_effort}</span>
                                                        <span className="text-sm text-slate-500 font-bold mb-2">/ 100</span>
                                                    </div>
                                                    <div className="w-full bg-slate-200 rounded-full h-3">
                                                        <div className="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all"
                                                            style={{ width: `${badgeData.human_effort}%` }} />
                                                    </div>
                                                    <p className="text-xs text-slate-500 mt-2">※編集・加筆の量と質に基づく評価スコア</p>
                                                </div>
                                            </div>

                                            {/* SHA-256署名 */}
                                            <div className="bg-slate-900 rounded-xl p-5 mb-6">
                                                <div className="flex justify-between items-center mb-3">
                                                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider">
                                                        🔑 Digital Signature (SHA-256)
                                                    </p>
                                                    <button onClick={() => copyToClipboard(badgeData.signature)}
                                                        className="text-slate-400 hover:text-white transition-colors text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded">
                                                        {copied ? '✓ Copied!' : '⎘ Copy'}
                                                    </button>
                                                </div>
                                                <p className="text-xs font-mono text-green-400 break-all leading-relaxed tracking-wide">
                                                    {badgeData.signature}
                                                </p>
                                                <p className="text-xs text-slate-500 mt-3 border-t border-slate-700 pt-3">
                                                    💡 このハッシュ値は入力データ（プロンプト・出力・編集メモ・日時）から生成された一意の署名です。1文字でも改ざんされると値が変わります。
                                                </p>
                                            </div>

                                            <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                                                <p className="text-sm text-indigo-600 font-mono truncate pr-4">
                                                    🔗 {badgeData.proof_url}
                                                </p>
                                                <button onClick={() => setBadgeData(null)}
                                                    className="text-sm text-slate-500 hover:text-slate-800 px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors whitespace-nowrap">
                                                    ✕ 閉じる
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* ログ一覧 */}
                                {logs.length === 0 ? (
                                    <div className="text-center py-24 bg-white rounded-xl border-2 border-dashed border-slate-200">
                                        <div className="text-5xl mb-4">📭</div>
                                        <p className="text-slate-500 font-medium mb-4">まだ創作プロセスが記録されていません。</p>
                                        <button onClick={() => setActiveTab('create')}
                                            className="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-lg font-bold transition-colors">
                                            ➕ 最初の記録を作成する
                                        </button>
                                    </div>
                                ) : (
                                    <div className="grid gap-4">
                                        {logs.map(log => (
                                            <div key={log.id}
                                                className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 hover:border-indigo-300 hover:shadow-md transition-all animate-fade">
                                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-2">
                                                    <div>
                                                        <h3 className="text-sm font-bold text-slate-800">
                                                            👤 {log.user_id} &nbsp;·&nbsp; 🤖 {log.model_name}
                                                        </h3>
                                                        <p className="text-xs font-mono text-slate-400 mt-1">
                                                            🔑 {log.signature.substring(0, 24)}...
                                                        </p>
                                                    </div>
                                                    <span className="text-xs bg-slate-100 text-slate-500 px-3 py-1 rounded-full border border-slate-200 whitespace-nowrap">
                                                        🕐 {new Date(log.created_at).toLocaleDateString('ja-JP')}
                                                    </span>
                                                </div>

                                                <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 mb-4 text-sm text-slate-600 font-mono line-clamp-2">
                                                    {log.user_prompt}
                                                </div>

                                                <div className="flex justify-between items-center">
                                                    <span className={`text-xs px-3 py-1 rounded-full font-medium ${log.edit_notes ? 'text-amber-700 bg-amber-50 border border-amber-200' : 'text-slate-400 bg-slate-50'}`}>
                                                        {log.edit_notes ? '✏️ 編集メモあり' : '編集メモなし'}
                                                    </span>
                                                    <button onClick={() => handleGenerateBadge(log.id)}
                                                        className="flex items-center gap-1.5 px-4 py-2 bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white text-sm font-bold rounded-lg transition-colors">
                                                        🛡️ 証明書を発行
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>

</html>
