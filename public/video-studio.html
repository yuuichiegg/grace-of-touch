        <div className="flex items-center gap-3 mb-3">
          <span className="text-3xl">{template.icon}</span>
          <div>
            <h2 className="font-orbit text-base tracking-wider" style={{ color: template.color }}>{template.title}</h2>
            <p className="font-jp text-sm text-white/50">{template.subtitle}</p>
          </div>
        </div>
        <div className="flex flex-wrap gap-3 text-[10px] font-orbit">
          <span className="px-3 py-1 rounded-full border border-cyan/20 text-cyan-dim">
            {scenes.length} SCENES
          </span>
          <span className="px-3 py-1 rounded-full border border-cyan/20 text-cyan-dim">
            TOTAL: {totalDur}s / {template.duration}s
          </span>
          <span className={`px-3 py-1 rounded-full border ${totalDur > template.duration ? 'border-red-500/40 text-red-400' : 'border-green-500/30 text-green-400'}`}>
            {totalDur > template.duration ? `OVER +${totalDur - template.duration}s` : totalDur === template.duration ? 'PERFECT' : `REMAINING ${template.duration - totalDur}s`}
          </span>
          <span className="px-3 py-1 rounded-full border border-white/10 text-white/40 uppercase">
            {FORMAT_LABELS[template.format]}
          </span>
        </div>
        {/* Timeline bar */}
        <div className="mt-3 h-2 bg-white/5 rounded-full overflow-hidden flex">
          {scenes.map((s, i) => (
            <div
              key={i}
              style={{
                width: `${(s.dur / Math.max(totalDur, 1)) * 100}%`,
                background: template.color,
                opacity: 0.3 + (i % 2) * 0.3
              }}
              className="h-full border-r border-got-bg/50"
              title={`Scene ${s.num}: ${s.dur}s`}
            />
          ))}
        </div>
      </div>

      {/* Scenes */}
      <div className="space-y-4">
        {scenes.map((scene, i) => (
          <div key={i} className="relative">
            <SceneEditor scene={scene} index={i} color={template.color} onChange={onSceneChange} />
            {scenes.length > 1 && (
              <button
                onClick={() => onRemoveScene(i)}
                className="no-print absolute -top-2 -right-2 w-6 h-6 rounded-full bg-red-900/50 border border-red-500/30 text-red-400 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 hover:opacity-100 transition-opacity"
                title="シーン削除"
              >
                x
              </button>
            )}
          </div>
        ))}
      </div>

      <button
        onClick={onAddScene}
        className="no-print mt-4 w-full py-3 rounded-xl border border-dashed border-cyan/15 text-cyan-dim/50 font-orbit text-xs tracking-wider hover:border-cyan/30 hover:text-cyan-dim hover:bg-cyan-dark/30 transition-all"
      >
        + ADD SCENE
      </button>
    </div>
  );
}

function ExportPanel({ template, scenes }) {
  const [copied, setCopied] = useState(false);

  const generateText = useCallback(() => {
    const totalDur = scenes.reduce((s, sc) => s + sc.dur, 0);
    let text = `========================================\n`;
    text += `${template.title} — ${template.subtitle}\n`;
    text += `Format: ${FORMAT_LABELS[template.format]} | Duration: ${totalDur}s\n`;
    text += `========================================\n\n`;
    scenes.forEach(s => {
      text += `--- SCENE ${s.num} (${s.dur}s) ---\n`;
      text += `[Visual] ${s.visual}\n`;
      text += `[Narration] ${s.narration}\n`;
      text += `[Camera] ${s.camera}\n`;
      text += `[BGM] ${s.bgm}\n\n`;
    });
    text += `========================================\n`;
    text += `Generated by Grace of Touch Video Studio\n`;
    text += `Date: ${new Date().toLocaleDateString('ja-JP')}\n`;
    return text;
  }, [template, scenes]);

  const handleCopy = () => {
    navigator.clipboard.writeText(generateText()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const handlePrint = () => window.print();

  return (
    <div className="no-print flex gap-3 mt-6">
      <button
        onClick={handleCopy}
        className={`flex-1 py-3 rounded-xl font-orbit text-xs tracking-wider transition-all ${
          copied
            ? 'bg-green-900/30 border border-green-500/30 text-green-400'
            : 'bg-cyan-dark border border-cyan/20 text-cyan-dim hover:border-cyan/40 hover:text-cyan'
        }`}
      >
        {copied ? 'COPIED!' : 'COPY AS TEXT'}
      </button>
      <button
        onClick={handlePrint}
        className="flex-1 py-3 rounded-xl font-orbit text-xs tracking-wider bg-white/3 border border-white/10 text-white/40 hover:border-white/20 hover:text-white/60 transition-all"
      >
        PRINT VIEW
      </button>
    </div>
  );
}

function DurationFilter({ selected, onSelect }) {
  return (
    <div className="flex flex-wrap gap-2 mb-4">
      <button
        onClick={() => onSelect(null)}
        className={`font-orbit text-[9px] tracking-wider px-3 py-1.5 rounded-lg border transition-all ${
          !selected ? 'border-cyan/30 text-cyan bg-cyan-dark' : 'border-white/10 text-white/30 hover:border-white/20'
        }`}
      >
        ALL
      </button>
      {DURATION_PRESETS.map(p => (
        <button
          key={p.label}
          onClick={() => onSelect(p)}
          className={`font-orbit text-[9px] tracking-wider px-3 py-1.5 rounded-lg border transition-all ${
            selected?.label === p.label ? 'border-cyan/30 text-cyan bg-cyan-dark' : 'border-white/10 text-white/30 hover:border-white/20'
          }`}
        >
          {p.label} ({p.format === 'tiktok' ? 'SHORT' : 'LONG'})
        </button>
      ))}
    </div>
  );
}

// ==================== MAIN APP ====================

function App() {
  const [selectedTemplate, setSelectedTemplate] = useState(null);
  const [scenes, setScenes] = useState([]);
  const [durationFilter, setDurationFilter] = useState(null);
  const [view, setView] = useState('templates'); // templates | editor

  const selectTemplate = useCallback((tmpl) => {
    setSelectedTemplate(tmpl);
    setScenes(tmpl.scenes.map(s => ({ ...s })));
    setView('editor');
  }, []);

  const handleSceneChange = useCallback((index, updatedScene) => {
    setScenes(prev => prev.map((s, i) => i === index ? updatedScene : s));
  }, []);

  const addScene = useCallback(() => {
    setScenes(prev => [
      ...prev,
      { num: prev.length + 1, dur: 5, visual: '', narration: '', camera: '', bgm: '' }
    ]);
  }, []);

  const removeScene = useCallback((index) => {
    setScenes(prev => prev.filter((_, i) => i !== index).map((s, i) => ({ ...s, num: i + 1 })));
  }, []);

  const filteredTemplates = useMemo(() => {
    if (!durationFilter) return TEMPLATES;
    return TEMPLATES.filter(t => t.format === durationFilter.format && t.duration <= durationFilter.value);
  }, [durationFilter]);

  return (
    <div className="min-h-screen bg-got-bg">
      <Header />

      <main className="max-w-4xl mx-auto px-4 py-6">
        {view === 'templates' && (
          <div className="fade-in">
            <div className="mb-6">
              <h2 className="font-orbit text-sm text-cyan tracking-[0.2em] mb-1">TEMPLATE LIBRARY</h2>
              <p className="font-jp text-xs text-white/30">動画テンプレートを選択して編集を開始</p>
            </div>

            <DurationFilter selected={durationFilter} onSelect={setDurationFilter} />

            <div className="grid gap-3 sm:grid-cols-2">
              {filteredTemplates.map(t => (
                <TemplateCard
                  key={t.id}
                  template={t}
                  onClick={selectTemplate}
                  isSelected={selectedTemplate?.id === t.id}
                />
              ))}
            </div>

            {filteredTemplates.length === 0 && (
              <div className="text-center py-12">
                <div className="text-3xl mb-3 opacity-30">🎬</div>
                <p className="font-jp text-xs text-white/30">該当するテンプレートがありません</p>
              </div>
            )}
          </div>
        )}

        {view === 'editor' && selectedTemplate && (
          <div>
            <button
              onClick={() => setView('templates')}
              className="no-print mb-4 font-orbit text-[10px] text-cyan-dim/50 tracking-wider hover:text-cyan-dim transition-colors"
            >
              &larr; BACK TO TEMPLATES
            </button>

            <StoryboardView
              template={selectedTemplate}
              scenes={scenes}
              onSceneChange={handleSceneChange}
              onAddScene={addScene}
              onRemoveScene={removeScene}
            />

            <ExportPanel template={selectedTemplate} scenes={scenes} />
          </div>
        )}
      </main>

      {/* Footer */}
      <footer className="no-print text-center py-8 border-t border-white/5 mt-8">
        <p className="font-orbit text-[9px] text-white/15 tracking-[0.3em]">GRACE OF TOUCH VIDEO STUDIO</p>
        <p className="font-jp text-[10px] text-white/10 mt-1">&copy; 2024-2026 Grace of Touch Co.</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
