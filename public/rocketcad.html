    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useRef, useEffect, useMemo, Suspense, forwardRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import * as THREE from 'three';
        import { Canvas, useThree, useFrame } from '@react-three/fiber';
        import { OrbitControls, TransformControls, Grid, Environment, ContactShadows, GizmoHelper, GizmoViewport, Stars, Text } from '@react-three/drei';
        import { STLExporter } from 'three/examples/jsm/exporters/STLExporter';

        const generateUUID = () =>
            (typeof crypto !== 'undefined' && crypto.randomUUID)
                ? crypto.randomUUID().slice(0, 4)
                : Math.random().toString(36).substring(2, 6);

        // --- Audio Engine ---
        const useEngineSound = (isFiring) => {
            const audioCtx = useRef(null);
            const gainNode = useRef(null);
            useEffect(() => {
                const initAudio = () => {
                    if (!audioCtx.current) {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        if (!AudioContext) return;
                        audioCtx.current = new AudioContext();

                        const bufferSize = audioCtx.current.sampleRate * 2;
                        const buffer = audioCtx.current.createBuffer(1, bufferSize, audioCtx.current.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                        const noise = audioCtx.current.createBufferSource();
                        noise.buffer = buffer; noise.loop = true;

                        const filter = audioCtx.current.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 400;

                        gainNode.current = audioCtx.current.createGain();
                        gainNode.current.gain.value = 0;

                        noise.connect(filter);
                        filter.connect(gainNode.current);
                        gainNode.current.connect(audioCtx.current.destination);
                        noise.start();
                    }
                };

                if (isFiring) {
                    initAudio();
                    if (audioCtx.current?.state === 'suspended') audioCtx.current.resume();
                    if (gainNode.current && audioCtx.current) {
                        const now = audioCtx.current.currentTime;
                        gainNode.current.gain.cancelScheduledValues(now);
                        gainNode.current.gain.setValueAtTime(gainNode.current.gain.value, now);
                        gainNode.current.gain.linearRampToValueAtTime(0.65, now + 0.25);
                    }
                } else {
                    if (gainNode.current && audioCtx.current) {
                        const now = audioCtx.current.currentTime;
                        gainNode.current.gain.cancelScheduledValues(now);
                        gainNode.current.gain.setValueAtTime(gainNode.current.gain.value, now);
                        gainNode.current.gain.linearRampToValueAtTime(0.0, now + 0.35);
                    }
                }
            }, [isFiring]);
        };

        // --- High Resolution Procedural Fire Texture ---
        const createFireTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 2048;
            const ctx = canvas.getContext('2d');

            const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grd.addColorStop(0.00, 'rgba(210,245,255,1.00)');
            grd.addColorStop(0.06, 'rgba(140,220,255,0.95)');
            grd.addColorStop(0.18, 'rgba(255,250,210,0.80)');
            grd.addColorStop(0.40, 'rgba(255,160,60,0.55)');
            grd.addColorStop(0.65, 'rgba(255,80,20,0.25)');
            grd.addColorStop(1.00, 'rgba(20,0,0,0.00)');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 260; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.55;
                const w = 8 + Math.random() * 90;
                const h = 120 + Math.random() * 720;
                ctx.fillStyle = `rgba(255, ${170 + Math.random() * 70}, ${110 + Math.random() * 80}, ${Math.random() * 0.10})`;
                ctx.fillRect(x, y, w, h);
            }

            ctx.globalCompositeOperation = 'screen';
            for (let i = 0; i < 120; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.75;
                const r = 30 + Math.random() * 160;
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, `rgba(255,255,255,${0.08 + Math.random() * 0.10})`);
                g.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.minFilter = THREE.LinearFilter;
            tex.magFilter = THREE.LinearFilter;
            tex.generateMipmaps = true;
            tex.needsUpdate = true;
            return tex;
        };

        // --- Smoke Texture for Launch ---
        const createSmokeTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const grd = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            grd.addColorStop(0, 'rgba(200, 200, 200, 0.8)');
            grd.addColorStop(0.4, 'rgba(100, 100, 100, 0.4)');
            grd.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, 256, 256);
            return new THREE.CanvasTexture(canvas);
        };

        // --- Plume Material (Shader) ---
        const usePlumeMaterial = (tex) => {
            return useMemo(() => {
                return new THREE.ShaderMaterial({
                    transparent: true,
                    depthWrite: false,
                    depthTest: true,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide,
                    uniforms: {
                        uMap: { value: tex },
                        uOpacity: { value: 0.55 },
                        uCore: { value: 0.9 },
                        uTime: { value: 0.0 },
                    },
                    vertexShader: `
            varying vec2 vUv;
            varying vec3 vN;
            varying vec3 vV;
            void main(){
              vUv = uv;
              vec4 mv = modelViewMatrix * vec4(position, 1.0);
              vN = normalize(normalMatrix * normal);
              vV = normalize(-mv.xyz);
              gl_Position = projectionMatrix * mv;
            }
          `,
                    fragmentShader: `
            uniform sampler2D uMap;
            uniform float uOpacity;
            uniform float uCore;
            uniform float uTime;
            varying vec2 vUv;
            varying vec3 vN;
            varying vec3 vV;

            float sat(float x){ return clamp(x, 0.0, 1.0); }
            float noise2(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }

            void main(){
              vec2 uv = vUv;
              uv.y = fract(uv.y + uTime);
              vec4 t = texture2D(uMap, uv);

              float x = abs(vUv.x - 0.5) * 2.0;
              float edge = smoothstep(1.0, 0.0, x);
              float yFade = smoothstep(1.0, 0.08, vUv.y);
              float facing = sat(dot(vN, vV));
              float angleFade = smoothstep(0.05, 0.55, facing);

              float core = pow(edge, 3.2) * uCore;
              float n = noise2(vUv * 18.0 + vec2(uTime * 2.0, -uTime * 1.5));
              float flick = 0.92 + n * 0.18;

              float a = t.a * yFade * (0.12 + 0.88 * edge) * angleFade;
              vec3 col = t.rgb;
              col = mix(col, vec3(1.0), core * 0.45);
              col *= (0.80 + 0.20 * edge) * flick;

              gl_FragColor = vec4(col, sat(a) * uOpacity);
            }
          `,
                });
            }, [tex]);
        };

        const calculateSnap = (newPos, currentParts, selectedPart) => {
            let result = { pos: newPos.clone(), rot: selectedPart.rotation, props: { ...selectedPart.props }, snapped: false };
            const SNAP_THRESHOLD = 3.0;

            if (Math.abs(result.pos.x) < SNAP_THRESHOLD) result.pos.x = 0;
            if (Math.abs(result.pos.z) < SNAP_THRESHOLD) result.pos.z = 0;

            if (['image', 'text', 'solar', 'mount'].includes(selectedPart.type)) {
                for (const otherPart of currentParts) {
                    if (otherPart.id === selectedPart.id) continue;
                    if (['cylinder', 'cone', 'engine', 'capsule', 'adapter'].includes(otherPart.type)) {
                        const otherY = otherPart.position[1]; const otherH = otherPart.props.height || 10;
                        if (result.pos.y >= otherY - otherH / 2 && result.pos.y <= otherY + otherH / 2) {
                            let rTop = 0, rBottom = 0;
                            if (otherPart.type === 'cone') { rTop = 0; rBottom = otherPart.props.radius; }
                            else { rTop = otherPart.props.radiusTop || otherPart.props.radiusBottom * 0.4; rBottom = otherPart.props.radiusBottom; }

                            const relY = (result.pos.y - otherY) / otherH; const t = relY + 0.5;
                            const targetR = rBottom * (1 - t) + rTop * t;
                            const distSq = (result.pos.x - otherPart.position[0]) ** 2 + (result.pos.z - otherPart.position[2]) ** 2;

                            if (distSq < (targetR * 3) ** 2) {
                                const angle = Math.atan2(result.pos.x - otherPart.position[0], result.pos.z - otherPart.position[2]);
                                if (['image', 'text'].includes(selectedPart.type)) {
                                    result.pos.x = otherPart.position[0]; result.pos.z = otherPart.position[2]; result.rot = [0, angle, 0];
                                    const imgH = selectedPart.props.height || 10;
                                    const tTop = Math.min(1, Math.max(0, ((result.pos.y + imgH / 2) - otherY) / otherH + 0.5));
                                    const tBtm = Math.min(1, Math.max(0, ((result.pos.y - imgH / 2) - otherY) / otherH + 0.5));
                                    const rImgTop = rBottom * (1 - tTop) + rTop * tTop;
                                    const rImgBtm = rBottom * (1 - tBtm) + rTop * tBtm;
                                    result.props.radiusTop = rImgTop + 0.2; result.props.radiusBottom = rImgBtm + 0.2; result.props.radius = (rImgTop + rImgBtm) / 2 + 0.2;
                                } else {
                                    const surfaceR = targetR + (selectedPart.type === 'mount' ? 0 : 1.0);
                                    result.pos.x = otherPart.position[0] + surfaceR * Math.sin(angle);
                                    result.pos.z = otherPart.position[2] + surfaceR * Math.cos(angle);
                                    result.rot = [0, angle, 0];
                                }
                                result.snapped = true; return result;
                            }
                        }
                    }
                }
            }

            if (!result.snapped) {
                const movingH = selectedPart.props.height || 10;
                const mBtm = result.pos.y - movingH / 2; const mTop = result.pos.y + movingH / 2;
                for (const p of currentParts) {

                    const pBtm = pY - pH / 2; const pTop = pY + pH / 2;
                    if (Math.abs(mBtm - pTop) < SNAP_THRESHOLD) { result.pos.y = pTop + movingH / 2; result.pos.x = p.position[0]; result.pos.z = p.position[2]; break; }
                    if (Math.abs(mTop - pBtm) < SNAP_THRESHOLD) { result.pos.y = pBtm - movingH / 2; result.pos.x = p.position[0]; result.pos.z = p.position[2]; break; }
                }
            }
            return result;
        };

                    }
                };
                const handlePointerUp = () => { if (!isDragging) return; setIsDragging(false); if (orbitControlsRef.current) orbitControlsRef.current.enabled = true; document.body.style.cursor = 'auto'; };
                window.addEventListener('pointermove', handlePointerMove); window.addEventListener('pointerup', handlePointerUp);
                return () => { window.removeEventListener('pointermove', handlePointerMove); window.removeEventListener('pointerup', handlePointerUp); };
            }, [isDragging, selectedPart, selectedId, transformMode, snapEnabled, camera, raycaster, orbitControlsRef]);
            const handleTransformChange = (e) => { const obj = e?.target?.object; if (!obj || !selectedId || transformMode === 'translate') return; setParts(prev => prev.map(p => p.id === selectedId ? { ...p, rotation: [obj.rotation.x, obj.rotation.y, obj.rotation.z], scale: [obj.scale.x, obj.scale.y, obj.scale.z] } : p)); };

            return (
                <>
                    <ambientLight intensity={0.6} /><spotLight position={[50, 100, 50]} angle={0.25} penumbra={1} intensity={2} castShadow />
                    <Environment preset="city" /><Stars radius={100} depth={50} count={5000} factor={4} saturation={0} fade speed={1} />
                    <group ref={modelGroupRef} scale={[globalScale, globalScale, globalScale]}>
                        <Suspense fallback={null}> {parts.map(part => (<PartMesh ref={el => (meshRefs.current[part.id] = el)} key={part.id} data={part} isSelected={selectedId === part.id} onPointerDown={handlePartPointerDown} transformMode={transformMode} isFiring={isFiring} />))} </Suspense>
                    </group>
                    <TransformControls ref={transformControlsRef} onObjectChange={handleTransformChange} size={0.8} />
                    <Grid infiniteGrid sectionSize={10} sectionColor="#334155" cellColor="#1e293b" fadeDistance={250} position={[0, -0.1, 0]} />
                    <ContactShadows resolution={1024} scale={200} blur={2.5} opacity={0.4} far={20} color="#000000" />
                    <GizmoHelper alignment="bottom-right" margin={[80, 80]}> <GizmoViewport axisColors={['#ef4444', '#22c55e', '#3b82f6']} labelColor="white" /> </GizmoHelper>
                    <LaunchSmoke isLaunching={isLaunched} launchElapsed={modelGroupRef.current?.userData?.launchElapsed ?? 0} />
                </>
            );
        };

        const App = () => {
            const [parts, setParts] = useState(INITIAL_PARTS);
            const [selectedId, setSelectedId] = useState(parts[0].id);
            const [transformMode, setTransformMode] = useState('translate');
            const [snapEnabled, setSnapEnabled] = useState(true);
            const [globalScale, setGlobalScale] = useState(1.0);
            const [showPartsPanel, setShowPartsPanel] = useState(false);
            const [isFiring, setIsFiring] = useState(false);
            const [isLaunched, setIsLaunched] = useState(false);
            const [tab, setTab] = useState('Shapes');
            const [showAutoModal, setShowAutoModal] = useState(false);
            const modelGroupRef = useRef(); const orbitControlsRef = useRef(); const fileInputRef = useRef();
            const launchStartRef = useRef(null); const firingStopTimer = useRef(null);
            useEngineSound(isFiring);
            const selectedPart = useMemo(() => parts.find(p => p.id === selectedId), [parts, selectedId]);
            const updatePartProp = (key, value) => { setParts(prev => prev.map(p => (p.id === selectedId) ? { ...p, props: { ...p.props, [key]: value } } : p)); };
            const changePlacementAngle = (newAngle) => { if (!selectedPart) return; const currentR = Math.sqrt(selectedPart.position[0] ** 2 + selectedPart.position[2] ** 2) || selectedPart.props.radius || 10; const newX = currentR * Math.sin(newAngle); const newZ = currentR * Math.cos(newAngle); const newRotY = newAngle; setParts(prev => prev.map(p => p.id === selectedId ? { ...p, position: [newX, p.position[1], newZ], rotation: [p.rotation[0], newRotY, p.rotation[2]] } : p)); };
            const currentPlacementAngle = useMemo(() => { if (!selectedPart) return 0; let angle = Math.atan2(selectedPart.position[0], selectedPart.position[2]); if (angle < 0) angle += Math.PI * 2; return angle; }, [selectedPart]);
            const addPart = (type, variant = 'default') => {
                const newId = generateUUID(); let baseProps = { width: 10, height: 10, depth: 10 }; let name = type;

                let rLower = 10;
                const activePart = selectedPart || (parts.length > 0 ? parts[parts.length - 1] : null);
                if (activePart) {
                    if (activePart.type === 'cylinder') rLower = activePart.props.radiusTop;
                    else if (activePart.type === 'cone') rLower = 0;
                    else if (activePart.type === 'engine') rLower = activePart.props.radiusTop;
                    else if (activePart.type === 'mount') rLower = activePart.props.radius;
                    else if (activePart.type === 'adapter') rLower = activePart.props.radiusTop;
                }

                if (type === 'cone') { baseProps = { radius: rLower, height: Math.max(18, rLower * 2.2), segments: 64 }; name = 'Nose Cone'; }
                else if (type === 'cylinder') {
                    if (variant === 'orange') { name = 'Orange Tank'; } else { name = 'Tube'; }
                    baseProps = { radiusTop: rLower, radiusBottom: rLower, height: 20, segments: 64 };
                }
                else if (type === 'box') { name = 'Box'; }
                else if (type === 'engine') {
                    if (variant === 'f1') { baseProps = { radiusTop: 8, radiusBottom: 12, height: 18 }; name = 'Engine F-1'; }
                    else if (variant === 'le') { baseProps = { radiusTop: 5, radiusBottom: 7, height: 10 }; name = 'Engine LE'; }
                    else { baseProps = { radiusTop: 6, radiusBottom: 8, height: 12 }; name = 'Engine'; }
                }
                else if (type === 'mount') { baseProps = { radius: rLower, height: 2 }; name = 'Mount'; }
                else if (type === 'adapter') { baseProps = { radiusTop: rLower * 0.6, radiusBottom: rLower, height: 5 }; name = 'Adapter'; }
                else if (type === 'solar') { baseProps = { width: 12, height: 30 }; name = 'Solar Panel'; }
                else if (type === 'capsule') {
                    if (variant === 'apollo') { baseProps = { radiusBottom: 10, height: 12 }; name = 'Capsule (USA)'; }
                    else { baseProps = { radiusBottom: 9, height: 14 }; name = 'Capsule (Soyuz)'; }
                }

                let maxY = 0, targetX = 0, targetZ = 0;
                if (activePart) { const h = activePart.props.height || 10; maxY = activePart.position[1] + h / 2; targetX = activePart.position[0]; targetZ = activePart.position[2]; }
                const newH = baseProps.height || 10; const newY = maxY + newH / 2;
                const newPart = { id: newId, name: `${name} ${newId.slice(0, 2)}`, type, position: [targetX, newY, targetZ], rotation: [0, 0, 0], scale: [1, 1, 1], props: baseProps };
                setParts([...parts, newPart]); setSelectedId(newId); setShowPartsPanel(false);
            };
            const addText = () => { const newId = generateUUID(); const newPart = { id: newId, name: `Text`, type: 'text', position: [30, 10, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { text: 'ROCKET', color: '#ffffff', height: 10, radius: 10, arc: 1.5, texRotation: 0, radiusTop: 10, radiusBottom: 10 } }; setParts([...parts, newPart]); setSelectedId(newId); setShowPartsPanel(false); };
            const handleAddImageClick = () => fileInputRef.current?.click();
            const handleImageUpload = (e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onload = (loadEvent) => { const newId = generateUUID(); const newPart = { id: newId, name: `Image`, type: 'image', position: [30, 10, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { url: loadEvent.target.result, height: 20, radius: 10, arc: 1.5, texRotation: 0, radiusTop: 10, radiusBottom: 10 } }; setParts(prev => [...prev, newPart]); setSelectedId(newId); setShowPartsPanel(false); }; reader.readAsDataURL(file); } e.target.value = null; };
            const deleteSelected = () => { if (!selectedId) return; setParts(prev => prev.filter(p => p.id !== selectedId)); setSelectedId(null); };
            const handleExport = () => { if(!window.requireExportLicense||!window.requireExportLicense())return; if (!modelGroupRef.current) return; const exporter = new STLExporter(); const result = exporter.parse(modelGroupRef.current, { binary: true }); const blob = new Blob([result], { type: 'application/octet-stream' }); const link = document.createElement('a'); link.style.display = 'none'; link.href = URL.createObjectURL(blob); link.download = 'rocket_model.stl'; document.body.appendChild(link); link.click(); };
            const handleLaunchToggle = () => { if (isLaunched || isFiring) { setIsLaunched(false); setIsFiring(false); launchStartRef.current = null; if (firingStopTimer.current) clearTimeout(firingStopTimer.current); return; } setIsFiring(true); launchStartRef.current = null; setTimeout(() => { setIsLaunched(true); requestAnimationFrame(() => { }); }, 900); firingStopTimer.current = setTimeout(() => { setIsFiring(false); }, 6000); };
            const handleBackgroundClick = (e) => { if (e.target.id === 'ui-layer' || (typeof e.target.className === 'string' && e.target.className.includes('canvas-wrapper'))) { setSelectedId(null); } };

            const handleAutoBuild = ({ payload, dest, booster }) => {
                const newParts = []; let currentY = 0; const mainEngineH = 18; const tankRadius = 10;
                newParts.push({ id: generateUUID(), name: 'Main Engine', type: 'engine', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: tankRadius * 0.8, radiusBottom: tankRadius * 1.2, height: mainEngineH } }); currentY += mainEngineH / 2;
                const tankHeight = dest === 'mars' ? 80 : dest === 'moon' ? 60 : 40; currentY += tankHeight / 2;
                newParts.push({ id: generateUUID(), name: 'Stage 1 Tank', type: 'cylinder', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: tankRadius, radiusBottom: tankRadius, height: tankHeight } }); currentY += tankHeight / 2;
                if (booster !== 'none') {
                    const boosterH = tankHeight * 0.8; const boosterR = booster === 'solid' ? 4 : 5; const offset = tankRadius + boosterR + 1; const bEngH = Math.max(10, boosterR * 2.4); const bNoseH = Math.max(10, boosterR * 2.6); const boosterCenterY = (currentY - tankHeight / 2) - 5;
                    [-1, 1].forEach((side) => {
                        const decouplerPos = [side * (tankRadius + 0.5), currentY - tankHeight / 2, 0]; newParts.push({ id: generateUUID(), name: `Strut ${side}`, type: 'box', position: decouplerPos, rotation: [0, 0, 0], scale: [1, 1, 1], props: { width: 1.5, height: 4, depth: 1.5 } });
                        const bPos = [side * offset, boosterCenterY, 0]; newParts.push({ id: generateUUID(), name: `Booster Tank ${side}`, type: 'cylinder', position: bPos, rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: boosterR, radiusBottom: boosterR, height: boosterH } });
                        const bEngY = bPos[1] - boosterH / 2 - bEngH / 2; newParts.push({ id: generateUUID(), name: `Booster Engine ${side}`, type: 'engine', position: [bPos[0], bEngY, bPos[2]], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: boosterR * 0.75, radiusBottom: boosterR * 1.15, height: bEngH } });
                        const bNoseY = bPos[1] + boosterH / 2 + bNoseH / 2; newParts.push({ id: generateUUID(), name: `Booster Nose ${side}`, type: 'cone', position: [bPos[0], bNoseY, bPos[2]], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radius: boosterR, height: bNoseH, segments: 64 } });
                    });
                }
                if (dest !== 'orbit') {
                    const interH = 6; currentY += interH / 2; newParts.push({ id: generateUUID(), name: 'Interstage', type: 'cylinder', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: tankRadius, radiusBottom: tankRadius, height: interH } }); currentY += interH / 2;
                    const s2H = 25; currentY += s2H / 2; newParts.push({ id: generateUUID(), name: 'Stage 2', type: 'cylinder', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: tankRadius, radiusBottom: tankRadius, height: s2H } }); currentY += s2H / 2;
                }
                if (payload === 'crew') {
                    const adapterH = 3; currentY += adapterH / 2; newParts.push({ id: generateUUID(), name: 'Adapter', type: 'adapter', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: tankRadius * 1.05, radiusBottom: tankRadius, height: adapterH } }); currentY += adapterH / 2;
                    const capsuleH = 10; currentY += capsuleH / 2; newParts.push({ id: generateUUID(), name: 'Crew Capsule', type: 'capsule', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusBottom: tankRadius * 1.05, height: capsuleH } });
                    const towerBaseH = 2; currentY += capsuleH / 2 + towerBaseH / 2; newParts.push({ id: generateUUID(), name: 'Tower Base', type: 'cone', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radius: 1.5, height: towerBaseH } });
                    const towerH = 12; currentY += towerBaseH / 2 + towerH / 2; newParts.push({ id: generateUUID(), name: 'Escape Tower', type: 'cylinder', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radiusTop: 0.2, radiusBottom: 0.5, height: towerH } });
                } else {
                    const fairingH = Math.max(22, tankRadius * 2.6); currentY += fairingH / 2; newParts.push({ id: generateUUID(), name: 'Fairing', type: 'cone', position: [0, currentY, 0], rotation: [0, 0, 0], scale: [1, 1, 1], props: { radius: tankRadius, height: fairingH, segments: 64 } });
                }
                setParts(newParts); setSelectedId(null); setShowAutoModal(false);
            };

            return (
                <div className={`app-container ${selectedId ? 'panel-open' : ''}`} onClick={handleBackgroundClick}>
                    <div className="canvas-wrapper">
                        <Canvas shadows dpr={[1, 2]} gl={{ antialias: true, powerPreference: "high-performance", alpha: false }} camera={{ position: [120, 80, 120], fov: 30 }} onPointerMissed={() => setSelectedId(null)}>
                            <LaunchStartSync isLaunched={isLaunched} launchStartRef={launchStartRef} />
                            <Scene parts={parts} setParts={setParts} selectedId={selectedId} setSelectedId={setSelectedId} transformMode={transformMode} modelGroupRef={modelGroupRef} snapEnabled={snapEnabled} orbitControlsRef={orbitControlsRef} globalScale={globalScale} isFiring={isFiring} isLaunched={isLaunched} launchStartRef={launchStartRef} />
                            <OrbitControls ref={orbitControlsRef} makeDefault minDistance={20} maxDistance={500} target={[0, 35, 0]} />
                        </Canvas>
                    </div>
                    <div id="ui-layer">
                        <header className="app-header glass-panel pointer-events-auto">
                            <div className="flex items-center"><div className="brand text-sky-400">Grace of Touch</div><div className="global-scale-ctrl hidden sm:flex"><label>SCALE</label><input type="range" min="0.1" max="3" step="0.1" value={globalScale} onChange={(e) => setGlobalScale(parseFloat(e.target.value))} /></div></div>
                            <div className="flex gap-2 items-center"><button className="header-btn magic" onClick={() => setShowAutoModal(true)}>🪄 AUTO</button><button className={`header-btn ${isLaunched || isFiring ? 'abort' : 'launch'} ${(isFiring && !isLaunched) ? 'animate-pulse' : ''}`} onClick={handleLaunchToggle} title={isLaunched || isFiring ? 'Abort' : 'Launch'}>{isLaunched || isFiring ? '🛑 ABORT' : '🚀 LAUNCH'}</button><button className="header-btn primary" onClick={() => setShowPartsPanel(!showPartsPanel)}>📦 Parts</button><button className="header-btn" onClick={handleExport}><span>⇩</span></button></div>
                        </header>
                        <AutoBuildModal isOpen={showAutoModal} onClose={() => setShowAutoModal(false)} onBuild={handleAutoBuild} />
                        <div className={`drawer-backdrop ${showPartsPanel ? 'visible' : ''}`} onClick={() => setShowPartsPanel(false)}></div>
                        <div className={`parts-panel glass-panel pointer-events-auto ${showPartsPanel ? 'open' : ''}`}>
                            <div className="panel-header"><span>COMPONENTS</span><button onClick={() => setShowPartsPanel(false)} className="text-white">✕</button></div>
                            <div className="parts-list">{parts.map((part) => (<div key={part.id} className={`part-item ${selectedId === part.id ? 'selected' : ''}`} onClick={(e) => { e.stopPropagation(); setSelectedId(part.id); setShowPartsPanel(false); }}><PartIcon type={part.type} /><div className="part-info"><span className="part-name">{part.name}</span></div></div>))}</div>
                            <div className="p-3 border-t border-slate-700/50 bg-slate-900/30 flex flex-col gap-2">
                                <div className="category-tabs">{['Shapes', 'Engines', 'Struct', 'Payload'].map(t => (<div key={t} className={`cat-tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>{t}</div>))}</div>
                                <div className="add-btn-group">
                                    {tab === 'Shapes' && <><button className="add-btn" onClick={() => addPart('cylinder')}>{Icons.cylinder}<span>Tube</span></button><button className="add-btn" onClick={() => addPart('cylinder', 'orange')}>{Icons.cylinder}<span className="text-orange-400">Tank</span></button><button className="add-btn" onClick={() => addPart('cone')}>{Icons.cone}<span>Cone</span></button><button className="add-btn" onClick={() => addPart('box')}>{Icons.box}<span>Box</span></button><button className="add-btn" onClick={handleAddImageClick}>{Icons.image}<span>Img</span></button><button className="add-btn" onClick={addText}>{Icons.text}<span>Txt</span></button></>}
                                    {tab === 'Engines' && <><button className="add-btn" onClick={() => addPart('engine', 'f1')}>{Icons.engine}<span>USA F1</span></button><button className="add-btn" onClick={() => addPart('engine', 'default')}>{Icons.engine}<span>Generic</span></button><button className="add-btn" onClick={() => addPart('engine', 'le')}>{Icons.engine}<span>Jpn LE</span></button></>}
                                    {tab === 'Struct' && <><button className="add-btn" onClick={() => addPart('mount')}>{Icons.mount}<span>Mount</span></button><button className="add-btn" onClick={() => addPart('adapter')}>{Icons.cylinder}<span>Adapter</span></button><button className="add-btn" onClick={() => addPart('cylinder')}>{Icons.cylinder}<span>Tank</span></button></>}
                                    {tab === 'Payload' && <><button className="add-btn" onClick={() => addPart('capsule', 'apollo')}>{Icons.capsule}<span>Apollo</span></button><button className="add-btn" onClick={() => addPart('capsule', 'soyuz')}>{Icons.capsule}<span>Soyuz</span></button><button className="add-btn" onClick={() => addPart('solar')}>{Icons.solar}<span>Solar</span></button></>}
                                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageUpload} />
                                </div>
                            </div>
                        </div>
                        <div className={`prop-panel glass-panel pointer-events-auto ${selectedPart ? 'visible' : ''}`}>
                            {selectedPart && (
                                <>
                                    <div className="flex justify-between items-center border-b border-slate-700/50 pb-2 mb-2"><h3 className="text-sm font-bold text-sky-400 truncate">{selectedPart.name}</h3><button className="text-xs text-red-400" onClick={deleteSelected}>DELETE</button></div>
                                    <div className="control-group"><div className="toolbar"><div className={`tool-btn ${transformMode === 'translate' ? 'active' : ''}`} onClick={() => setTransformMode('translate')}>✛</div><div className={`tool-btn ${transformMode === 'rotate' ? 'active' : ''}`} onClick={() => setTransformMode('rotate')}>↻</div><div className={`tool-btn ${transformMode === 'scale' ? 'active' : ''}`} onClick={() => setTransformMode('scale')}>⤡</div><div className={`tool-btn ${snapEnabled ? 'snap-active' : ''}`} onClick={() => setSnapEnabled(!snapEnabled)}>🧲</div></div></div>
                                    <div className="space-y-4">
                                        {(selectedPart.type === 'cone' || selectedPart.type === 'cylinder' || selectedPart.type === 'engine' || selectedPart.type === 'capsule' || selectedPart.type === 'adapter') && (<> {selectedPart.type === 'cone' ? <div className="control-group"><div className="control-label">Radius</div><input type="range" min="1" max="50" step="0.5" value={selectedPart.props.radius} onChange={(e) => updatePartProp('radius', parseFloat(e.target.value))} /></div> : <> <div className="control-group"><div className="control-label">Top Radius</div><input type="range" min="0" max="50" step="0.5" value={selectedPart.props.radiusTop} onChange={(e) => updatePartProp('radiusTop', parseFloat(e.target.value))} /></div> <div className="control-group"><div className="control-label">Btm Radius</div><input type="range" min="0" max="50" step="0.5" value={selectedPart.props.radiusBottom} onChange={(e) => updatePartProp('radiusBottom', parseFloat(e.target.value))} /></div> </>} <div className="control-group"><div className="control-label">Height</div><input type="range" min="1" max="100" value={selectedPart.props.height} onChange={(e) => updatePartProp('height', parseFloat(e.target.value))} /></div> </>)}
                                        {selectedPart.type === 'mount' && <div className="control-group"><div className="control-label">Radius</div><input type="range" min="1" max="50" step="0.5" value={selectedPart.props.radius} onChange={(e) => updatePartProp('radius', parseFloat(e.target.value))} /></div>}
                                        {selectedPart.type === 'box' && <div className="control-group"><div className="control-label">Width</div><input type="range" min="1" max="50" value={selectedPart.props.width} onChange={(e) => updatePartProp('width', parseFloat(e.target.value))} /></div>}
                                        {(selectedPart.type === 'image' || selectedPart.type === 'text') && (<> {selectedPart.type === 'text' && <div className="control-group"><input type="text" value={selectedPart.props.text} onChange={(e) => updatePartProp('text', e.target.value)} /></div>} <div className="control-group"><div className="control-label">Height</div><input type="range" min="1" max="50" value={selectedPart.props.height} onChange={(e) => updatePartProp('height', parseFloat(e.target.value))} /></div> <div className="control-group"><div className="control-label">Placement</div><input type="range" min="0" max="6.28" step="0.05" value={currentPlacementAngle} onChange={(e) => changePlacementAngle(parseFloat(e.target.value))} /></div> <div className="control-group"><div className="control-label">Rotation</div><input type="range" min="0" max="6.28" step="0.1" value={selectedPart.props.texRotation || 0} onChange={(e) => updatePartProp('texRotation', parseFloat(e.target.value))} /></div> </>)}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

<div id="export-paywall" style="display:none;position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;">
<div style="background:rgba(16,16,18,0.96);border:1px solid #00ffff;border-radius:16px;padding:32px;max-width:420px;width:90%;text-align:center;">
<div style="font-size:32px;margin-bottom:12px;">🔒</div>
<h2 style="color:#00ffff;font-family:monospace;font-size:16px;">Export License Required</h2>
<p style="color:#aaa;font-size:12px;line-height:1.6;margin:12px 0 20px;">ファイルの出力にはライセンスが必要です。<br>プレビュー・操作は引き続き無料です。</p>
<p style="color:#666;font-size:10px;">Stripe による安全な決済処理</p>
<button onclick="document.getElementById('export-paywall').style.display='none'" style="background:none;border:none;color:#666;font-size:12px;cursor:pointer;text-decoration:underline;margin-top:12px;">閉じる</button>
</div>
</div>
<script>
window._exportLicensed = false;
window.requireExportLicense = function() {
  if (window._exportLicensed) return true;
  var overlay = document.getElementById('export-paywall');
  if (overlay) overlay.style.display = 'flex';
  return false;
};
</script></body>
