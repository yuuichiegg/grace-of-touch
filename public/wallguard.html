<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Firebase Hosting 自動設定（Hosting上のみ有効。それ以外ではデモモード） -->
  <script src="/__/firebase/init.compat.js" onerror="console.log('[WallGuard] ローカル環境 — デモモードで起動')"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #0f172a; }
    @keyframes bounce-in {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-bounce-in { animation: bounce-in 0.25s ease forwards; }
    @keyframes wg-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .wg-spin { animation: wg-spin 1s linear infinite; display: inline-block; }
    @keyframes wg-pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .wg-pulse { animation: wg-pulse 2s ease-in-out infinite; }
  </style>
</head>
<body><a href="/" id="gt-back" style="position:fixed;top:12px;left:12px;z-index:99999;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(0,255,255,0.2);border-radius:8px;padding:6px 14px;text-decoration:none;color:rgba(0,255,255,0.8);font-family:Orbitron,monospace;font-size:10px;letter-spacing:0.1em;transition:all 0.3s;" onmouseover="this.style.background='rgba(0,255,255,0.12)';this.style.borderColor='rgba(0,255,255,0.5)'" onmouseout="this.style.background='rgba(0,0,0,0.6)';this.style.borderColor='rgba(0,255,255,0.2)'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>PORTAL</a>
<a href="/droneguard/" style="position:fixed;top:12px;left:110px;z-index:99999;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(74,138,255,0.2);border-radius:8px;padding:6px 14px;text-decoration:none;color:rgba(74,138,255,0.8);font-family:Orbitron,monospace;font-size:10px;letter-spacing:0.1em;transition:all 0.3s;" onmouseover="this.style.background='rgba(74,138,255,0.12)';this.style.borderColor='rgba(74,138,255,0.5)'" onmouseout="this.style.background='rgba(0,0,0,0.6)';this.style.borderColor='rgba(74,138,255,0.2)'">🛡️ DRONEGUARD</a>
  <div id="root"></div>

  <script type="text/babel">
    // ================================================================
    // INLINE SVG ICON SYSTEM
    // No external icon library needed — works offline/file:// protocol
    // ================================================================
    const SVGS = {
      Camera:        '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
      Alert:         '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
      FileText:      '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>',
      Check:         '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
      Wind:          '<path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>',
      Shield:        '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
      ShieldCheck:   '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>',
      X:             '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
      Edit:          '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',
      Trash:         '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
      Cursor:        '<path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/>',
      Zap:           '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
      Droplets:      '<path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>',
      Grid:          '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
      Question:      '<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
      Mic:           '<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>',
      MicOff:        '<line x1="2" y1="2" x2="22" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" y1="19" x2="12" y2="22"/>',
      AlertOct:      '<polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
      UserCheck:     '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/>',
      Send:          '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
      Image:         '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
      Hand:          '<path d="M18 12.5V10a2 2 0 0 0-2-2 2 2 0 0 0-2 2v1.4"/><path d="M14 11V9a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/><path d="M10 10.5V5a2 2 0 0 0-2-2 2 2 0 0 0-2 2v9"/><path d="m7 15-1.76-1.76a2 2 0 0 0-2.83 2.82l3.6 3.6C7.5 21.14 9.2 22 12 22h2a8 8 0 0 0 8-8V7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v3"/>',
      Key:           '<path d="m21 2-1 1m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/>',
      Speaker:       '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>',
      Bird:          '<path d="M16 7h.01"/><path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/><path d="m20 7 2 .5-2 .5"/><path d="M10 18v3"/><path d="M14 17.75v3.25"/><path d="M7 18a6 6 0 0 0 3.84-10.61"/>',
      Loader:        '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
      Phone:         '<rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>',
      Map:           '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>',
      Book:          '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
      LogOut:        '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
      Radio:         '<circle cx="12" cy="12" r="2"/><path d="M4.93 19.07A10 10 0 0 1 19.07 4.93"/><path d="M1.77 16.9A15 15 0 0 1 16.9 1.77"/><path d="M22.23 7.1A15 15 0 0 1 7.1 22.23"/><path d="M19.07 19.07a10 10 0 0 1-14.14 0"/>',
      Info:          '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
    };

    const Ic = ({ n, size=20, cls='' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
           fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={cls} style={{ flexShrink: 0, display: 'inline-block' }}
           dangerouslySetInnerHTML={{ __html: SVGS[n] || '' }}/>
    );

    // ================================================================
    // REACT HOOKS
    // ================================================================
    const { useState, useEffect, useRef } = React;

    // ================================================================
    // CONSTANTS
    // ================================================================
    const ANOMALY_TYPES = [
      { id: 'crack',   label: 'ひび割れ', bg: '#ef4444', tw: 'bg-red-500',    svgN: 'Zap'      },
      { id: 'peeling', label: '浮き',     bg: '#eab308', tw: 'bg-yellow-500', svgN: 'Radio'    },
      { id: 'leak',    label: '漏水',     bg: '#3b82f6', tw: 'bg-blue-500',   svgN: 'Droplets' },
      { id: 'rust',    label: '鉄筋',     bg: '#f97316', tw: 'bg-orange-500', svgN: 'Grid'     },
      { id: 'unknown', label: '要調査',   bg: '#a855f7', tw: 'bg-purple-500', svgN: 'Question' },
    ];

    const COLORS = ['#ef4444','#eab308','#22c55e','#ffffff','#f97316'];

    // ================================================================
    // FIREBASE / DEMO MODE
    // /__/firebase/init.compat.js が Firebase Hosting 上で自動初期化する。
    // ローカル/file:// ではスクリプトが 404 になり apps.length === 0 → デモモード
    // ================================================================
    const DEMO_MODE = (typeof firebase === 'undefined') || (firebase.apps.length === 0);
    let fbAuth = null, fbDb = null, fbAppId = 'grace-of-touch';

    if (!DEMO_MODE) {
      try {
        fbAuth = firebase.auth();
        fbDb   = firebase.firestore();
      } catch(e) { console.error('Firebase init error:', e); }
    }

    const col = (name) => fbDb && fbDb.collection('artifacts/' + fbAppId + '/public/data/' + name);
    const TS  = () => firebase.firestore && firebase.firestore.FieldValue.serverTimestamp();

    // ================================================================
    // AUDIO / HAPTIC
    // ================================================================
    let _ctx = null;
    const initAudio = () => {
      if (!_ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) _ctx = new AC();
      }
      if (_ctx && _ctx.state === 'suspended') _ctx.resume();
      return _ctx;
    };
    const haptic = (p=[10]) => navigator.vibrate && navigator.vibrate(p);
    const beep = (type) => {
      try {
        const ctx = initAudio(); if (!ctx) return;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        const t = ctx.currentTime;
        if (type==='danger')  { o.type='sawtooth'; o.frequency.setValueAtTime(880,t); o.frequency.linearRampToValueAtTime(440,t+0.2); g.gain.setValueAtTime(0.3,t); g.gain.linearRampToValueAtTime(0,t+0.5); haptic([200,100,200]); }
        else if (type==='warn') { o.type='sine'; o.frequency.setValueAtTime(600,t); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.3); haptic([50]); }
        else if (type==='talk') { o.type='square'; o.frequency.setValueAtTime(400,t); g.gain.setValueAtTime(0.05,t); g.gain.linearRampToValueAtTime(0,t+0.1); haptic([20]); }
        else if (type==='end')  { o.type='sine'; o.frequency.setValueAtTime(300,t); g.gain.setValueAtTime(0.1,t); g.gain.linearRampToValueAtTime(0,t+0.5); haptic([20,50,20]); }
        o.start(t); o.stop(t+0.5);
      } catch(e){}
    };
    const speak = (text) => {
      if (!('speechSynthesis' in window)) return;
      try {
        window.speechSynthesis.cancel();
        setTimeout(() => {
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'ja-JP'; u.rate = 1.2;
          const v = window.speechSynthesis.getVoices().find(v => v.lang.includes('ja'));
          if (v) u.voice = v;
          window.speechSynthesis.speak(u);
        }, 50);
      } catch(e){}
    };

    // ================================================================
    // PERMISSION GATE
    // ================================================================
    const PermissionGate = ({ onGranted }) => {
      const [busy, setBusy] = useState(false);
      const go = async () => {
        setBusy(true);
        try { initAudio(); await navigator.mediaDevices.getUserMedia({ audio:true, video:{ facingMode:'environment' } }); haptic([50,50,50]); }
        catch(e) { if (e.name==='NotAllowedError') alert('カメラとマイクの許可が必要です'); }
        setTimeout(onGranted, 400);
      };
      return (
        <div className="flex flex-col h-screen bg-slate-900 text-white items-center justify-center p-6 text-center">
          <div className="mb-6 p-5 bg-blue-600/20 rounded-full wg-pulse">
            <Ic n="ShieldCheck" size={60} cls="text-blue-400"/>
          </div>
          <h1 className="text-2xl font-bold mb-3">システム権限の確認</h1>
          <p className="text-slate-400 mb-8 text-sm max-w-xs leading-relaxed">
            WallGuardを使用するには<br/>カメラ・マイクの許可が必要です
          </p>
          <div className="flex gap-6 mb-8 text-slate-500 text-xs">
            <div className="flex flex-col items-center gap-1"><Ic n="Mic" size={22}/>音声</div>
            <div className="flex flex-col items-center gap-1"><Ic n="Camera" size={22}/>映像</div>
            <div className="flex flex-col items-center gap-1"><Ic n="Speaker" size={22}/>読上</div>
            <div className="flex flex-col items-center gap-1"><Ic n="Phone" size={22}/>振動</div>
          </div>
          <button onClick={go} disabled={busy}
            className="w-full max-w-xs bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95">
            {busy ? <Ic n="Loader" size={20} cls="wg-spin"/> : <Ic n="Check" size={20}/>}
            {busy ? '確認中...' : '許可して開始'}
          </button>
          {DEMO_MODE && <p className="mt-5 text-[11px] text-amber-400">📡 DEMO MODE — クラウド同期なし</p>}
        </div>
      );
    };

    // ================================================================
    // LOGIN SCREEN
    // ================================================================
    const LoginScreen = ({ onJoin, roomCode, setRoomCode, ready, userRole, setUserRole }) => (
      <div className="flex flex-col h-screen bg-slate-900 text-white items-center justify-center p-6 relative overflow-hidden">
        <div className="absolute inset-0 opacity-10" style={{
          backgroundImage: "url('https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1200')",
          backgroundSize: 'cover', backgroundPosition: 'center'
        }}/>
        <div className="z-10 bg-black/60 backdrop-blur-md p-8 rounded-2xl border border-slate-700 w-full max-w-md shadow-2xl">
          <div className="flex items-center justify-center gap-3 mb-6">
            <div className="p-2 bg-blue-600 rounded-xl"><Ic n="Hand" size={30}/></div>
            <h1 className="text-2xl font-bold tracking-widest">WallGuard <span className="text-blue-400">FC</span></h1>
          </div>
          {!ready ? (
            <div className="flex flex-col items-center py-10">
              <Ic n="Loader" size={44} cls="wg-spin text-blue-500 mb-4"/>
              <p className="text-slate-400 wg-pulse">システム接続中...</p>
            </div>
          ) : (
            <>
              <p className="text-center text-slate-300 mb-6 text-sm">
                チームで共有する合言葉を入力して<br/>フライトルームに接続します
              </p>
              <div className="space-y-4">
                <div>
                  <label className="text-[11px] font-bold text-slate-500 uppercase block mb-1">フライトコード</label>
                  <div className="relative">
                    <Ic n="Key" size={16} cls="absolute left-3 top-3.5 text-slate-500"/>
                    <input type="text" value={roomCode} onChange={e => setRoomCode(e.target.value)}
                      onKeyDown={e => e.key==='Enter' && roomCode && onJoin()}
                      placeholder="例: TEAM-ALPHA"
                      className="w-full bg-slate-800 border border-slate-600 rounded-lg py-3 pl-9 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 font-mono tracking-wider"/>
                  </div>
                </div>
                <div>
                  <label className="text-[11px] font-bold text-slate-500 uppercase block mb-1">ロール</label>
                  <div className="flex bg-slate-800 rounded-lg p-1 border border-slate-600">
                    {['pilot','assist'].map(r => (
                      <button key={r} onClick={() => setUserRole(r)}
                        className={'flex-1 py-2 rounded text-xs font-bold transition-all ' + (userRole===r ? (r==='pilot'?'bg-blue-600 text-white':'bg-green-600 text-white') : 'text-slate-400')}>
                        {r.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>
                <button onClick={() => roomCode && onJoin()} disabled={!roomCode}
                  className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 transition-all active:scale-95 mt-2">
                  <Ic n="Send" size={16}/>接続して開始
                </button>
              </div>
              <p className="mt-5 text-center text-[10px] text-slate-600">
                {DEMO_MODE ? '📡 DEMO MODE — ローカルのみ' : 'v19.2 Enterprise Edition'}
              </p>
            </>
          )}
        </div>
      </div>
    );

    // ================================================================
    // SAFETY COCKPIT
    // ================================================================
    const SafetyCockpit = ({ userRole, sendAlert, logs, isRec, startRec, stopRec }) => {
      const [dur, setDur] = useState(0);
      useEffect(() => {
        let t;
        if (isRec) { setDur(0); t = setInterval(() => setDur(d => d+0.1), 100); }
        else setDur(0);
        return () => clearInterval(t);
      }, [isRec]);

      const fmtTime = (ts) => {
        if (!ts) return '--:--';
        try {
          const d = ts.toDate ? ts.toDate() : new Date(ts);
          if (isNaN(d)) return '--:--';
          return d.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });
        } catch { return '--:--'; }
      };

      return (
        <div className="h-full overflow-y-auto bg-slate-900 p-4 space-y-4">
          {/* Header */}
          <div className="bg-slate-800 rounded-xl p-4 border border-slate-700 flex justify-between items-center">
            <div>
              <h2 className="text-lg font-bold flex items-center gap-2"><Ic n="Shield" size={22} cls="text-green-400"/>Safety Cockpit</h2>
              <p className="text-sm text-slate-400">リアルタイム安全管理</p>
            </div>
            <div className="text-right">
              <p className="text-[10px] text-slate-500">ROLE</p>
              <p className={'font-bold text-xl ' + (userRole==='pilot'?'text-blue-400':'text-green-400')}>{userRole.toUpperCase()}</p>
            </div>
          </div>

          {/* Alert buttons */}
          <div className="grid grid-cols-2 gap-3">
            {[
              { label:'歩行者', msg:'歩行者接近', type:'warn', n:'UserCheck', tw:'bg-orange-900/40 border-orange-600', ic:'text-orange-400', lc:'text-orange-200' },
              { label:'障害物', msg:'障害物接近', type:'danger', n:'AlertOct', tw:'bg-red-900/40 border-red-600', ic:'text-red-400', lc:'text-red-200' },
              { label:'強風',   msg:'強風注意',   type:'warn', n:'Wind',     tw:'bg-blue-900/40 border-blue-600', ic:'text-blue-400', lc:'text-blue-200' },
              { label:'鳥接近', msg:'鳥接近',     type:'warn', n:'Bird',     tw:'bg-yellow-900/40 border-yellow-600', ic:'text-yellow-400', lc:'text-yellow-200' },
            ].map(btn => (
              <button key={btn.label} onClick={() => sendAlert(btn.msg, btn.type)}
                className={'border-2 rounded-xl flex flex-col items-center justify-center p-4 active:scale-95 transition-all ' + btn.tw}>
                <Ic n={btn.n} size={32} cls={btn.ic}/>
                <span className={'text-lg font-bold mt-1 ' + btn.lc}>{btn.label}</span>
              </button>
            ))}
          </div>

          {/* PTT Button */}
          <div className="flex justify-center" style={{ touchAction:'none' }}>
            <button
              onTouchStart={e => { e.preventDefault(); haptic([30]); startRec(); }}
              onTouchEnd={e => { e.preventDefault(); stopRec(); }}
              onTouchCancel={e => { e.preventDefault(); stopRec(); }}
              onMouseDown={() => { if (!('ontouchstart' in window)) startRec(); }}
              onMouseUp={() => { if (!('ontouchstart' in window)) stopRec(); }}
              onMouseLeave={() => { if (isRec) stopRec(); }}
              onContextMenu={e => e.preventDefault()}
              className={'w-full max-w-sm h-20 rounded-full flex items-center justify-center gap-3 font-bold text-lg shadow-xl select-none transition-all ' + (isRec ? 'bg-red-600 text-white wg-pulse' : 'bg-slate-700 text-slate-300 border-2 border-slate-600')}>
              {isRec ? <Ic n="Mic" size={26}/> : <Ic n="MicOff" size={26}/>}
              {isRec ? '送信中... ' + dur.toFixed(1) + 's' : '押しながら話す (PTT)'}
            </button>
          </div>

          {/* Safety log */}
          <div>
            <h3 className="text-[11px] font-bold text-slate-500 uppercase mb-2 flex items-center gap-1"><Ic n="Book" size={12}/>SAFETY LOG</h3>
            {logs.length === 0
              ? <p className="text-slate-600 text-xs text-center py-4">ログなし</p>
              : <div className="space-y-1 max-h-44 overflow-y-auto">
                  {logs.map(l => (
                    <div key={l.id} className={'flex gap-2 p-2 rounded text-xs ' + (l.type==='danger' ? 'bg-red-900/30 border border-red-700/40' : 'bg-yellow-900/20 border border-yellow-700/30')}>
                      <span>{l.type==='danger'?'🔴':'⚠️'}</span>
                      <span className="text-slate-300 flex-1">{l.message}</span>
                      <span className="text-slate-500 shrink-0">{fmtTime(l.createdAt)}</span>
                    </div>
                  ))}
                </div>
            }
          </div>
        </div>
      );
    };

    // ================================================================
    // INSPECTION VIEW
    // ================================================================
    const InspectionView = ({
      bgImage, items, selId, menuPos, isDrag, tool, drawing,
      onDown, onMove, onUp, camera, fileRef, onFile,
      delItem, editComment, setTool, setSel,
      imgRef, tbRef, color,
      hoveredType, onMenuSelect
    }) => {

      const renderPath = (dr, isCurr=false) => {
        if (!dr || !dr.pts || dr.pts.length < 2) return null;
        const d = 'M ' + dr.pts[0].x + ' ' + dr.pts[0].y + ' ' + dr.pts.slice(1).map(p => 'L '+p.x+' '+p.y).join(' ');
        return <path key={dr.id||'c'} d={d} stroke={isCurr ? color : (dr.color||'#ef4444')} strokeWidth={dr.sw||4} fill="none" strokeLinecap="round" strokeLinejoin="round" className="pointer-events-none"/>;
      };

      return (
        <div className="w-full h-full relative bg-slate-900" style={{ touchAction:'none' }}
          onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}>

          {/* Image/canvas area */}
          <div ref={imgRef} className="absolute inset-0 flex items-center justify-center overflow-hidden">
            {bgImage ? (
              <img src={bgImage} className="w-full h-full object-contain pointer-events-none select-none bg-black" draggable="false"/>
            ) : (
              <div className="flex flex-col items-center justify-center gap-6 text-slate-500 pointer-events-none w-full h-full">
                <p className="text-base font-semibold text-slate-400">検査対象の画像を読み込む</p>
                <div className="flex gap-4 pointer-events-auto">
                  <button onClick={camera} className="flex flex-col items-center gap-2 w-28 h-28 bg-slate-800 rounded-xl border-2 border-slate-600 hover:border-blue-500 transition-all justify-center">
                    <Ic n="Camera" size={34} cls="text-blue-400"/><span className="text-xs text-slate-400">カメラ</span>
                  </button>
                  <button onClick={() => fileRef.current && fileRef.current.click()} className="flex flex-col items-center gap-2 w-28 h-28 bg-slate-800 rounded-xl border-2 border-slate-600 hover:border-green-500 transition-all justify-center">
                    <Ic n="Image" size={34} cls="text-green-400"/><span className="text-xs text-slate-400">画像選択</span>
                  </button>
                </div>
                <p className="text-xs text-slate-600 text-center">長押しでマーカーを追加</p>
              </div>
            )}

            {/* SVG drawing layer */}
            <svg className="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100" preserveAspectRatio="none">
              {items.filter(i => i.cat==='draw').map(d => renderPath(d))}
              {renderPath(drawing, true)}
            </svg>

            {/* Markers */}
            {items.filter(i => i.cat==='marker').map(m => {
              const t = ANOMALY_TYPES.find(a => a.id===m.type) || ANOMALY_TYPES[0];
              const sel = selId === m.id;
              return (
                <div key={m.id}
                  className={'absolute -translate-x-1/2 -translate-y-1/2 transition-transform duration-75 ' + (sel ? 'z-50 scale-125' : 'z-20')}
                  style={{ left: m.x+'%', top: m.y+'%', touchAction:'none' }}>
                  {/* hit area */}
                  <div className="absolute -inset-6 rounded-full" data-mid={m.id}/>
                  {/* marker dot */}
                  <div className={'w-8 h-8 rounded-full flex items-center justify-center pointer-events-none z-10 shadow-lg border-2 ' + t.tw + ' ' + (sel ? 'border-blue-400 ring-2 ring-blue-400/40' : 'border-white')}>
                    <Ic n={t.svgN} size={15}/>
                  </div>
                  {/* comment bubble */}
                  {m.comment && !sel && (
                    <div className="absolute -top-7 left-1/2 -translate-x-1/2 bg-black/80 text-white text-[10px] rounded px-1.5 py-0.5 whitespace-nowrap pointer-events-none max-w-[100px] truncate">{m.comment}</div>
                  )}
                  {/* action buttons */}
                  {sel && !isDrag && (
                    <div className="absolute left-full ml-3 top-1/2 -translate-y-1/2 flex items-center gap-2 animate-bounce-in pointer-events-none">
                      <div className="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center shadow-xl border-2 border-slate-900 pointer-events-auto cursor-pointer" onPointerDown={e => editComment(e,m)}>
                        <Ic n="Edit" size={17}/>
                      </div>
                      <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center shadow-xl border-4 border-slate-900 pointer-events-auto cursor-pointer" onPointerDown={e => delItem(e,m.id)}>
                        <Ic n="Trash" size={20}/>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Creation radial menu */}
          {menuPos && (
            <div className="absolute z-50 pointer-events-none animate-bounce-in" style={{ left: menuPos.x+'%', top: menuPos.y+'%' }}>
              <div className="relative">
                <div className="w-10 h-10 bg-white/20 rounded-full border-2 border-white/50 wg-pulse absolute -translate-x-1/2 -translate-y-1/2"/>
                {ANOMALY_TYPES.map((t, i) => {
                  const a = (i * 72 - 90) * Math.PI / 180;
                  const d = 72;
                  const isHov = hoveredType === t.id;
                  return (
                    <div key={t.id}
                      className="absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center gap-0.5 pointer-events-auto cursor-pointer"
                      style={{ transform: 'translate(' + (Math.cos(a)*d) + 'px,' + (Math.sin(a)*d) + 'px) scale(' + (isHov ? 1.25 : 1) + ')', transition:'transform 0.1s' }}
                      onPointerDown={e => onMenuSelect(e, t.id)}>
                      <div className={'w-11 h-11 rounded-full flex items-center justify-center shadow-xl ' + t.tw + (isHov ? ' border-4 border-white ring-2 ring-white/40' : ' border-2 border-white/70')}>
                        <Ic n={t.svgN} size={18}/>
                      </div>
                      <span className={'text-[9px] font-bold px-1 rounded whitespace-nowrap ' + (isHov ? 'text-white bg-white/40' : 'text-white bg-black/60')}>{t.label}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Toolbar */}
          <div ref={tbRef} className="absolute bottom-5 left-1/2 -translate-x-1/2 bg-slate-800/90 backdrop-blur border border-slate-600 rounded-full px-4 py-2 flex items-center gap-3 shadow-2xl z-50">
            <button onClick={() => { setTool('cursor'); setSel(null); }}
              className={'p-2 rounded-full transition-all ' + (tool==='cursor' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white')}>
              <Ic n="Cursor" size={20}/>
            </button>
            <button onClick={() => setTool('pen')}
              className={'p-2 rounded-full transition-all ' + (tool==='pen' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white')}>
              <Ic n="Edit" size={20}/>
            </button>
            <div className="w-px h-5 bg-slate-600"/>
            {COLORS.map(c => (
              <div key={c} className={'w-4 h-4 rounded-full border-2 cursor-pointer ' + (color===c?'border-white scale-125':'border-slate-600')}
                style={{ backgroundColor:c }} onClick={() => {}}/>
            ))}
          </div>

          {bgImage && (
            <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/60 text-slate-400 text-[10px] px-3 py-1 rounded-full z-40 pointer-events-none">
              長押しでマーカー追加 · タップで選択
            </div>
          )}
        </div>
      );
    };

    // ================================================================
    // REPORT VIEW
    // ================================================================
    const ReportView = ({ items, room }) => {
      const markers = items.filter(i => i.cat==='marker');
      const draws   = items.filter(i => i.cat==='draw');
      const cnt = ANOMALY_TYPES.reduce((a,t) => { a[t.id]=markers.filter(m=>m.type===t.id).length; return a; }, {});
      return (
        <div className="h-full overflow-y-auto bg-slate-900 p-4">
          <div className="max-w-lg mx-auto space-y-4">
            <h2 className="text-xl font-bold flex items-center gap-2"><Ic n="FileText" size={20} cls="text-blue-400"/>点検レポート</h2>
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
              <p className="text-slate-500 text-xs">ルーム: <span className="text-white font-mono">{room||'DEMO'}</span></p>
              <p className="text-slate-500 text-xs mt-1">生成: {new Date().toLocaleString('ja-JP')}</p>
            </div>
            <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
              <h3 className="text-xs font-bold text-slate-400 uppercase mb-3">異常分類サマリー</h3>
              <div className="grid grid-cols-2 gap-2">
                {ANOMALY_TYPES.map(t => (
                  <div key={t.id} className="flex items-center gap-2 p-2 rounded-lg bg-slate-900/60">
                    <div className={'w-6 h-6 rounded-full flex items-center justify-center shrink-0 ' + t.tw}><Ic n={t.svgN} size={13}/></div>
                    <span className="text-slate-300 text-sm flex-1">{t.label}</span>
                    <span className={'font-bold text-lg ' + (cnt[t.id]>0?'text-red-400':'text-slate-600')}>{cnt[t.id]}</span>
                  </div>
                ))}
              </div>
              <div className="mt-3 pt-3 border-t border-slate-700 space-y-1">
                <div className="flex justify-between text-sm"><span className="text-slate-400">マーカー合計</span><span className="font-bold">{markers.length}件</span></div>
                <div className="flex justify-between text-sm"><span className="text-slate-400">描画数</span><span className="font-bold">{draws.length}本</span></div>
              </div>
            </div>
            {markers.length > 0 && (
              <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
                <h3 className="text-xs font-bold text-slate-400 uppercase mb-3">マーカー一覧</h3>
                <div className="space-y-2">
                  {markers.map((m,i) => {
                    const t = ANOMALY_TYPES.find(a=>a.id===m.type)||ANOMALY_TYPES[0];
                    return (
                      <div key={m.id} className="flex items-center gap-3 p-2 bg-slate-900/60 rounded-lg">
                        <span className="text-slate-500 text-xs w-5 shrink-0">{i+1}</span>
                        <div className={'w-6 h-6 rounded-full flex items-center justify-center shrink-0 '+t.tw}><Ic n={t.svgN} size={13}/></div>
                        <div className="flex-1 min-w-0">
                          <p className="text-white text-sm font-semibold">{t.label}</p>
                          {m.comment && <p className="text-slate-400 text-xs truncate">{m.comment}</p>}
                        </div>
                        <span className="text-slate-500 text-xs shrink-0">{Math.round(m.x)}%,{Math.round(m.y)}%</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ================================================================
    // MAIN APP
    // ================================================================
    const App = () => {
      const [permOk,  setPermOk]  = useState(false);
      const [user,    setUser]    = useState(null);
      const [mode,    setMode]    = useState('login');
      const [room,    setRoom]    = useState('');
      const [activeR, setActiveR] = useState(null);
      const [role,    setRole]    = useState('pilot');
      const [items,   setItems]   = useState([]);
      const [deletedIds, setDeletedIds] = useState(new Set());
      const [bgImg,   setBgImg]   = useState(null);
      const [logs,    setLogs]    = useState([]);
      const [tool,    setTool]    = useState('cursor');
      const [selId,   setSelId]   = useState(null);
      const [isRec,   setIsRec]   = useState(false);
      const [menuPos,    setMenuPos]    = useState(null);
      const [hoveredType,setHoveredType]= useState(null);
      const [drawing, setDrawing] = useState(null);
      const [isDrag,  setIsDrag]  = useState(false);
      const [color,   setColor]   = useState(COLORS[0]);

      const mrRef   = useRef(null);
      const lpRef   = useRef(null);
      const dragRef = useRef(false);
      const dragId  = useRef(null);
      const imgRef  = useRef(null);
      const fileRef = useRef(null);
      const tbRef   = useRef(null);

      // ---- Auth ----
      useEffect(() => {
        if (DEMO_MODE || !fbAuth) { setUser({ uid:'demo-'+Math.random().toString(36).substr(2,6) }); return; }
        fbAuth.signInAnonymously().catch(console.error);
        return fbAuth.onAuthStateChanged(setUser);
      }, []);

      // ---- Firestore sync ----
      useEffect(() => {
        if (!user || !activeR || DEMO_MODE || !fbDb) return;
        const u1 = col('inspection_anomalies').where('room','==',activeR).onSnapshot(snap => {
          if (!dragRef.current)
            setItems(snap.docs.map(d => ({id:d.id,...d.data()})).filter(i => !deletedIds.has(i.id)));
        });
        const u2 = col('flight_safety_alerts').where('room','==',activeR).orderBy('createdAt','desc').limit(50).onSnapshot(snap => {
          setLogs(snap.docs.map(d=>({id:d.id,...d.data()})));
          snap.docChanges().forEach(c => {
            if (c.type==='added') {
              const data = c.doc.data();
              const now = Date.now();
              const at = data.createdAt?.toDate ? data.createdAt.toDate().getTime() : now;
              if (now-at < 10000 && data.uid !== user.uid) { beep(data.type==='danger'?'danger':'warn'); speak(data.message||''); }
            }
          });
        });
        return () => { u1(); u2(); };
      }, [user, activeR, deletedIds]);

      // ---- CRUD helpers ----
      const addItem = async (data) => {
        if (DEMO_MODE || !fbDb) { setItems(p => [...p, {id: Date.now()+Math.random().toString(36).substr(2,4), ...data}]); return; }
        try { await col('inspection_anomalies').add({...data, createdAt:TS()}); } catch(e){console.error(e);}
      };
      const delItem = async (e, id) => {
        e.stopPropagation();
        if (!window.confirm('このマーカーを削除しますか？')) return;
        setDeletedIds(p => new Set([...p,id]));
        setItems(p => p.filter(i=>i.id!==id));
        setSelId(null);
        if (!DEMO_MODE && fbDb) { try { await col('inspection_anomalies').doc(id).delete(); } catch(e){console.error(e);} }
      };
      const updItem = async (id, data) => {
        setItems(p => p.map(i => i.id===id ? {...i,...data} : i));
        if (!DEMO_MODE && fbDb) { try { await col('inspection_anomalies').doc(id).update(data); } catch(e){console.error(e);} }
      };
      const addLog = async (msg, type) => {
        const log = {id:Date.now().toString(), message:msg, type, role, createdAt: new Date()};
        setLogs(p => [log,...p].slice(0,50));
        beep(type==='danger'?'danger':'warn'); speak(msg);
        if (!DEMO_MODE && fbDb && user) {
          try { await col('flight_safety_alerts').add({message:msg, type, role, uid:user.uid, room:activeR, createdAt:TS()}); } catch(e){console.error(e);}
        }
      };

      // ---- PTT ----
      const startRec = async () => {
        if (isRec) return;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({audio:true});
          const mr = new MediaRecorder(stream);
          const chunks = [];
          mr.ondataavailable = e => chunks.push(e.data);
          mr.onstop = () => { stream.getTracks().forEach(t=>t.stop()); beep('end'); };
          mr.start();
          mrRef.current = mr;
          setIsRec(true);
          beep('talk');
        } catch(e) { console.error(e); }
      };
      const stopRec = () => {
        if (mrRef.current && isRec) { mrRef.current.stop(); setIsRec(false); }
      };

      // ---- Pointer handlers ----
      const getXY = (e) => {
        const r = imgRef.current.getBoundingClientRect();
        return { x:(e.clientX-r.left)/r.width*100, y:(e.clientY-r.top)/r.height*100 };
      };
      const onDown = (e) => {
        if (!imgRef.current) return;
        // ラジアルメニューが開いている場合、ボタン以外のタップで閉じる
        if (menuPos) { setMenuPos(null); setHoveredType(null); return; }
        const mid = e.target.getAttribute('data-mid') || e.target.closest('[data-mid]')?.getAttribute('data-mid');
        if (tool==='pen' && !mid) {
          const {x,y} = getXY(e);
          setDrawing({pts:[{x,y}], color, sw:4, cat:'draw', room:activeR}); return;
        }
        if (mid) {
          haptic([10]); setSelId(mid); dragRef.current=false; dragId.current=mid;
          lpRef.current = setTimeout(() => { dragRef.current=true; setIsDrag(true); haptic([30]); }, 250); return;
        }
        const {x,y} = getXY(e);
        setSelId(null);
        lpRef.current = setTimeout(() => { setMenuPos({x,y}); haptic([40]); }, 500);
      };
      const onMove = (e) => {
        if (!imgRef.current) return;
        const {x,y} = getXY(e);
        if (drawing) { setDrawing(p => ({...p, pts:[...p.pts,{x,y}]})); return; }
        // フリック検知: メニューが開いている間、最も近いボタンをハイライト
        if (menuPos) {
          const r = imgRef.current.getBoundingClientRect();
          const px = e.clientX - r.left;
          const py = e.clientY - r.top;
          const cx = menuPos.x * r.width / 100;
          const cy = menuPos.y * r.height / 100;
          const btnD = 72;
          let nearest = null, nearestDist = Infinity;
          ANOMALY_TYPES.forEach((t, i) => {
            const a = (i * 72 - 90) * Math.PI / 180;
            const bx = cx + Math.cos(a) * btnD;
            const by = cy + Math.sin(a) * btnD;
            const dist = Math.hypot(px - bx, py - by);
            if (dist < nearestDist) { nearestDist = dist; nearest = t.id; }
          });
          setHoveredType(nearestDist < 60 ? nearest : null);
          return;
        }
        if (dragRef.current && dragId.current) {
          clearTimeout(lpRef.current);
          setItems(p => p.map(i => i.id===dragId.current ? {...i,x,y} : i));
        }
      };
      const onUp = async (e) => {
        clearTimeout(lpRef.current);
        if (drawing) {
          if (drawing.pts.length > 5) await addItem({...drawing, id:undefined, createdAt:new Date().toISOString()});
          setDrawing(null); return;
        }
        if (dragRef.current && dragId.current && imgRef.current) {
          const {x,y} = getXY(e);
          await updItem(dragId.current, {x,y});
          dragRef.current=false; dragId.current=null; setIsDrag(false); haptic([20]);
        } else if (menuPos && hoveredType) {
          // フリックで種別を選択してリリース → マーカー作成
          const pos = menuPos; const type = hoveredType;
          setMenuPos(null); setHoveredType(null);
          await addItem({type, x:pos.x, y:pos.y, cat:'marker', room:activeR, createdAt:new Date().toISOString()});
        }
        // menuPos があるがhoveredTypeなし → メニューを開いたまま保持（タップ選択待ち）
      };
      // タップでボタンを直接選択（フリックしない場合）
      const onMenuSelect = (e, typeId) => {
        e.stopPropagation();
        clearTimeout(lpRef.current);
        if (!menuPos) return;
        const pos = menuPos;
        setMenuPos(null); setHoveredType(null);
        addItem({type: typeId, x:pos.x, y:pos.y, cat:'marker', room:activeR, createdAt:new Date().toISOString()});
      };

      const editComment = (e, m) => {
        e.stopPropagation();
        const c = window.prompt('コメント:', m.comment||'');
        if (c!==null) updItem(m.id, {comment:c});
      };
      const takeCamera = async () => {
        try {
          const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
          const v = document.createElement('video'); v.srcObject=s; await v.play();
          await new Promise(r=>setTimeout(r,300));
          const c = document.createElement('canvas'); c.width=v.videoWidth||1280; c.height=v.videoHeight||720;
          c.getContext('2d').drawImage(v,0,0); setBgImg(c.toDataURL()); s.getTracks().forEach(t=>t.stop());
        } catch(e) { alert('カメラを起動できませんでした'); }
      };
      const onFile = (e) => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader(); r.onload = ev => setBgImg(ev.target.result); r.readAsDataURL(f);
      };

      const join = () => { if(!room.trim()) return; setActiveR(room.trim().toUpperCase()); setMode('inspection'); };

      // ---- Render ----
      if (!permOk) return <PermissionGate onGranted={() => setPermOk(true)}/>;
      if (mode==='login') return <LoginScreen onJoin={join} roomCode={room} setRoomCode={setRoom} ready={!!user} userRole={role} setUserRole={setRole}/>;

      return (
        <div className="flex flex-col h-screen bg-slate-900 text-white overflow-hidden">
          {/* Header */}
          <header className="bg-slate-800 border-b border-slate-700 px-3 py-2 flex justify-between items-center z-40 shrink-0">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shrink-0">
                <Ic n="Shield" size={17}/>
              </div>
              <div>
                <p className="font-bold text-sm tracking-wider leading-none">WG<span className="text-blue-400">FC</span></p>
                {activeR && <p className="text-[10px] text-slate-500 font-mono">{activeR}</p>}
              </div>
            </div>
            <div className="flex bg-slate-700 rounded-lg p-1 gap-0.5">
              {[['inspection','Map','点検'],['safety','Shield','安全'],['report','FileText','報告']].map(([m,n,l]) => (
                <button key={m} onClick={() => setMode(m)}
                  className={'px-2.5 py-1.5 rounded text-[11px] font-bold flex items-center gap-1 transition-all ' + (mode===m?'bg-slate-600 text-white shadow':'text-slate-400')}>
                  <Ic n={n} size={13}/><span className="hidden sm:inline">{l}</span>
                </button>
              ))}
            </div>
            <div className="flex items-center gap-2">
              {DEMO_MODE && <span className="text-[10px] text-amber-400 font-bold bg-amber-900/30 px-2 py-0.5 rounded-full">DEMO</span>}
              <button onClick={() => { setMode('login'); setActiveR(null); setItems([]); setLogs([]); setBgImg(null); }}
                className="text-slate-500 hover:text-white transition-colors p-1">
                <Ic n="LogOut" size={18}/>
              </button>
            </div>
          </header>

          <main className="flex-1 relative overflow-hidden bg-black">
            {mode==='inspection' && (
              <InspectionView
                bgImage={bgImg} items={items} selId={selId} menuPos={menuPos}
                isDrag={isDrag} tool={tool} drawing={drawing}
                onDown={onDown} onMove={onMove} onUp={onUp}
                camera={takeCamera} fileRef={fileRef} onFile={onFile}
                delItem={delItem} editComment={editComment}
                setTool={setTool} setSel={setSelId}
                imgRef={imgRef} tbRef={tbRef} color={color}
                hoveredType={hoveredType} onMenuSelect={onMenuSelect}
              />
            )}
            {mode==='safety'     && <SafetyCockpit userRole={role} sendAlert={addLog} logs={logs} isRec={isRec} startRec={startRec} stopRec={stopRec}/>}
            {mode==='report'     && <ReportView items={items} room={activeR}/>}
          </main>

          <input type="file" ref={fileRef} onChange={onFile} className="hidden" accept="image/*"/>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
