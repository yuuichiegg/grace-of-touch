<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:"Noto Sans JP",sans-serif;color:#fff}

function makeAgentTex(at){const c=document.createElement("canvas");c.width=32;c.height=32;const x=c.getContext("2d");x.imageSmoothingEnabled=false;x.fillStyle=at.color;x.fillRect(10,8,12,14);x.fillRect(11,2,10,8);x.fillStyle="#fff";x.fillRect(13,4,3,3);x.fillRect(18,4,3,3);x.fillStyle="#000";x.fillRect(14,5,2,2);x.fillRect(19,5,2,2);x.fillStyle=at.accent;x.fillRect(11,22,4,6);x.fillRect(17,22,4,6);x.fillRect(6,10,4,8);x.fillRect(22,10,4,8);x.fillStyle=at.color;x.fillRect(14,0,4,2);const t=new THREE.CanvasTexture(c);t.magFilter=THREE.NearestFilter;t.minFilter=THREE.NearestFilter;return t}
const agents=[];FLOORS.forEach(fd=>{const n=1+Math.floor(Math.random()*2);for(let a=0;a<n;a++){const at=agentTypes[Math.floor(Math.random()*agentTypes.length)];const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:makeAgentTex(at),transparent:true}));sp.scale.set(1.5,1.5,1);sp.position.set((Math.random()-.5)*(bw-2),fd.y+1.5,(Math.random()-.5)*(bd-2));BG.add(sp);agents.push({sprite:sp,floorY:fd.y,vx:(Math.random()-.5)*.015,vz:(Math.random()-.5)*.015,baseY:fd.y+1.5})}});
function makeLbl(text){const c=document.createElement("canvas");c.width=512;c.height=64;const x=c.getContext("2d");x.clearRect(0,0,512,64);x.font="bold 28px Orbitron, sans-serif";x.fillStyle="#22d3ee";x.shadowColor="#22d3ee";x.shadowBlur=10;x.textAlign="left";x.fillText(text,10,40);const t=new THREE.CanvasTexture(c);const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,opacity:0.85}));sp.scale.set(10,1.2,1);return sp}
FLOORS.forEach(fd=>{const l=makeLbl(fd.floor+"  "+fd.label);l.position.set(bw/2+6,fd.y+2,0);BG.add(l)});
const floorListEl=document.getElementById("floor-list");FLOORS.slice().reverse().forEach(fd=>{const btn=document.createElement("div");btn.className="floor-btn";btn.textContent=fd.floor;btn.dataset.floorId=fd.id;btn.addEventListener("click",()=>selectFloor(fd));floorListEl.appendChild(btn)});
let selectedFloor=null;
function selectFloor(fd){selectedFloor=fd;document.querySelectorAll(".floor-btn").forEach(b=>b.classList.toggle("active",b.dataset.floorId===fd.id));document.getElementById("floor-panel").classList.add("active");document.getElementById("panel-title").textContent=fd.floor+" - "+fd.label;const ae=document.getElementById("panel-apps");ae.innerHTML="";fd.apps.forEach(app=>{const d=document.createElement("div");d.className="floor-app";d.innerHTML='<div class="app-name">'+app.name+'</div><div class="app-desc">'+app.desc+'</div>';if(app.url){d.addEventListener("click",()=>{window.location.href=app.url});d.style.cursor="pointer"}else{d.style.opacity="0.5";d.style.cursor="default"}ae.appendChild(d)});animCam(fd.y+2)}
function animCam(ty){
const sy=controls.target.y,st=performance.now();
// Also smoothly zoom closer when selecting a floor
const startDist=camera.position.distanceTo(controls.target);
const targetDist=Math.min(startDist,28);
function tick(now){
const t=Math.min((now-st)/800,1),e=1-Math.pow(1-t,3);
controls.target.y=sy+(ty-sy)*e;
// Smoothly adjust distance
const dir=camera.position.clone().sub(controls.target).normalize();
const curDist=startDist+(targetDist-startDist)*e;
camera.position.copy(controls.target).add(dir.multiplyScalar(curDist));
if(t<1)requestAnimationFrame(tick)}requestAnimationFrame(tick)}
const rc=new THREE.Raycaster(),mouse=new THREE.Vector2(),tooltip=document.getElementById("tooltip");
function onPM(e){const x=e.clientX||(e.touches&&e.touches[0]?.clientX),y=e.clientY||(e.touches&&e.touches[0]?.clientY);if(x===undefined)return;mouse.x=(x/window.innerWidth)*2-1;mouse.y=-(y/window.innerHeight)*2+1;rc.setFromCamera(mouse,camera);const hits=rc.intersectObjects(floorMeshes.map(f=>f.mesh));if(hits.length>0){const fd=hits[0].object.userData.floorData;tooltip.style.display="block";tooltip.textContent=fd.floor+" - "+fd.label;tooltip.style.left=(x+15)+"px";tooltip.style.top=(y-10)+"px";canvas.style.cursor="pointer"}else{tooltip.style.display="none";canvas.style.cursor="grab"}}
function onCl(e){const x=e.clientX||(e.changedTouches&&e.changedTouches[0]?.clientX),y=e.clientY||(e.changedTouches&&e.changedTouches[0]?.clientY);if(x===undefined)return;mouse.x=(x/window.innerWidth)*2-1;mouse.y=-(y/window.innerHeight)*2+1;rc.setFromCamera(mouse,camera);const hits=rc.intersectObjects(floorMeshes.map(f=>f.mesh));if(hits.length>0){selectFloor(hits[0].object.userData.floorData);controls.autoRotate=false}}
canvas.addEventListener("pointermove",onPM);canvas.addEventListener("click",onCl);canvas.addEventListener("touchend",onCl);
canvas.addEventListener("pointerdown",e=>{setTimeout(()=>{mouse.x=(e.clientX/window.innerWidth)*2-1;mouse.y=-(e.clientY/window.innerHeight)*2+1;rc.setFromCamera(mouse,camera);const hits=rc.intersectObjects(floorMeshes.map(f=>f.mesh));if(hits.length===0&&!e.target.closest("#floor-panel")&&!e.target.closest("#floor-list")){document.getElementById("floor-panel").classList.remove("active");document.querySelectorAll(".floor-btn").forEach(b=>b.classList.remove("active"));selectedFloor=null}},50)});
const hlMeshes=[];FLOORS.forEach(fd=>{const rm=new THREE.MeshBasicMaterial({color:BRAND_CYAN,transparent:true,opacity:0,side:THREE.DoubleSide});const ring=new THREE.Mesh(new THREE.RingGeometry(4.5,5,32),rm);ring.rotation.x=-Math.PI/2;ring.position.y=fd.y+.2;BG.add(ring);hlMeshes.push({ring,floorData:fd,mat:rm})});
const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();controls.update();
antLM.opacity=.5+.5*Math.sin(t*3);antPL.intensity=.5+.5*Math.sin(t*3);
floatPart.rotation.y=t*.02;const pp=floatPart.geometry.attributes.position;for(let i=0;i<pp.count;i++)pp.array[i*3+1]+=Math.sin(t+i)*.003;pp.needsUpdate=true;
agents.forEach(ag=>{ag.sprite.position.x+=ag.vx;ag.sprite.position.z+=ag.vz;ag.sprite.position.y=ag.baseY+Math.sin(t*2+ag.vx*1000)*.15;const hw=bw/2-1,hd=bd/2-1;if(ag.sprite.position.x>hw||ag.sprite.position.x<-hw)ag.vx*=-1;if(ag.sprite.position.z>hd||ag.sprite.position.z<-hd)ag.vz*=-1});
hlMeshes.forEach(h=>{const tgt=(selectedFloor&&selectedFloor.id===h.floorData.id)?.4:0;h.mat.opacity+=(tgt-h.mat.opacity)*.05;if(selectedFloor&&selectedFloor.id===h.floorData.id)h.ring.scale.set(1+.05*Math.sin(t*3),1,1+.05*Math.sin(t*3))});
BG.traverse(ch=>{if(ch.material&&ch.material.emissiveIntensity!==undefined&&ch.material.emissive)ch.material.emissiveIntensity=.15+.1*Math.sin(t*.5+ch.position.y*.1)});
baseRingMat.opacity=.3+.15*Math.sin(t*1.5);ring2Mat.opacity=.15+.1*Math.sin(t*1.2+1);
renderer.render(scene,camera)}
window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
const lf=document.getElementById("load-fill");let lp=0;
function fakeLoad(){lp+=(100-lp)*.08;lf.style.width=lp+"%";if(lp<98)requestAnimationFrame(fakeLoad);else{lf.style.width="100%";setTimeout(()=>{document.getElementById("loading").classList.add("fade");setTimeout(()=>{document.getElementById("loading").style.display="none"},800)},300)}}
fakeLoad();animate();
</script>
</body>
</html>
